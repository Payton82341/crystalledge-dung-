  url: https://github.com/crystallpunk-14/crystalledge/pull/248
- author: TheShuEd
  changes:
  - message: Shock wave distorion effects have been added to certain player spells.
    type: Add
  - message: "An alternative arena for the battle against the boss \u201CViator\u201D\
      \ has been added\u2014the lake."
    type: Add
  - message: "The Freeze status effect now grants the temporary \u201CBreak Free\u201D\
      \ ability, which can be used at the cost of stamina to escape the Freeze effect\
      \ early."
    type: Add
  - message: Viator has gained complete immunity to cold damage and curses. His mana
      drain ability now inflicts a curse instead of a freeze.
    type: Tweak
  - message: Fixed a bug where blessings were not displayed if you moved far enough
      away.
    type: Fix
  - message: Fixed a collision issue with booksheslfs where mobs would get stuck
