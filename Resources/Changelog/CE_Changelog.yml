Entries:
- author: TheShuEd
  changes:
  - message: 'New neutral active skill "Soul Eater": consume 1 soul to restore 1 mana'
    type: Add
  - message: Removed "Recovery" priest passive
    type: Remove
  - message: Nerfed mage fireball
    type: Tweak
  id: 10004
  time: '2026-05-05T10:31:45.0000000+00:00'
  url: https://github.com/crystallpunk-14/crystalledge/pull/211
- author: TheShuEd
  changes:
  - message: Player mana, all manacostes and mana restoring sources multiplied by
      5. So, we have 100 mana instead 20 by default.
    type: Tweak
  - message: Gnomes now have mana and use it to heal themselves. As a result, gnomes'
      healing is now limited.
    type: Tweak
  - message: Fixed a bug where the Cursed Staff would curse the user when used
    type: Fix
  - message: Disabled vanilla ambient music
    type: Remove
  id: 10005
  time: '2026-05-05T11:29:58.0000000+00:00'
  url: https://github.com/crystallpunk-14/crystalledge/pull/212
- author: TheShuEd
  changes:
  - message: Fixed a bug that allowed one player to permanently block other players
      from using the statue
    type: Fix
  id: 10006
  time: '2026-05-05T12:25:49.0000000+00:00'
  url: https://github.com/crystallpunk-14/crystalledge/pull/213
- author: TheShuEd
  changes:
  - message: The standard wait time in the lobby has been increased from 5 minutes
      to 5 hours. The admins are tired of shutting down the server after every update.
      The admins can still hold impromptu closed beta tests in the middle of the day.
    type: Fix
  - message: Fixed small mana potions restore 5 mana instead 25.
    type: Fix
  id: 10007
  time: '2026-05-05T14:41:34.0000000+00:00'
  url: https://github.com/crystallpunk-14/crystalledge/pull/214
- author: TheShuEd
  changes:
  - message: Most combat spells now consume stamina to cast. Some spells now have
      very short cooldowns but high stamina costs, allowing you to cast them repeatedly
      as long as you have enough stamina.
    type: Add
  - message: Libraries now spawn 100% of the time on the first floor, and alchemy
      rooms on the second floor
    type: Tweak
  - message: The alchemy rooms no longer require keys to enter
    type: Tweak
  - message: Keys, mobs, and other random loot will no longer spawn in locked rooms
      (secrets, treasures, libraries)
    type: Tweak
  - message: Fixed a bug where casting multiple spells in quick succession could cancel
      the effects of some of them, resulting in wasted resources
    type: Fix
  id: 10008
  time: '2026-05-06T10:42:58.0000000+00:00'
  url: https://github.com/crystallpunk-14/crystalledge/pull/219
- author: TheShuEd
  changes:
  - message: A new recipe book has been added, allowing you to create alchemical fire
      and frost potions
    type: Add
  - message: Health and mana potions can no longer be found in chests or pots.
    type: Tweak
  - message: The weapons no longer fit in the backpacks.
    type: Tweak
  id: 10009
  time: '2026-05-06T13:58:05.0000000+00:00'
  url: https://github.com/crystallpunk-14/crystalledge/pull/220
- author: TheShuEd
  changes:
  - message: Bonfires have been added to safe zones. Each player can interact with
      a bonfire once to fully restore their mana, health, and the charges of all their
      items.
    type: Add
  id: 10010
  time: '2026-05-06T19:53:54.0000000+00:00'
  url: https://github.com/crystallpunk-14/crystalledge/pull/221
- author: TheShuEd
  changes:
  - message: 'Added interaction between Curse and Frost: Applying Frost effects to
      Curse clouds will create dangerous ice spikes that deal damage on contact. They
      can be melted with fire.'
    type: Add
  - message: Added 7 new room layout into dungeon. (3 corridors, 1 dead end, 1 blessing
      room, 2 secrets room)
    type: Add
  - message: Added stone spike tiles that deal damage when stepped on. You can find
      it in some of the new rooms in the dungeon.
    type: Add
  - message: Fixed displacement maps for female human backs that caused strange graphical
      artifacts when wearing items on the back
    type: Fix
  - message: The torches are shining brightly again
    type: Fix
  id: 10011
  time: '2026-05-07T10:27:09.0000000+00:00'
  url: https://github.com/crystallpunk-14/crystalledge/pull/222
- author: TheShuEd, Demimoz Keroz
  changes:
  - message: The first version of the dungeon exploration soundtrack was added.
    type: Add
  id: 10012
  time: '2026-05-07T13:47:21.0000000+00:00'
  url: https://github.com/crystallpunk-14/crystalledge/pull/217
- author: TheShuEd
  changes:
  - message: Added new mage passive skill "Sharp floor" - When you freeze an area,
      you also cover it with sharp ice spikes.
    type: Add
  - message: Tall bushes, ice spikes, and stone spikes can now be broken with melee
      attacks
    type: Add
  - message: Fixed an issue where the soul requirement icon appeared misaligned above
      statues when the camera was zoomed in at a non-standard level
    type: Fix
  id: 10013
  time: '2026-05-07T16:30:57.0000000+00:00'
  url: https://github.com/crystallpunk-14/crystalledge/pull/223
- author: TheShuEd
  changes:
  - message: Synced with upstream
    type: Tweak
  id: 10014
  time: '2026-05-08T10:08:54.0000000+00:00'
  url: https://github.com/crystallpunk-14/crystalledge/pull/224
- author: TheShuEd
  changes:
  - message: "The neutral abilities \u201CFire Barrier\u201D and \u201CIce Barrier\u201D\
      \ have been removed."
    type: Remove
  - message: The Ice Protection and Fire Protection potions have been removed.
    type: Remove
  - message: Fixed ice spikes dealing damage in PvE.
    type: Fix
  - message: The mechanics of temporary shields now block all types of damage except
      poison.
    type: Tweak
  - message: PvE no longer blocks damage that a player can inflict on themselves
    type: Tweak
  - message: All types of magic staffs now have a limited number of charges. Ranged
      combat is no longer an endless safe option.
    type: Tweak
  - message: The alternative attacks of simple magic staffs are converted into a standard
      physical attack that can be used when you run out of charges.
    type: Tweak
  id: 10015
  time: '2026-05-08T12:06:02.0000000+00:00'
  url: https://github.com/crystallpunk-14/crystalledge/pull/225
- author: TheShuEd
  changes:
  - message: '"Soul eater" now restore 10 mana instead 5.'
    type: Tweak
  - message: "The mage's new passive ability, \u201CSoul Energy.\u201D Passively restores\
      \ 2 mana when you collect a soul."
    type: Add
  - message: "The priest's new active ability, \u201CCare for Others\u201D. A more\
      \ effective treatment option for the first condition, but one that does not\
      \ allow for self-treatment."
    type: Add
  - message: "The priest's new passive ability, \u201CBlack Heart.\u201D It grants\
      \ immunity to the Curse status effect. Additionally, melee attacks will now\
      \ curse your targets."
    type: Add
  - message: "The priest's new passive ability, \u201CBlessed and Protected.\u201D\
      \ When you cast a blessing on someone, you also grant them up to 3 divine shields."
    type: Add
  id: 10016
  time: '2026-05-08T21:14:55.0000000+00:00'
  url: https://github.com/crystallpunk-14/crystalledge/pull/227
- author: TheShuEd
  changes:
  - message: "A new active spell for the Warrior, \u201CWave of Spikes,\u201D has\
      \ been added\u2014it covers an area with stone spikes that deal damage on contact"
    type: Add
  - message: "A new passive skill for the Warrior, \u201CAgility,\u201D has been added.\
      \ It increases movement speed after taking"
    type: Add
  - message: The number of standard magic staff projectiles is once again unlimited
    type: Tweak
  - message: "The warrior's active spell \u201CRaise Shields\u201D has been buffed\u2014\
      the number of shields granted has been increased from 25 to 35"
    type: Tweak
  - message: "The warrior's active skill \u201CCruelty\u201D has been buffed\u2014\
      it now costs 10 mana instead of 20"
    type: Tweak
  - message: "The warrior's active skill \u201CFlame Absorption\u201D has been removed."
    type: Remove
  - message: "The warrior's active skill \u201CAmplification\u201D has been removed."
    type: Remove
  - message: "The warrior's active skill \u201CRaging fury\u201D has been removed."
    type: Remove
  - message: Fixed doors that open with a delay
    type: Fix
  - message: Fixed a bug that caused mobs to take double damage from spikes
    type: Fix
  id: 10017
  time: '2026-05-11T13:44:39.0000000+00:00'
  url: https://github.com/crystallpunk-14/crystalledge/pull/229
- author: TheShuEd
  changes:
  - message: A strength potion has been added. It can be found in the dungeon.
    type: Add
  - message: "The Warrior's new passive skill, \u201CFortress.\u201D When the Warrior\
      \ applies the Shield status effect to someone, they gain an additional 10 shields."
    type: Add
  - message: "The warrior's new active skill, \u201CStone Wall.\u201D Creates a destructible\
      \ wall that blocks the passage."
    type: Add
  - message: "The Warrior's new active skill, \u201CKick.\u201D Deals 15 damage and\
      \ strongly knocks back targets."
    type: Add
  - message: Fixed a bug that caused mobs to get stuck in bushes, grass walls, and
      thorns
    type: Fix
  id: 10018
  time: '2026-05-11T18:46:11.0000000+00:00'
  url: https://github.com/crystallpunk-14/crystalledge/pull/230
