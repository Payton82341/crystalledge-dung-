  url: https://github.com/crystallpunk-14/crystalledge/pull/240
- author: TheShuEd
  changes:
  - message: The time during which you can join a level where another player is currently
      playing now varies by floor and depends on the floor's size. The larger the
      floor, the more time is allowed for players to connect.
    type: Tweak
  id: 10026
