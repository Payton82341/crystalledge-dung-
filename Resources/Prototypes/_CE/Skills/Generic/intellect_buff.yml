- type: skill
  parent: BaseMageSkill
  id: IntellectBuff
  effect: !type:AddAction
    action: CEActionMageIntellectBuff

- type: entity
  id: CEActionMageIntellectBuff
  parent: CEActionSpellBase
  name: Arcane Intellect
  description: You will temporarily receive an additional [color=#3296fa]+4 Intelligence[/color].
  components:
  - type: CEActionManaCost
    manaCost: 5
  - type: Action
    useDelay: 30
    icon:
      sprite: _CE/Skills/intellect_buff.rsi
      state: icon
  - type: DoAfterArgs
    delay: 1
  - type: InstantAction
    event: !type:CEInstantModularEffectEvent
      telegraphyEffects:
      - !type:CESpellSpawnEntityOnTarget
        spawns:
        - CEImpactEffectMageIntellectBuff
      effects:
      - !type:CESpellSpawnEntityOnTarget
        spawns:
        - CEImpactEffectMageIntellectBuff
      - !type:CESpellApplyStatusEffect
        statusEffect: CEStatusEffectMageIntellectBuff
        duration: 60

- type: entity
  id: CEImpactEffectMageIntellectBuff
  parent: CEBaseMagicImpact
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    layers:
    - state: particles_up
      color: "#0c6cff"
      shader: unshaded

- type: entity
  id: CEStatusEffectMageIntellectBuff
  name: arcane intellect
  components:
  - type: StatusEffect
  - type: StatusEffectAlert
    alert: CESpellAlertMageIntellectBuff
  - type: Sprite
    drawdepth: Effects
    sprite: _CE/Effects/cast_impact48.rsi
    noRot: true
    layers:
    - state: particles_up
      color: "#0c6cff"
      shader: unshaded
  - type: PointLight
    radius: 1.5
    energy: 1
    color: "#0c6cff"
  - type: CEStatusEffectModifyStats
    modifyStats:
      Intelligence: 4

- type: alert
  id: CESpellAlertMageIntellectBuff
  icons:
  - sprite: _CE/Skills/intellect_buff.rsi
    state: icon
