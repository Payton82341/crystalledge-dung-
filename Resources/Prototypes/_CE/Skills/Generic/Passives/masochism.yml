- type: entity
  id: CEStatusEffectMasochism
  name: Masochism
  description: You restore [color=#3296fa]1 mana[/color] each time you take damage.
  components:
  - type: StatusEffect
  - type: StatusEffectAlert
    alert: CEMasochism
  - type: CEMasochismStatusEffect
    manaRestore: 1

- type: alert
  id: CEMasochism
  alertViewEntity: CEMasochismAlertSpriteView
  icons:
  - sprite: _CE/Skills/General/masochism.rsi
    state: icon

- type: entity
  id: CEMasochismAlertSpriteView
  categories: [ HideSpawnMenu ]
  components:
  - type: GenericCounterAlert
    centerGlyph: false
    hideLeadingZeroes: true
  - type: Sprite
    sprite: /Textures/Interface/Alerts/essence_counter.rsi
    layers:
    - sprite: _CE/Skills/General/masochism.rsi
      state: icon
    - map: [ "1" ]
      offset: 0.65, 0
    - map: [ "10" ]
      offset: 0.45, 0
    - map: [ "100" ]
      offset: 0.25, 0
