- type: skill
  parent: BaseWarriorSkill
  id: Unbreakable
  effect: !type:AddAction
    action: CEActionUnbreakable

- type: entity
  id: CEActionUnbreakable
  parent: CEActionSpellBase
  name: Unbreakable
  description: You will temporarily receive an additional [color=#f70d0d]+2 Vitality[/color].
  components:
  - type: CEActionManaCost
    manaCost: 5
  - type: Action
    useDelay: 5
    icon:
      sprite: _CE/Skills/unbreakable.rsi
      state: icon
  - type: InstantAction
    event: !type:CEInstantActionAnimationEvent
      animation: AnimationUnbreakable

- type: entityEffectAnimation
  id: AnimationUnbreakable
  movementSpeed: 0.3
  duration: 0.6
  lockRotation: false
  events:
    0:
    - !type:SpawnEntityOnTarget
      spawns:
      - CEImpactEffectUnbreakable
    0.5:
    - !type:SpawnEntityOnTarget
      spawns:
      - CEImpactEffectUnbreakable
    - !type:ApplyStatusEffect
      statusEffect: CEStatusEffectUnbreakable
      duration: 10

- type: entity
  id: CEImpactEffectUnbreakable
  parent: CEBaseMagicImpact
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    layers:
    - state: particles_up
      color: "#ff0c0c"
      shader: unshaded

- type: entity
  id: CEStatusEffectUnbreakable
  name: unbreakable
  components:
  - type: StatusEffect
  - type: StatusEffectAlert
    alert: CESpellAlertUnbreakable
  - type: Sprite
    drawdepth: Effects
    sprite: _CE/Effects/cast_impact48.rsi
    noRot: true
    layers:
    - state: particles_up
      color: "#f70d0d"
      shader: unshaded
  - type: PointLight
    radius: 1.5
    energy: 1
    color: "#f70d0d"
  - type: CEStatusEffectModifyStats
    modifyStats:
      Vitality: 2

- type: alert
  id: CESpellAlertUnbreakable
  alertViewEntity: CEUnbreakableAlertSpriteView
  icons:
  - sprite: _CE/Skills/unbreakable.rsi
    state: icon

- type: entity
  id: CEUnbreakableAlertSpriteView
  categories: [ HideSpawnMenu ]
  components:
  - type: GenericCounterAlert
    centerGlyph: false
    hideLeadingZeroes: true
  - type: Sprite
    sprite: /Textures/Interface/Alerts/essence_counter.rsi
    layers:
    - sprite: _CE/Skills/unbreakable.rsi
      state: icon
    - map: [ "1" ]
      offset: 0.65, 0
    - map: [ "10" ]
      offset: 0.45, 0
    - map: [ "100" ]
      offset: 0.25, 0
