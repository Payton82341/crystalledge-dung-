- type: skill
  parent: BasePriestSkill
  id: AreaHealing
  effect: !type:AddAction
    action: CEActionSpellAreaHealing

- type: entity
  id: CEActionSpellAreaHealing
  parent: CEActionSpellBase
  name: Prayer for health
  description: You restore [color=#1defa9]2 health[/color] to all creatures in a small area.
  components:
  - type: CEVisualizeRadiusTargetAction
  - type: CEVisualizeAoEZoneAction
    radius: 1.5 #Healing radius
  - type: CEActionDoAfterSlowdown
    speedMultiplier: 0.5
  - type: CEActionManaCost
    manaCost: 2
  - type: DoAfterArgs
    delay: 1.5
    breakOnDamage: true
  - type: CEActionSpeaking
    startSpeech: "Et curabuntur..."
    endSpeech: "vulnera tua"
  - type: CEActionDoAfterVisuals
    proto: CERuneCureWounds
  - type: Action
    useDelay: 5
    icon:
      sprite: _CE/Skills/area_healing.rsi
      state: icon
  - type: TargetAction
    range: 3
    interactOnMiss: false
  - type: WorldTargetAction
    event: !type:CEWorldTargetModularEffectEvent
      telegraphyEffects:
      - !type:SpawnEntityOnTarget
        spawns:
        - CEImpactEffectCureWounds
      effects:
      - !type:AreaEffect
        range: 1.5
        affectCaster: true
        effects:
        - !type:SpawnEntityOnTarget
          spawns:
          - CEImpactEffectCureWounds
        - !type:Heal
          amount: 2
