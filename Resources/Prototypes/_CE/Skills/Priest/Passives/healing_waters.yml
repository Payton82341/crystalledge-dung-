- type: skill
  parent: BasePriestSkill
  id: HealingWaters
  effect: !type:AddStatusEffect
    effect: CEStatusEffectHealingWaters

- type: entity
  id: CEStatusEffectHealingWaters
  name: Healing Waters
  description: When you heal a [color=#1db7ef]wet target[/color], you heal [color=#1defa9]10 health[/color] more and dry it off.
  components:
  - type: StatusEffect
  - type: StatusEffectAlert
    alert: CEHealingWaters
  - type: CEHealingWatersStatusEffect
    additionalHeal: 10

- type: alert
  id: CEHealingWaters
  alertViewEntity: CEHealingWatersAlertSpriteView
  icons:
  - sprite: _CE/Skills/Priest/healing_waters.rsi
    state: icon

- type: entity
  id: CEHealingWatersAlertSpriteView
  categories: [ HideSpawnMenu ]
  components:
  - type: GenericCounterAlert
    centerGlyph: false
    hideLeadingZeroes: true
  - type: Sprite
    sprite: /Textures/Interface/Alerts/essence_counter.rsi
    layers:
    - sprite: _CE/Skills/Priest/healing_waters.rsi
      state: icon
    - map: [ "1" ]
      offset: 0.65, 0
    - map: [ "10" ]
      offset: 0.45, 0
    - map: [ "100" ]
      offset: 0.25, 0
