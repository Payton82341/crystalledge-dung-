- type: skill
  parent: BasePriestSkill
  id: Apostasy
  effect: !type:AddStatusEffect
    effect: CEStatusEffectApostasy

- type: entity
  id: CEStatusEffectApostasy
  name: Apostasy
  description: All your healing now deals double [color=#E1341E]Fire[/color] damage instead.
  components:
  - type: StatusEffect
  - type: StatusEffectAlert
    alert: CEChangeHealType
  - type: CEChangeHealTypeStatusEffect
    target: Fire
    damageMultiplier: 2

- type: alert
  id: CEChangeHealType
  icons:
  - sprite: _CE/Skills/apostasy.rsi
    state: icon

- type: entity
  id: CEEffectApostasyFire
  parent: CEBaseMagicImpact
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    drawdepth: Effects
    sprite: _CE/Effects/apostasy.rsi
    layers:
    - state: effect
      shader: unshaded
  - type: PointLight
    color: "#ffd46e"
    radius: 1.5
  - type: TimedDespawn
    lifetime: 1.5
  - type: LightBehaviour
    behaviours:
      - !type:PulseBehaviour
        interpolate: Linear
        maxDuration: 2.5
        startValue: 0
        endValue: 5.0
        property: Energy
        isLooped: false
        enabled: true
