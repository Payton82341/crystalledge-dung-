- type: skill
  parent: BasePriestSkill
  id: DivineShield
  effect: !type:AddAction
    action: CEActionSpellDivineShield

- type: entity
  id: CEActionSpellDivineShield
  parent: CEActionSpellBase
  name: Divine Shield
  description: You apply a [color=#1defa9]1 divine shield[/color] on the target.
  components:
  - type: CEVisualizeRadiusTargetAction
  - type: CEVisualizeAoEZoneAction
    radius: 0.5
  - type: CEActionManaCost
    manaCost: 5
  - type: Action
    useDelay: 5
    icon:
      sprite: _CE/Interface/divine_shield.rsi
      state: shield
  - type: TargetAction
    range: 1
    interactOnMiss: false
  - type: EntityTargetAction
    whitelist:
      components:
      - CEDamageable
    event: !type:CEEntityTargetActionAnimationEvent
      animation: AnimationDivineShield

- type: animationAction
  id: AnimationDivineShield
  movementSpeed: 0.5
  duration: 1.5
  events:
    0:
    #- !type:SpawnEntityOnTarget
    #  spawns:
    #  - CEImpactEffectCureWounds #TODO effect
    - !type:SayChat
      sentence: "Et in necessitate"
    0.2:
    #- !type:SpawnEntityOnTarget
    #  spawns:
    #  - CEImpactEffectCureWounds #TODO effect
    - !type:SayChat
      sentence: "vos protegant"
    - !type:AddDivineShield
