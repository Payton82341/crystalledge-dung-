- type: skill
  parent: BasePriestSkill
  id: WaterBurst
  effect: !type:AddAction
    action: CEActionSpellWaterBurst

- type: entity
  id: CEActionSpellWaterBurst
  parent: CEActionSpellBase
  name: Water Burst
  description: You call upon the waters, drenching a targeted area.
  components:
  - type: CEVisualizeRadiusTargetAction
  - type: CEVisualizeAoEZoneAction
    radius: 3.0
  - type: CEActionManaCost
    manaCost: 10
  - type: CEActionStaminaCost
    cost: 3
  - type: Action
    useDelay: 8
    icon:
      sprite: _CE/Skills/Priest/water_burst.rsi
      state: icon
  - type: TargetAction
    range: 4
    interactOnMiss: false
  - type: WorldTargetAction
    event: !type:CEWorldTargetActionAnimationEvent
      animation: AnimationWaterBurst

- type: entityEffectAnimation
  id: AnimationWaterBurst
  movementSpeed: 0.5
  duration: 1.5
  events:
    0:
    - !type:SpawnEntity
      spawns:
      - CEEffectWaterBurstTelegraphy
    - !type:SayChat
      sentence: "Aqua exsurge"
    1.2:
    - !type:SpawnEntity
      spawns:
      - CEEffectWaterBurstEffect
    - !type:SayChat
      sentence: "flumine!"
    - !type:CETileAffectArea
      tileEffect: CETileEffectWater
      radius: 3
      fallOffFactor: 0.5
      maxStacks: 10
    - !type:ShockWaveVFX
      effectTarget: Target
      width: 0.2

- type: entity
  id: CEEffectWaterBurstTelegraphy
  parent: CEBaseMagicImpact
  categories: [ ForkFiltered ]
  name: water burst telegraphy
  suffix: VFX
  save: false
  components:
  - type: Sprite
    drawdepth: BelowMobs
    sprite: _CE/Effects/water_burst_telegraphy.rsi
    layers:
    - state: effect
      shader: unshaded
  - type: PointLight
    color: "#1e90ff"
    radius: 3.5
  - type: TimedDespawn
    lifetime: 2
  - type: LightBehaviour
    behaviours:
    - !type:PulseBehaviour
      interpolate: Linear
      maxDuration: 2
      startValue: 0
      endValue: 5.0
      property: Energy
      isLooped: false
      enabled: true

- type: entity
  id: CEEffectWaterBurstEffect
  parent: CEBaseMagicImpact
  categories: [ ForkFiltered ]
  name: water burst impact
  suffix: VFX
  save: false
  components:
  - type: Sprite
    sprite: _CE/Effects/TileEffects/water_tile_impact.rsi
    layers:
    - state: effect
      shader: unshaded
  - type: PointLight
    color: "#1e90ff"
    radius: 5
    energy: 4.0
  - type: TimedDespawn
    lifetime: 1.0
