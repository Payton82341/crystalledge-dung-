- type: skill
  parent: BasePriestSkill
  id: Apostasy
  effect: !type:AddAction
    action: CEActionApostasy
  icon:
    sprite: _CE/Skills/Priest/apostasy.rsi
    state: icon

- type: entity
  id: CEActionApostasy
  parent: CEActionSpellBase
  name: Apostasy
  description: You can toggle between Apostasy and normal mode. In Apostasy Mode, all healing is converted into [color=#E1341E]Fire damage[/color].
  components:
  - type: CEActionManaCost
    manaCost: 15
  - type: Action
    useDelay: 5
    icon:
      sprite: _CE/Skills/Priest/apostasy.rsi
      state: icon_off
    iconOn:
      sprite: _CE/Skills/Priest/apostasy.rsi
      state: icon
  - type: InstantAction
    event: !type:CEToggleableStatusEffectEvent
      effects:
        CEStatusEffectApostasy: 1


- type: entity
  id: CEStatusEffectApostasy
  name: Apostasy
  description: All your healing now deals [color=#E1341E]Fire[/color] damage instead.
  components:
  - type: StatusEffect
  - type: StatusEffectAlert
    alert: CEChangeHealType
  - type: CEChangeHealTypeStatusEffect
    target: Fire
    damageMultiplier: 1
  - type: CEStatusEffectVFX
    onAppliedVfx: CEEffectApostasyFire
  - type: PointLight
    color: "#ffd46e"
    radius: 2.5
    energy: 5
  - type: Sprite
    noRot: true
    drawdepth: Effects
    sprite: _CE/Effects/apostasy.rsi
    layers:
    - state: status
      shader: unshaded
  - type: CEAutoFloatingVisuals
    animationTime: 2
    floatingStartOffset: "0.0,0.0"
    floatingOffset: "0.0,0.2"

- type: alert
  id: CEChangeHealType
  icons:
  - sprite: _CE/Skills/Priest/apostasy.rsi
    state: icon

- type: entity
  id: CEEffectApostasyFire
  parent: CEBaseMagicImpact
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    drawdepth: Effects
    sprite: _CE/Effects/apostasy.rsi
    layers:
    - state: effect
      shader: unshaded
  - type: PointLight
    color: "#ffd46e"
    radius: 1.5
  - type: TimedDespawn
    lifetime: 1.5
  - type: LightBehaviour
    behaviours:
      - !type:PulseBehaviour
        interpolate: Linear
        maxDuration: 2.5
        startValue: 0
        endValue: 5.0
        property: Energy
        isLooped: false
        enabled: true
