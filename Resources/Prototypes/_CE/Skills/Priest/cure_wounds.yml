- type: skill
  parent: BasePriestSkill
  id: CureWounds
  effect: !type:AddAction
    action: CEActionSpellCureWounds

- type: entity
  id: CEActionSpellCureWounds
  parent: CEActionSpellBase
  name: Cure wounds
  description: You restore [color=#1defa9]5 health[/color] to the creature you touch.
  components:
  - type: CEVisualizeRadiusTargetAction
  - type: CEVisualizeAoEZoneAction
    radius: 0.5
  - type: CEActionManaCost
    manaCost: 2
  - type: Action
    useDelay: 5
    icon:
      sprite: _CE/Skills/cure_wounds.rsi
      state: icon
  - type: TargetAction
    range: 3
    interactOnMiss: false
  - type: EntityTargetAction
    whitelist:
      components:
      - CEHealth
    event: !type:CEEntityTargetActionAnimationEvent
      animation: AnimationCureWounds

- type: animationAction
  id: AnimationCureWounds
  movementSpeed: 0.5
  duration: 1.5
  events:
    0:
    - !type:SpawnEntityOnTarget
      spawns:
      - CEImpactEffectCureWounds
    - !type:SayChat
      sentence: "Et curabuntur"
    0.4:
    - !type:SpawnEntityOnTarget
      spawns:
      - CEImpactEffectCureWounds
    0.8:
    - !type:SpawnEntityOnTarget
      spawns:
      - CEImpactEffectCureWounds
    1.2:
    - !type:SpawnEntityOnTarget
      spawns:
      - CEImpactEffectCureWounds
    - !type:Heal
      amount: 5
    - !type:SayChat
      sentence: "vulnera tua"

- type: entity
  id: CEImpactEffectCureWounds
  parent: CEBaseMagicImpact
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    layers:
    - state: particles_up
      color: "#cedcdd"
      shader: unshaded
