- type: skill
  parent: BasePriestSkill
  id: CureWounds
  effect: !type:AddAction
    action: CEActionSpellCureWounds

- type: entity
  id: CEActionSpellCureWounds
  parent: CEActionSpellBase
  name: Cure wounds
  description: You restore [color=#1defa9]5 health[/color] to the creature you touch.
  components:
  - type: CEVisualizeRadiusTargetAction
  - type: CEVisualizeAoEZoneAction
    radius: 0.5
  - type: CEActionDoAfterSlowdown
    speedMultiplier: 0.5
  - type: CEActionManaCost
    manaCost: 2
  - type: DoAfterArgs
    delay: 1.5
    breakOnDamage: true
  - type: CEActionSpeaking
    startSpeech: "Et curabuntur..."
    endSpeech: "vulnera tua"
  - type: CEActionDoAfterVisuals
    proto: CERuneCureWounds
  - type: Action
    useDelay: 5
    icon:
      sprite: _CE/Skills/cure_wounds.rsi
      state: icon
  - type: TargetAction
    range: 3
    interactOnMiss: false
  - type: EntityTargetAction
    whitelist:
      components:
      - CEHealth
    event: !type:CEEntityTargetModularEffectEvent
      telegraphyEffects:
      - !type:SpawnEntityOnTarget
        spawns:
        - CEImpactEffectCureWounds
      effects:
      - !type:SpawnEntityOnTarget
        spawns:
        - CEImpactEffectCureWounds
      - !type:Heal
        amount: 5

- type: entity
  id: CERuneCureWounds
  parent: CEBaseMagicRune
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: PointLight
    color: "#cedcdd"
  - type: Sprite
    layers:
    - state: sun
      color: "#cedcdd"
      shader: unshaded

- type: entity
  id: CEImpactEffectCureWounds
  parent: CEBaseMagicImpact
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    layers:
    - state: particles_up
      color: "#cedcdd"
      shader: unshaded
