- type: skill
  parent: BaseKnightSkill
  id: Cruelty
  effect: !type:AddAction
    action: CEActionSpellCruelty

- type: entity
  id: CEActionSpellCruelty
  parent: CEActionSpellBase
  name: Cruelty
  description: Your next melee attack applies [color=#b2e3eb]5 Bruise[/color] stacks, increasing the physical damage taken by targets.
  components:
  - type: CEActionDangerous
  - type: CEActionManaCost
    manaCost: 4
  - type: CEActionWeaponRequired
  - type: Action
    useDelay: 10
    icon:
      sprite: _CE/Skills/Knight/focus.rsi
      state: icon
  - type: InstantAction
    event: !type:CEInstantActionAnimationEvent
      animation: AnimationCruelty

- type: entityEffectAnimation
  id: AnimationCruelty
  movementSpeed: 0.5
  duration: 1
  events:
    0:
    - !type:PlaySound
      sound:
        path: /Audio/Magic/rumble.ogg
    - !type:ActiveHandEntityAnimation
      offsetAnimation:
      - time: 0
        offset: -0, -0.3
        easing: QuadIn
      - time: 0.4
        offset: -0.5, -0.2
      - time: 0.8
        offset: -0.5, 0.1
        easing: QuadOut
      rotationAnimation:
      - time: 0
        rotation: 90
        easing: QuadIn
      - time: 0.4
        rotation: -30
      - time: 0.8
        rotation: -90
        easing: QuadOut
      colorAnimation:
        - time: 0.9
          color: "#ffffff"
        - time: 1
          color: "#ffffff01"
    0.6:
    - !type:UsedEntityAnimation
      dummyEntity: CEEffectCrueltyTelegraphy
      offsetAnimation:
      - time: 0
        offset: -0.6, 0.1
    - !type:ApplyStatusEffectStack
      effectTarget: User
      statusEffect: CEStatusEffectCruelty
      duration: 10

- type: entity
  id: CEEffectCrueltyTelegraphy
  parent: CEBaseMagicImpact
  categories: [ ForkFiltered ]
  suffix: VFX
  name: focus cruelty
  save: false
  components:
  - type: Sprite
    drawdepth: Effects
    sprite: _CE/Effects/critical_charge.rsi
    layers:
    - state: effect
      shader: unshaded
  - type: PointLight
    color: "#ff0505"
    radius: 1.5
  - type: TimedDespawn
    lifetime: 1.5
  - type: LightBehaviour
    behaviours:
      - !type:PulseBehaviour
        interpolate: Linear
        maxDuration: 1.5
        startValue: 0
        endValue: 5.0
        property: Energy
        isLooped: false
        enabled: true

- type: entity
  id: CEStatusEffectCruelty
  name: Cruelty
  description: Your next melee attack applies [color=#b2e3eb]5 Bruise[/color] stacks, increasing the physical damage taken by targets.
  components:
  - type: StatusEffect
  - type: StatusEffectAlert
    alert: CECruelty
  - type: CEEffectOnAttackStatusEffect
    stackCost: 1
    effects:
    - !type:ApplyStatusEffectStack
      statusEffect: CEStatusEffectBruise
      stack: 5

- type: alert
  id: CECruelty
  icons:
  - sprite: _CE/Skills/Knight/focus.rsi
    state: icon
