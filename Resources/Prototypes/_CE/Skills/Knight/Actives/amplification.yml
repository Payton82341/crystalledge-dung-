- type: skill
  parent: BaseKnightSkill
  id: Amplification
  effect: !type:AddAction
    action: CEActionSpellAmplification

- type: entity
  id: CEActionSpellAmplification
  parent: CEActionSpellBase
  name: Amplification
  description: Gives you [color=#b2e3eb]10 stacks of Strength[/color], increasing melee damage.
  components:
  - type: Sprite
    sprite: _CE/Interface/strength.rsi
    state: icon
  - type: CEActionManaCost
    manaCost: 3
  - type: Action
    useDelay: 10
    icon:
      sprite: _CE/Interface/strength.rsi
      state: icon
  - type: InstantAction
    event: !type:CEInstantActionAnimationEvent
      animation: AnimationAmplification

- type: entityEffectAnimation
  id: AnimationAmplification
  movementSpeed: 0.5
  duration: 1
  events:
    0:
    - !type:PlaySound
      sound:
        path: /Audio/Effects/bite.ogg
        params:
          pitch: 0.5
    - !type:SpawnEntity
      spawns:
      - CEEffectAmplification
      reparent: true
    0.6:
    - !type:ApplyStatusEffectStack
      effectTarget: User
      statusEffect: CEStatusEffectStrength
      stack: 10

- type: entity
  id: CEEffectAmplification
  parent: CEBaseMagicImpact
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    drawdepth: Effects
    sprite: _CE/Effects/amplification.rsi
    layers:
    - state: effect
      shader: unshaded
  - type: PointLight
    color: "#ef1919"
    radius: 2.5
  - type: TimedDespawn
    lifetime: 2
  - type: LightBehaviour
    behaviours:
      - !type:PulseBehaviour
        interpolate: Linear
        maxDuration: 3
        startValue: 0
        endValue: 5.0
        property: Energy
        isLooped: false
        enabled: true
