- type: skill
  parent: BaseKnightSkill
  id: BloodAndSweat
  icon:
    sprite: _CE/Skills/unbreakable.rsi #TODO custom icon
    state: icon
  effect: !type:AddAction
    action: CEActionBloodAndSweat

- type: entity
  id: CEActionBloodAndSweat
  parent: CEActionSpellBase
  name: Through Blood and Sweat
  description: Take [color=#ef2b1d]1 damage[/color] and restore [color=#2bef1d]10 stamina[/color] after a short delay.
  components:
  - type: Action
    useDelay: 2
    icon:
      sprite: _CE/Skills/unbreakable.rsi #TODO custom icon
      state: icon
  - type: InstantAction
    event: !type:CEInstantActionAnimationEvent
      animation: AnimationBloodAndSweat

- type: entityEffectAnimation
  id: AnimationBloodAndSweat
  duration: 0.25
  lockRotation: false
  events:
    0:
    - !type:SpawnEntity
      effectTarget: User
      spawns:
      - CEEffectBloodAndSweat
    0.2:
    - !type:SpawnEntity
      effectTarget: User
      spawns:
      - CEEffectBloodAndSweat
    - !type:Damage
      damage:
        types:
          Physical: 1
    - !type:RestoreStamina
      amount: 10

- type: entity
  parent: CEEffectAreaHealingTelegraphy #TODO custom effect
  id: CEEffectBloodAndSweat
  components:
  - type: Sprite
    drawdepth: Effects
    sprite: _CE/Effects/healing_generic.rsi
    layers:
    - state: effect
      shader: unshaded
      color: "#ef2b1d"
  - type: PointLight
    radius: 1.5
    color: "#ef2b1d"
