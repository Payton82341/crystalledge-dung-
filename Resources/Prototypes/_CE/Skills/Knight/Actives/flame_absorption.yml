- type: skill
  parent: BaseKnightSkill
  id: FlameAbsorption
  effect: !type:AddAction
    action: CEActionSpellFlameAbsorption

- type: entity
  id: CEActionSpellFlameAbsorption
  parent: CEActionSpellBase
  name: Flame Absorption
  description: Converts all [color=#ff8a05]fire[/color] stacks into [color=#b2e3eb]Strength[/color].
  components:
  - type: Sprite
    sprite: _CE/Skills/Knight/fire_absorption.rsi
    state: icon
  - type: CEActionManaCost
    manaCost: 2
  - type: Action
    useDelay: 8
    icon:
      sprite: _CE/Skills/Knight/fire_absorption.rsi
      state: icon
  - type: InstantAction
    event: !type:CEInstantActionAnimationEvent
      animation: AnimationFlameAbsorption

- type: entityEffectAnimation
  id: AnimationFlameAbsorption
  movementSpeed: 0.5
  duration: 1
  events:
    0:
    - !type:PlaySound
      sound:
        path: /Audio/_CE/Effects/apostasy_fire.ogg
        params:
          pitch: 0.5
          volume: 10
    - !type:SpawnEntity
      spawns:
      - CEEffectFlameAbsorption
      reparent: true
    0.6:
    - !type:StatusEffectConversion
      effectTarget: User
      sourceEffect: CEStatusEffectFire
      targetEffect: CEStatusEffectStrength
      ratio: 1

- type: entity
  id: CEEffectFlameAbsorption
  parent: CEBaseMagicImpact
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    drawdepth: Effects
    sprite: _CE/Effects/fire_absorbtion.rsi
    layers:
    - state: effect
      shader: unshaded
  - type: PointLight
    color: "#ef6b19"
    radius: 2.5
  - type: TimedDespawn
    lifetime: 3
  - type: LightBehaviour
    behaviours:
      - !type:PulseBehaviour
        interpolate: Linear
        maxDuration: 3
        startValue: 0
        endValue: 5.0
        property: Energy
        isLooped: false
        enabled: true
