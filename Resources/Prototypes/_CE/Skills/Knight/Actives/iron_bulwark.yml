- type: skill
  parent: BaseKnightSkill
  id: IronBulwark
  effect: !type:AddAction
    action: CEActionSpellIronBulwark

- type: entity
  id: CEActionSpellIronBulwark
  parent: CEActionSpellBase
  name: Iron Bulwark
  description: Grants [color=#b2e3eb]50 temporary physical shields[/color] that absorb damage. Shields decay over time.
  components:
  - type: Sprite
    sprite: _CE/Skills/Knight/iron_bulwark.rsi
    state: icon
  - type: CEActionManaCost
    manaCost: 2
  - type: Action
    useDelay: 10
    icon:
      sprite: _CE/Skills/Knight/iron_bulwark.rsi
      state: icon
  - type: InstantAction
    event: !type:CEInstantActionAnimationEvent
      animation: IronBulwark

- type: entityEffectAnimation
  id: IronBulwark
  movementSpeed: 0.5
  duration: 1
  events:
    0:
    - !type:PlaySound
      sound:
        path: /Audio/Effects/clang.ogg
        params:
          pitch: 0.7
    0.6:
    - !type:ApplyStatusEffectStack
      effectTarget: User
      statusEffect: CEStatusEffectTempShield
      stack: 50
