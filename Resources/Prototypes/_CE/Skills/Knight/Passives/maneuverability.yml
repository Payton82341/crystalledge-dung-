- type: skill
  parent: BaseKnightSkill
  id: Maneuverability
  icon:
    sprite: _CE/Skills/todo.rsi
    state: icon
  effect: !type:AddStatusEffect
    effect: CEStatusEffectManeuverability

- type: entity
  id: CEStatusEffectManeuverability
  name: Maneuverability
  description: Taking damage grants [color=#c3ec49]1 Acceleration[/color] stacks.
  components:
  - type: StatusEffect
  - type: StatusEffectAlert
    alert: CERagingFury
  - type: CEEffectOnDamagedStatusEffect
    effects:
    - !type:ApplyStatusEffectStack
      effectTarget: User
      statusEffect: CEStatusEffectAcceleration
      amount: 2
      max: 10

- type: alert
  id: CERagingFury
  icons:
  - sprite: _CE/Skills/todo.rsi
    state: icon
