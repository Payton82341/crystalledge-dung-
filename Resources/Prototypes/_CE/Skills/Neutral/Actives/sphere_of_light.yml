- type: skill
  parent: BaseNeutralSkill
  id: SphereOfLight
  weight: 0.5
  effect: !type:AddAction
    action: CEActionSpellSphereOfLight

- type: entity
  id: CEActionSpellSphereOfLight
  parent: CEActionSpellBase
  name: Sphere of Light
  description: You can make almost any object glow for a long time at will.
  components:
  - type: CEVisualizeRadiusTargetAction
  - type: CEVisualizeAoEZoneAction
    radius: 3 #Light radius
  - type: CEActionManaCost
    manaCost: 1
  - type: CEActionFreeHandsRequired
  - type: Action
    useDelay: 10
    icon:
      sprite: _CE/Skills/Neutral/sphere_of_light.rsi
      state: icon
  - type: TargetAction
    range: 5
  - type: EntityTargetAction
    whitelist:
      components:
      - CEMobState
      - Item
      - Anchorable
    event: !type:CEEntityTargetActionAnimationEvent
      animation: AnimationSphereOfLight

- type: entityEffectAnimation
  id: AnimationSphereOfLight
  movementSpeed: 0.5
  duration: 1.0
  events:
    0:
    - !type:SpawnEntity
      spawns:
      - CEImpactEffectSphereOfLight
    - !type:SayChat
      sentence: "Appare in manu tua"
    0.5:
    - !type:ApplyStatusEffect
      statusEffect: CEStatusEffectGlowing
      duration: 120
    - !type:SayChat
      sentence: "sphaera lucis"

- type: entity
  id: CEImpactEffectSphereOfLight
  parent: CEBaseMagicImpact
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    layers:
    - state: particles_up
      color: "#efedff"
      shader: unshaded

- type: entity
  id: CEStatusEffectGlowing
  name: glowing
  components:
  - type: StatusEffect
  - type: StatusEffectAlert
    alert: CEGlowing
  - type: Sprite
    drawdepth: Effects
    sprite: _CE/Effects/sphere_of_light.rsi
    offset: 0, 1
    noRot: true
    layers:
    - state: icon
      shader: unshaded
  - type: PointLight
    radius: 5.0
    energy: 3
    color: "#efedff"

- type: alert
  id: CEGlowing
  icons:
  - sprite: _CE/Skills/Neutral/sphere_of_light.rsi
    state: icon
