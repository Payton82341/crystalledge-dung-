- type: skill
  parent: BaseNeutralSkill
  id: WaterCreation
  weight: 0.5
  effect: !type:AddAction
    action: CEActionWaterCreation
  restrictions:
   - !type:JobWhitelist
     inverted: true
     jobs:
     - CEPriest # Priest have more powerful analogue of this skill (waterblast)

- type: entity
  id: CEActionWaterCreation
  parent: CEActionSpellBase
  name: Water creation
  description: You create a temporary [color=#30caf5]water sphere[/color], which you can throw.
  components:
  - type: CEActionManaCost
    manaCost: 3
  - type: CEActionStaminaCost
    cost: 2
  - type: Action
    useDelay: 5
    icon:
      sprite: _CE/Skills/Neutral/water_creation.rsi
      state: icon
  - type: InstantAction
    event: !type:CEInstantActionAnimationEvent
      animation: AnimationWaterCreation

- type: entityEffectAnimation
  id: AnimationWaterCreation
  movementSpeed: 0.3
  duration: 1.5
  lockRotation: true
  events:
    0:
    - !type:SpawnEntity
      reparent: true
      effectTarget: User
      spawns:
      - CEEffectWaterCreation
    - !type:PlaySound
      sound:
        path: /Audio/Effects/Fluids/watersplash.ogg
    0.6:
    - !type:SpawnInHandEntity
      spawns:
      - CEConsumableWaterDrop

- type: entity
  id: CEEffectWaterCreation
  parent: CEBaseMagicImpact
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    drawdepth: Effects
    sprite: _CE/Effects/water_consume.rsi
    layers:
    - state: effect
      shader: unshaded
  - type: PointLight
    color: "#155aee"
    radius: 1.5
  - type: TimedDespawn
    lifetime: 2
  - type: LightBehaviour
    behaviours:
      - !type:PulseBehaviour
        interpolate: Linear
        maxDuration: 2
        startValue: 0
        endValue: 5.0
        property: Energy
        isLooped: false
        enabled: true

- type: entity
  id: CEConsumableWaterDrop
  parent: BaseItem
  categories: [ ForkFiltered ]
  name: water droplet
  description: Magic water, condensed into a droplet. It can be thrown to get something wet.
  components:
  - type: Item
    size: Tiny
    inhandVisuals:
      left:
      - state: inhand-left-fill1
        color: "#4ca8f3"
      right:
      - state: inhand-right-fill1
        color: "#4ca8f3"
  - type: CEDamageable
  - type: CEDamageOnLand
    damage:
      types:
        Physical: 1
  - type: CEDestructible
    destroyThreshold: 1
  - type: Sprite
    sprite: _CE/Objects/Consumable/liquid_drop.rsi
    layers:
    - state: liq-1
      color: "#4ca8f3"
  - type: CEConsumable
    useDelay: 1.5
    useSound:
      path: /Audio/Effects/Fluids/watersplash.ogg
    effects:
    - !type:ApplyStatusEffectStack
      statusEffect: CEStatusEffectWet
      amount: 6
  - type: CEDestructionEffect
    effects:
    - !type:CETileAffectArea
      tileEffect: CETileEffectWater
      radius: 1
      maxStacks: 6
  - type: TimedDespawn
    lifetime: 120
