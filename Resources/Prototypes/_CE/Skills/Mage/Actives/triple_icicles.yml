- type: skill
  parent: BaseMageSkill
  id: TripleIcicles
  effect: !type:AddAction
    action: CEActionTripleIcicles

- type: entity
  id: CEActionTripleIcicles
  parent: CEActionSpellBase
  name: Triple Icicles
  description: You unleash three icicles that deal [color=#30caf5]cold[/color] damage and [color=#30caf5]freeze[/color] the area on hit.
  components:
  - type: Sprite
    sprite: _CE/Skills/Mage/triple_icicle.rsi
    state: icon
  - type: CEVisualizeWideLineAction
    projectileMode: true
    width: 0.5
  - type: CEActionManaCost
    manaCost: 3
  - type: Action
    useDelay: 3
    icon:
      sprite: _CE/Skills/Mage/triple_icicle.rsi
      state: icon
  - type: TargetAction
    checkCanAccess: false
    range: 20
  - type: WorldTargetAction
    event: !type:CEWorldTargetActionAnimationEvent
      animation: AnimationTripleIcicles

- type: entityEffectAnimation
  id: AnimationTripleIcicles
  movementSpeed: 0.3
  duration: 0.7
  lockRotation: true
  events:
    0:
    - !type:UsedEntityAnimation
      dummyEntity: CEProjectileTripleIcicle
      offsetAnimation:
      - time: 0.0
        offset: -0.5, 0
      - time: 0.2
        offset: -0.4, -0.2
      - time: 0.25
        offset: -0.3, -0.5
        easing: QuadIn
      - time: 0.3
        offset: 0, -0.7
        easing: QuadOut
      rotationAnimation:
      - time: 0.0
        rotation: -45
      - time: 0.3
        rotation: 0
    0.2:
    - !type:UsedEntityAnimation
      dummyEntity: CEProjectileTripleIcicle
      offsetAnimation:
      - time: 0.0
        offset: -0.5, 0
      - time: 0.2
        offset: -0.4, -0.2
      - time: 0.25
        offset: -0.3, -0.5
        easing: QuadIn
      - time: 0.3
        offset: 0, -0.7
        easing: QuadOut
      rotationAnimation:
      - time: 0.0
        rotation: -45
      - time: 0.3
        rotation: 0
    - !type:ShootProjectile
      projectileSpeed: 12
      projectileMaxSpeed: 12
      prototype: CEProjectileTripleIcicle
      projectileCount: 1
    0.4:
    - !type:UsedEntityAnimation
      dummyEntity: CEProjectileTripleIcicle
      offsetAnimation:
      - time: 0.0
        offset: -0.5, 0
      - time: 0.2
        offset: -0.4, -0.2
      - time: 0.25
        offset: -0.3, -0.5
        easing: QuadIn
      - time: 0.3
        offset: 0, -0.7
        easing: QuadOut
      rotationAnimation:
      - time: 0.0
        rotation: -45
      - time: 0.3
        rotation: 0
    - !type:ShootProjectile
      projectileSpeed: 12
      projectileMaxSpeed: 12
      prototype: CEProjectileTripleIcicle
      projectileCount: 1
    0.6:
    - !type:ShootProjectile
      projectileSpeed: 12
      projectileMaxSpeed: 12
      prototype: CEProjectileTripleIcicle
      projectileCount: 1

- type: entity
  id: CEProjectileTripleIcicle
  name: triple icicle
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _CE/Skills/Mage/triple_icicle.rsi
    layers:
    - state: projectile
      shader: unshaded
  - type: PointLight
    color: "#30caf5"
    radius: 1.8
    energy: 4.0
  - type: CEProjectile
    hitEffects:
    - !type:CETileAffectArea
      tileEffect: CETileEffectFreeze
      radius: 1.5
      maxStacks: 6
    - !type:AreaEffect
      affectCaster: false
      range: 1.5
      effects:
      - !type:Damage
        attackType: Ranged
        damage:
          types:
            Cold: 10
      - !type:ApplyStatusEffectStack
        statusEffect: CEStatusEffectColdSlowdown
        amount: 2
        max: 5
