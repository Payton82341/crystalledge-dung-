- type: entity
  id: CEGodRays
  categories: [ ForkFiltered ]
  name: god rays
  suffix: Sun
  components:
  - type: Sprite
    sprite: _CE/Effects/god_rays.rsi
    drawdepth: Mobs
    noRot: true
    offset: -0.25, 1.5
