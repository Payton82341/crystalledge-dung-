- type: entity
  id: CEZLevelsLadderDirtCliffBase
  abstract: true
  name: dirt cliff
  description: TODO
  components:
  - type: Sprite
    sprite: _CE/Structures/Architecture/Ladders/dirt_cliff.rsi
  - type: Damageable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/break_stone.ogg
          params:
            volume: -6
      - !type:DoActsBehavior
        acts: ["Destruction"]

- type: entity
  parent:
  - CEZLevelLadderBase
  - CEZLevelsLadderDirtCliffBase
  id: CEZLevelLadderDirtCliff
  name: dirt cliff

- type: entity
  parent:
  - CEZLevelLadderCornerBase
  - CEZLevelsLadderDirtCliffBase
  id: CEZLevelLadderDirtCliffCorner
  suffix: Corner
  name: dirt cliff

- type: entity
  parent:
  - CEZLevelLadderCornerInnerBase
  - CEZLevelsLadderDirtCliffBase
  id: CEZLevelLadderDirtCliffCornerInner
  suffix: Inner Corner
  name: dirt cliff
