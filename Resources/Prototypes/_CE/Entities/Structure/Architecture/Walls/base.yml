- type: entity
  abstract: true
  parent: BaseWall
  categories: [ ForkFiltered ]
  id: CEBaseWall
  name: wall
  description: Sturdy enough to cover you from threats or cold winds.
  placement:
    mode: SnapgridCenter
    snap:
    - Wall
  components:
  - type: CEZPhysics
  - type: Transform
    noRot: true
  - type: Sprite
    drawdepth: Mobs
  - type: IconSmooth
    key: CEwall
    base: stone
  - type: Icon
    state: full
  - type: PlacementReplacement
    key: walls
  - type: CEAutoTilePlacement
  - type: Occluder
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        mask:
        - FullTileMask
        layer:
        - WallLayer
        density: 1000
  - type: CEZLevelHighGround
