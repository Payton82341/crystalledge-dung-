- type: entity
  id: CEBaseWallDestructable
  parent: CEBaseWall
  abstract: true
  components:
  - type: Damageable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/break_stone.ogg
          params:
            volume: -6
      - !type:DoActsBehavior
        acts: ["Destruction"]

- type: entity
  id: CEWallDirt
  name: dirt
  parent: CEBaseWallDestructable
  components:
  - type: Sprite
    sprite: _CE/Structures/Architecture/Walls/dirt.rsi
  - type: Icon
    sprite: _CE/Structures/Architecture/Walls/dirt.rsi
  #- type: CEAutoTilePlacement
  #  tile: CEStonebricks
  - type: IconSmooth
    key: natural_walls
    base: wall
