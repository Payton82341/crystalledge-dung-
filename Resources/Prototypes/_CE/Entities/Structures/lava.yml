- type: entity
  id: CELava
  name: lava
  description: TODO
  categories: [ "ForkFiltered" ]
  placement:
    mode: SnapgridCenter
  components:
  - type: PlacementReplacement
    key: floorTile
  - type: Transform
    anchored: true
  - type: Sprite
    sprite: _CE/Structures/Nature/lava.rsi
    layers:
    - state: static
      shader: unshaded
    drawdepth: Puddles
  - type: SyncSprite
  - type: TileEmission
    color: "#ffc400"
  - type: CEIconSmooth
    key: floorTile
    additionalKeys:
    - CEwall
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      conveyor:
        shape: !type:PolygonShape
          vertices:
          - -0.50,-0.50
          - 0.50,-0.50
          - 0.50,0.50
          - -0.50,0.50
        layer:
        - ConveyorMask
        hard: False
  - type: FloorOccluder
  - type: SpeedModifierContacts
    walkSpeedModifier: 0.2
    sprintSpeedModifier: 0.2
  #- type: FootstepModifier
  #  footstepSoundCollection:
  #    collection: FootstepWater #TODO
  #    params:
  #      volume: 8
  - type: CETileDistortion
    intensity: 0.4
  - type: CEEntityEffectOnCollide
    effects:
    - !type:IgniteEntity
      stacks: 3
      maxStacks: 30

- type: entity
  parent: CELava
  id: CELavaMoving
  suffix: Moving
  components:
  - type: Sprite
    layers:
    - state: moving
      shader: unshaded
    snapCardinals: false
  - type: CETileDistortion
    intensity: 0.6
  - type: CEAutoConveyor
  - type: Conveyor
    speed: 0.15
