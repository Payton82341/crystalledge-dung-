- type: entity
  id: CEWoodenDoorWindowed
  parent:
  - CEBaseDoor
  #- CEBaseFlammableSpreading
  name: wooden windowed door
  description: Not the most solid construction, but it's better than nothing.
  suffix: Opened
  components:
  - type: Sprite
    sprite: _CE/Structures/Architecture/Doors/wooden_windowed_door.rsi
    layers:
    - state: closed
      map: ["enum.DoorVisualLayers.Base"]
  - type: Occluder
    enabled: false
  - type: Door
    occludes: false
  - type: CEArmor
    flat:
      Physical: 1
  - type: CEFlammable
    stackDelta: 2
  - type: CEDamageable
  - type: CEDestructible
    destroyThreshold: 15
    destroySound:
      collection: WoodDestroy

- type: entity
  id: CEWoodenDoorWindowedMirrored
  parent: CEWoodenDoorWindowed
  suffix: Opened, Mirrored
  components:
  - type: Door
    openSpriteState: open_mirrored
    closedSpriteState: closed_mirrored
