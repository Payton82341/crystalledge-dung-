- type: entity
  parent: CEBaseFenceBig
  id: CEBaseFenceGateBig
  abstract: true
  categories: [ ForkFiltered ]
  name: fence big gate
  description: Big man-sized gates. What's your next move?
  components:
  - type: Sprite
    layers:
    - state: door_closed
      map: ["enum.DoorVisualLayers.Base"]
  - type: Icon
    state: door_closed
  - type: InteractionOutline
  - type: Appearance
  - type: Door
    openSpriteState: door_opened
    closedSpriteState: door_closed
    canPry: false
    occludes: false
    changeAirtight: false
    bumpOpen: false
    clickOpen: true
    canCrush: false
    closeTimeOne: 0
    closeTimeTwo: 0
    openTimeOne: 0
    openTimeTwo: 0
    closedDrawDepth: Mobs
    openDrawDepth: Mobs
    openingAnimationTime: 0
    closingAnimationTime: 0
    openSound:
      path: /Audio/Effects/door_open.ogg
    closeSound:
      path: /Audio/Effects/door_close.ogg

- type: entity
  parent:
  - CEBaseFenceGateBig
  id: CEFenceGateBigWooden
  suffix: Wooden
  components:
  - type: Sprite
    sprite: _CE/Structures/Architecture/Fences/wooden_big.rsi
  - type: Icon
    sprite: _CE/Structures/Architecture/Fences/wooden_big.rsi
  - type: CEDamageable
  - type: CEDestructible
    destroyThreshold: 20
    destroySound:
      collection: WoodDestroy
  - type: CEArmor
    flat:
      Physical: 2
  - type: CEFlammable
    stackDelta: 1

- type: entity
  parent:
  - CEBaseFenceGateBig
  id: CEFenceGateBigIron
  suffix: Iron
  components:
  - type: Sprite
    sprite: _CE/Structures/Architecture/Fences/iron_big.rsi
  - type: Icon
    sprite: _CE/Structures/Architecture/Fences/iron_big.rsi

