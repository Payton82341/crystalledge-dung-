- type: entity
  id: CEIce
  name: ice
  description: Slippery cold ice. Watch your step.
  categories: [ ForkFiltered ]
  placement:
    mode: SnapgridCenter
    snap:
      - Wall
  components:
  - type: Transform
    anchored: true
  - type: Clickable
  - type: PlacementReplacement
    key: floorTile
  - type: CEIconSmooth
    key: floorTile
    additionalKeys:
    - CEwall
  - type: Sprite
    drawdepth: FloorTiles
    sprite: _CE/Structures/Nature/ice.rsi
    layers:
    - state: ice1
      map: [ "random" ]
  - type: Appearance
  - type: RandomSprite
    available:
      - random:
          ice1: ""
          ice2: ""
          ice3: ""
          ice4: ""
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        hard: false
        density: 7
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        layer:
        - MidImpassable
  - type: FrictionContacts
  - type: TileFrictionModifier
    modifier: 0.05
  - type: CEMeltTransform
    meltsInto: CEWater

- type: entity
  parent: CEIce
  id: CEIceFrozenStream
  suffix: Frozen Stream
  description: A frozen stream, the current trapped under ice.
  components:
  - type: CEMeltTransform
    meltsInto: CEWaterMoving
