- type: entity
  id: CEWater
  name: water
  description: You're definitely going to get your feet wet
  categories: [ "ForkFiltered" ]
  placement:
    mode: SnapgridCenter
  components:
  - type: PlacementReplacement
    key: floorTile
  - type: Transform
    anchored: true
  - type: Sprite
    sprite: _CE/Structures/Nature/water.rsi
    state: static
    drawdepth: Puddles
  - type: SyncSprite
  - type: CEIconSmooth
    key: floorTile
    additionalKeys:
    - CEwall
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      conveyor:
        shape: !type:PolygonShape
          vertices:
          - -0.40,-0.40
          - 0.40,-0.40
          - 0.40,0.40
          - -0.40,0.40
        layer:
        - ConveyorMask
        hard: False
  - type: FloorOccluder
  - type: SpeedModifierContacts
    walkSpeedModifier: 0.5
    sprintSpeedModifier: 0.5
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepWater
      params:
        volume: 8
  - type: CETileDistortion
    intensity: 0.4
  - type: CEPreventTileEffect
    blocks:
    - CETileEffectFire
    - CETileEffectCursedFire
  - type: CEEntityEffectOnCollide
    effects:
    - !type:ApplyStatusEffectStack
      statusEffect: CEStatusEffectWet
      amount: 1
      max: 5
  - type: CETileEffectTransform
    transforms:
      CETileEffectFreeze: CEIce
  - type: RandomSpawner
    prototypes:
    - CEWaterReeds
    - CEWaterLilies
    chance: 0.4
    offset: 0.1
    deleteSpawnerAfterSpawn: false

- type: entity
  parent: CEWater
  id: CEWaterMoving
  suffix: Moving
  components:
  - type: Sprite
    state: moving
    snapCardinals: false
  - type: CETileDistortion
    intensity: 0.6
  - type: CEAutoConveyor
  - type: CETileEffectTransform
    transforms:
      CETileEffectFreeze: CEIceFrozenStream
  - type: Conveyor
    speed: 0.25

- type: entity
  id: CEIce
  name: ice
  description: Slippery cold ice. Watch your step.
  categories: [ ForkFiltered ]
  placement:
    mode: SnapgridCenter
    snap:
      - Wall
  components:
  - type: Transform
    anchored: true
  - type: Clickable
  - type: PlacementReplacement
    key: floorTile
  - type: CEIconSmooth
    key: floorTile
    additionalKeys:
    - CEwall
  - type: Sprite
    drawdepth: FloorTiles
    sprite: _CE/Structures/Nature/ice.rsi
    layers:
    - state: ice1
      map: [ "random" ]
  - type: Appearance
  - type: RandomSprite
    available:
      - random:
          ice1: ""
          ice2: ""
          ice3: ""
          ice4: ""
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        hard: false
        density: 7
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        layer:
        - MidImpassable
  - type: FrictionContacts
  - type: TileFrictionModifier
    modifier: 0.05
  - type: CETileEffectTransform
    transforms:
      CETileEffectFire: CEWater

- type: entity
  parent: CEIce
  id: CEIceFrozenStream
  suffix: Frozen Stream
  description: A frozen stream, the current trapped under ice.
  components:
  - type: CETileEffectTransform
    transforms:
      CETileEffectFire: CEWaterMoving

