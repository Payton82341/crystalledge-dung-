- type: entity
  id: CEWater
  name: water
  description: TODO
  categories: [ "ForkFiltered" ]
  placement:
    mode: SnapgridCenter
  components:
  - type: PlacementReplacement
    key: floorTile
  - type: Transform
    anchored: true
  - type: Sprite
    sprite: _CE/Structures/Nature/water.rsi
    state: static
    drawdepth: Puddles
  - type: SyncSprite
  - type: CEIconSmooth
    key: floorTile
    additionalKeys:
    - CEwall
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      conveyor:
        shape: !type:PolygonShape
          vertices:
          - -0.50,-0.50
          - 0.50,-0.50
          - 0.50,0.50
          - -0.50,0.50
        layer:
        - ConveyorMask
        hard: False
  - type: FloorOccluder
  - type: SpeedModifierContacts
    walkSpeedModifier: 0.5
    sprintSpeedModifier: 0.5
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepWater
      params:
        volume: 8
  - type: CEWaterDistortion
    intensity: 0.4
  - type: CEWater
  - type: CEFreezeTransform
    freezesInto: CEIce
  - type: RandomSpawner
    prototypes:
    - CEWaterReeds
    - CEWaterLilies
    chance: 0.4
    offset: 0.1
    deleteSpawnerAfterSpawn: false

- type: entity
  parent: CEWater
  id: CEWaterMoving
  suffix: Moving
  components:
  - type: Sprite
    state: moving
    snapCardinals: false
  - type: CEWaterDistortion
    intensity: 0.6
  - type: CEWater
    flowing: true
  - type: CEFreezeTransform
    freezesInto: CEIceFrozenStream
  - type: Conveyor
    speed: 0.25
