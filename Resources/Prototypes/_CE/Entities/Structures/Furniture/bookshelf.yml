- type: entity
  id: CEBookshelfWooden
  categories: [ ForkFiltered ]
  parent:
  - BaseStructure
  name: wooden bookshelf
  description: Mostly filled with books.
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: _CE/Structures/Furniture/bookshelf.rsi
    layers:
      - state: wood
      - state: book-0
      - map: ["enum.StorageFillLayers.Fill"]
  - type: Storage
    grid:
    - 0,0,5,5
    maxItemSize: Normal
    whitelist:
      tags:
        - Document
        - Folder
        - Write
        - Book
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: InteractionOutline
  - type: Clickable
  - type: Anchorable
  - type: Rotatable
  - type: Appearance
  - type: StorageFillVisualizer
    maxFillLevels: 21
    fillBaseName: book
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.05,0.45,0.45"
        density: 75
        mask:
        - MachineMask
        layer:
        - MachineLayer

- type: entity
  id: CEBookshelfWoodenFilled
  parent: CEBookshelfWooden
  suffix: Random filled
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:NestedSelector
        prob: 0.1
        tableId: CECommonBooks
