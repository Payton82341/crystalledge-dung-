- type: entity
  id: CETileEffectStoneSpikes
  parent: CETileEffectBase
  name: stone spikes
  description: TODO
  components:
  - type: Sprite
    drawdepth: Puddles
    snapCardinals: true
    noRot: false
    sprite: _CE/Structures/Nature/stone_spikes.rsi
    layers:
    - state: base1
      map: [ "random" ]
  - type: CETileEffect
    maxStacks: 1
    minDecayInterval: 5
    maxDecayInterval: 5
    stackDelta: 0
  - type: CEEntityEffectOnCollide
    effects:
      - !type:Damage
        attackType: TileEffect
        damage:
          types:
            Physical: 6
  - type: Appearance
  - type: RandomSprite
    available:
      - random:
          base1: ""
          base2: ""
          base3: ""
  - type: SpeedModifierContacts
    walkSpeedModifier: 0.6
    sprintSpeedModifier: 0.6
  - type: CEDamageable
  - type: CEDestructible
    destroyThreshold: 15
    destroySound:
      path: /Audio/Effects/break_stone.ogg
  - type: CETileEffectVFX
    onAppliedVfx: CEDustTileEffect
    onAppliedSound:
      path: /Audio/Effects/break_stone.ogg
  - type: Fixtures
    fixtures:
      fix1:
        hard: false
        shape:
          !type:PhysShapeAabb
          bounds: "-0.3,-0.3,0.3,0.3"
        density: 1000
        mask:
        - ItemMask
        layer:
        - SlipLayer
      fix2:
        hard: true
        shape:
          !type:PhysShapeAabb
          bounds: "-0.3,-0.3,0.3,0.3"
        density: 0
        mask: []
        layer:
        - Opaque

- type: entity
  parent: MarkerBase
  id: CEStoneSpikesSpawner1
  name: tile effect - stone spikes
  suffix: 1
  categories: [ ForkFiltered ]
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: _CE/Structures/Nature/stone_spikes.rsi
      state: base1
  - type: CETileEffectSpawner
    tileEffect: CETileEffectStoneSpikes
    amount: 1


- type: entity
  id: CEDustTileEffect
  name: dust effect
  description: A burst of dust upon impact.
  suffix: VFX
  categories: [ ForkFiltered ]
  components:
  - type: Transform
  - type: Sprite
    sprite: _CE/Effects/TileEffects/dust.rsi
    snapCardinals: true
    layers:
    - state: effect
    drawdepth: Effects
  - type: TimedDespawn
    lifetime: 2.2
