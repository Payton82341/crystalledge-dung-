- type: entity
  id: CETileEffectFire
  parent: CETileEffectBase
  name: fire
  description: A scorching hot flame. You definitely shouldn't touch it just like that.
  components:
  - type: Sprite
    sprite: _CE/Effects/TileEffects/fire_tile.rsi
    layers:
    - state: low_1
      shader: unshaded
      map: [ "fire" ]
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.CETileEffectVisuals.Level:
        fire:
          Low: { state: low_1 }
          Medium: { state: medium_1 }
          High: { state: high_1 }
  - type: AmbientSound
    enabled: true
    volume: -15
    range: 5
    sound:
      path: /Audio/Ambience/Objects/fireplace.ogg #TODO more aggressive sound
  - type: TileEmission
    color: "#ffd051"
  - type: CETileEffect
    maxStacks: 10
    minDecayInterval: 1
    maxDecayInterval: 3
  - type: CETileEffectContactEffects
    contactEffects:
      CEStatusEffectFire: 1
  - type: CETileEffectVFX
    onAppliedVfx: CEFireImpactEffect
    onAppliedSound:
      path: /Audio/_CE/Effects/fire_whoosh.ogg
    onStacksAddedVfx: CEFireImpactEffect
    onStacksAddedSound:
      path: /Audio/_CE/Effects/fire_whoosh.ogg
  - type: CETileEffectNeutralization
    neutralizes:
    - CETileEffectFreeze
    - CETileEffectWater
    vfx: CESteamEffect
  - type: CETileEffectTransform
    transforms:
      CETileEffectCurse: CETileEffectCursedFire


- type: entity
  id: CEFireImpactEffect
  name: fire impact
  description: A burst of fire upon impact.
  suffix: VFX
  categories: [ ForkFiltered ]
  components:
  - type: Transform
  - type: Sprite
    sprite: _CE/Effects/TileEffects/fire_tile_impact.rsi
    snapCardinals: true
    layers:
    - state: effect
    drawdepth: Effects
  - type: TimedDespawn
    lifetime: 2.0
  - type: PointLight
    color: "#f1ff27"
    radius: 2.5
    energy: 2.5
    enabled: true
  - type: LightFade
    duration: 1.0

# Spawners

- type: entity
  parent: MarkerBase
  id: CEFireSpawner1
  name: tile effect - fire
  suffix: 1
  categories: [ ForkFiltered ]
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: _CE/Effects/TileEffects/fire_tile.rsi
      state: low_1
  - type: CETileEffectSpawner
    tileEffect: CETileEffectFire
    amount: 1

- type: entity
  parent: CEFireSpawner1
  id: CEFireSpawner5
  suffix: 5
  components:
  - type: CETileEffectSpawner
    amount: 5

- type: entity
  parent: CEFireSpawner1
  id: CEFireSpawner10
  suffix: 10
  components:
  - type: CETileEffectSpawner
    amount: 10
