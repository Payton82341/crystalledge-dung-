- type: entity
  id: CEStatusEffectWet
  name: Wet
  description: Soaked with water. Fire has no power here.
  components:
  - type: StatusEffect
    whitelist:
      components:
      - CEDamageable
  - type: StatusEffectAlert
    alert: CEWet
  - type: CEStatusEffectNeutralization
    neutralizes:
    - CEStatusEffectFire
    vfx: CESteamEffect
    sound:
      path: /Audio/_CE/Effects/steam_burst.ogg
  - type: CEStatusEffectTransform
    transforms:
      CEStatusEffectColdSlowdown: CEStatusEffectFrozen
  - type: Sprite
    drawdepth: Effects
    sprite: _CE/Effects/water_status.rsi
    noRot: true
    layers:
    - state: effect
  - type: CEStatusEffectStack
    stackDelta: -1
    baseDuration: 8

- type: alert
  id: CEWet
  alertViewEntity: CEWetAlertSpriteView
  name: ce-alert-wet-name
  description: ce-alert-wet-desc
  icons:
  - sprite: _CE/Interface/water.rsi
    state: water

- type: entity
  id: CEWetAlertSpriteView
  categories: [ HideSpawnMenu ]
  components:
  - type: GenericCounterAlert
    centerGlyph: false
    hideLeadingZeroes: true
  - type: Sprite
    sprite: /Textures/Interface/Alerts/essence_counter.rsi
    layers:
    - sprite: _CE/Interface/water.rsi
      state: water
    - map: [ "1" ]
      offset: 0.65, 0
    - map: [ "10" ]
      offset: 0.45, 0
    - map: [ "100" ]
      offset: 0.25, 0
