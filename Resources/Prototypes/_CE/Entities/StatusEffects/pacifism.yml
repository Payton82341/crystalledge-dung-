# Full pacifism status effect — applied by safe zone maps.
- type: entity
  id: CEStatusEffectPacifism
  name: Pacifism
  description: All combat is disabled.
  components:
  - type: StatusEffect
  - type: StatusEffectAlert
    alert: CEPacifism
    showDuration: false
  - type: CEStatusEffectStack
