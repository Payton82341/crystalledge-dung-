- type: entity
  id: CEStatusEffectTempShield
  name: Temporary Shield
  description: Absorbs physical damage, then fades over time.
  components:
  - type: StatusEffect
    whitelist:
      components:
      - CEDamageable
  - type: StatusEffectAlert
    alert: CETempShield
  - type: CETempShieldStatusEffect
    absorbPerStack: 1
    absorbedTypes:
    - Physical
  - type: CEStatusEffectVFX
    onStacksAddedVfx: CEEffectAddTempShieldPhysical
    onStacksRemovedVfx: CEEffectTakeDamageTempShieldPhysical
    onRemovedVfx: CEEffectBreakTempShieldPhysical
  - type: Sprite
    drawdepth: Effects
    noRot: true
  - type: CEStatusEffectStack
    stackDelta: -1
    #baseDuration: 10

- type: alert
  id: CETempShield
  alertViewEntity: CETempShieldAlertSpriteView
  name: ce-alert-temp-shield-name
  description: ce-alert-temp-shield-desc
  icons:
  - sprite: _CE/Interface/temp_shield.rsi
    state: physical

- type: entity
  id: CETempShieldAlertSpriteView
  categories: [ HideSpawnMenu ]
  components:
  - type: GenericCounterAlert
    centerGlyph: false
    hideLeadingZeroes: true
  - type: Sprite
    sprite: /Textures/Interface/Alerts/essence_counter.rsi
    layers:
    - sprite: _CE/Interface/temp_shield.rsi
      state: physical
    - map: [ "1" ]
      offset: 0.65, 0
    - map: [ "10" ]
      offset: 0.45, 0
    - map: [ "100" ]
      offset: 0.25, 0

- type: entity
  id: CEEffectAddTempShieldPhysical
  parent: CEBaseMagicImpact
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    sprite: _CE/Effects/temp_shield.rsi
    layers:
    - state: physical
      shader: unshaded
  - type: LightFade
    duration: 2
  - type: TimedDespawn
    lifetime: 2
  - type: PointLight
    radius: 1.5
    energy: 3
    color: "#ffffff"

- type: entity
  id: CEEffectTakeDamageTempShieldPhysical
  parent: CEBaseMagicImpact
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    sprite: _CE/Effects/temp_shield.rsi
    layers:
    - state: physical_take
      shader: unshaded
  - type: LightFade
    duration: 2
  - type: TimedDespawn
    lifetime: 2
  - type: PointLight
    radius: 1.5
    energy: 3
    color: "#ffffff"

- type: entity
  id: CEEffectBreakTempShieldPhysical
  parent: CEBaseMagicImpact
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    sprite: _CE/Effects/temp_shield.rsi
    layers:
    - state: physical_break
      shader: unshaded
  - type: LightFade
    duration: 2
  - type: TimedDespawn
    lifetime: 2
  - type: PointLight
    radius: 1.5
    energy: 3
    color: "#ffffff"
