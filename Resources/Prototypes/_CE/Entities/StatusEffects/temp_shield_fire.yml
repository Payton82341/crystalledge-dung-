- type: entity
  id: CEStatusEffectTempShieldFire
  name: Fire Shield
  description: Absorbs fire damage, then fades over time.
  components:
  - type: StatusEffect
    whitelist:
      components:
      - CEDamageable
  - type: StatusEffectAlert
    alert: CETempShieldFire
  - type: CETempShieldStatusEffect
    absorbPerStack: 1
    absorbedTypes:
    - Fire
  - type: CEStatusEffectVFX
    onStacksAddedVfx: CEEffectAddTempShieldFire
    onStacksRemovedVfx: CEEffectTakeDamageTempShieldFire
    onRemovedVfx: CEEffectBreakTempShieldFire
  - type: Sprite
    drawdepth: Effects
    noRot: true
  - type: CEStatusEffectStack
    stackDelta: -1
    #baseDuration: 10

- type: alert
  id: CETempShieldFire
  alertViewEntity: CETempShieldFireAlertSpriteView
  name: ce-alert-temp-shield-fire-name
  description: ce-alert-temp-shield-fire-desc
  icons:
  - sprite: _CE/Interface/temp_shield.rsi
    state: fire

- type: entity
  id: CETempShieldFireAlertSpriteView
  categories: [ HideSpawnMenu ]
  components:
  - type: GenericCounterAlert
    centerGlyph: false
    hideLeadingZeroes: true
  - type: Sprite
    sprite: /Textures/Interface/Alerts/essence_counter.rsi
    layers:
    - sprite: _CE/Interface/temp_shield.rsi
      state: fire
    - map: [ "1" ]
      offset: 0.65, 0
    - map: [ "10" ]
      offset: 0.45, 0
    - map: [ "100" ]
      offset: 0.25, 0

- type: entity
  id: CEEffectAddTempShieldFire
  parent: CEBaseMagicImpact
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    sprite: _CE/Effects/temp_shield.rsi
    layers:
    - state: fire
      shader: unshaded
  - type: LightFade
    duration: 2
  - type: TimedDespawn
    lifetime: 2
  - type: PointLight
    radius: 1.5
    energy: 3
    color: "#f58c30"

- type: entity
  id: CEEffectTakeDamageTempShieldFire
  parent: CEBaseMagicImpact
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    sprite: _CE/Effects/temp_shield.rsi
    layers:
    - state: fire_take
      shader: unshaded
  - type: LightFade
    duration: 2
  - type: TimedDespawn
    lifetime: 2
  - type: PointLight
    radius: 1.5
    energy: 3
    color: "#f58c30"

- type: entity
  id: CEEffectBreakTempShieldFire
  parent: CEBaseMagicImpact
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    sprite: _CE/Effects/temp_shield.rsi
    layers:
    - state: fire_break
      shader: unshaded
  - type: LightFade
    duration: 2
  - type: TimedDespawn
    lifetime: 2
  - type: PointLight
    radius: 1.5
    energy: 3
    color: "#f58c30"
