- type: entity
  parent:
  - BaseMob
  - MobFlammable
  - CEMobDamageable
  - CEMobCombat
  id: CEMobSlimeWaterBig
  name: big water slime
  description: TODO
  categories: [ ForkFiltered ]
  components:
  - type: CEGOAPAlarm
    sound:
      path: /Audio/_CE/Mobs/slime_alert.ogg
      params:
        variation: 0.1
        pitch: 0.6
  - type: CEDestructible
    destroyThreshold: 75
    lootTable: !type:AllSelector
      children:
      - id: CEMobSlimeWater
        amount: 2
        prob: 1
      - id: CEMobSlimeWater
        amount: 1
        prob: 0.25
      - id: CEMobSlimeWater
        amount: 1
        prob: 0.25
  - type: CEDestructionEffect
    effects:
    - !type:WetArea
      radius: 1
      maxStacks: 10
      fallOffFactor: 0.5
  - type: CEGOAP

    goals:
    - desiredState:
        EnemyDead: true
      priority: 1

    actions:
    - !type:CEGOAPMoveToTargetAction
      targetKey: enemy
      preconditions:
        EnemyVisible: true
      effects:
        EnemyInMeleeRange: true
      cost: 1
      range: 1.5
    - !type:CEGOAPMeleeAttackAction
      targetKey: enemy
      preconditions:
        EnemyInMeleeRange: true
      effects:
        EnemyDead: true
      cost: 1
      useType: Primary
      angleVariation: 5
    - !type:CEGOAPExploreAction
      effects:
        EnemyVisible: true
      cost: 1
      exploreRadius: 8
    - !type:CEGOAPMoveToLastKnownPositionAction
      positionTargetKey: enemy
      effects:
        EnemyVisible: true
      preconditions:
        HasEnemyLastPos: true
      cost: 0.5

    sensors:
    - !type:CEGOAPNearestHostileSensor
      conditionKey: EnemyVisible
      outputTargetKey: enemy
      visionRadius: 8
    - !type:CEGOAPRangeToTargetSensor
      conditionKey: EnemyInMeleeRange
      targetKey: enemy
      range: 1.5
    - !type:CEGOAPHasLastKnownPositionSensor
      conditionKey: HasEnemyLastPos
      positionTargetKey: enemy
    - !type:CEGOAPAlarmSensor
      outputTargetKey: enemy

  - type: NpcFactionMember
    factions:
    - SimpleHostile
  - type: Sprite
    drawdepth: Mobs
    scale: 2, 2
    sprite: _CE/Mobs/slime.rsi
    layers:
    - map: [ "base", "movement" ]
      state: base
      color: "#37beef"
  - type: SpriteMovement
    movementLayers:
      movement:
        state: jump
    noMovementLayers:
      movement:
        state: base
  - type: MovementSpeedModifier
    baseSprintSpeed: 0.75
  - type: CEWeapon
    spriteRotation: -90
    effectSlots:
      OnHit:
      - !type:WetArea
        effectTarget: User
        radius: 2
        maxStacks: 5
      - !type:WeaponArcAttack
        range: 0.9
        arcWidth: 360
        effects:
        - !type:Damage
          attackType: Melee
          damage:
            types:
              Physical: 15
        - !type:ThrowFromUser
          distance: 1
    animations:
      Primary:
      - anim: BigSlimeWaterAttack

- type: entityEffectAnimation
  id: BigSlimeWaterAttack
  movementSpeed: 0
  duration: 1.5
  events:
    0:
    - !type:PlaySound
      sound:
        path: /Audio/Effects/Fluids/watersplash.ogg
        params:
          variation: 0.1
          pitch: 0.6
    - !type:SpawnEntity
      spawns:
      - CEEffectWaterBurstTelegraphy
    1.4:
    - !type:WeaponEffectSlot
      slot: OnHit
