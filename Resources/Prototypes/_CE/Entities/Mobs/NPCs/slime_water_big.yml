- type: entity
  parent:
  - BaseMob
  - MobFlammable
  - CEMobDamageable
  - CEMobCombat
  id: CEMobSlimeWaterBig
  name: big water slime
  description: TODO
  categories: [ ForkFiltered ]
  components:
  - type: CEGOAPAlarm
    sound:
      path: /Audio/_CE/Mobs/slime_alert.ogg
      params:
        variation: 0.1
        pitch: 0.6
  - type: CEDestructible
    destroyThreshold: 150
    lootTable: !type:AllSelector
      children:
      - id: CEMobSlimeWater
        amount: 2
        prob: 1
      - id: CEMobSlimeWater
        amount: 1
        prob: 0.25
      - id: CEMobSlimeWater
        amount: 1
        prob: 0.25
  - type: CEDestructionEffect
    effects:
    - !type:WetArea
      radius: 6
      maxStacks: 10
      fallOffFactor: 0.5
  - type: CEGOAP

    goals:
    - desiredState:
        EnemyDead: true
      priority: 1

    actions:
    - !type:CEGOAPUseAction
      targetKey: enemy
      preconditions:
        EnemyVisible: true
        EnemyInMeleeRange: false
      effects:
        EnemyDead: true
      cost: 0.5
      actionPrototype: CEActionBigSlimeWaterShoot
    - !type:CEGOAPMoveToTargetAction
      targetKey: enemy
      preconditions:
        EnemyVisible: true
      effects:
        EnemyInMeleeRange: true
      cost: 1
      range: 1.5
    - !type:CEGOAPMeleeAttackAction
      targetKey: enemy
      preconditions:
        EnemyInMeleeRange: true
      effects:
        EnemyDead: true
      cost: 1
      useType: Primary
      angleVariation: 5 
    - !type:CEGOAPExploreAction
      effects:
        EnemyVisible: true
      cost: 1
      exploreRadius: 8
    - !type:CEGOAPMoveToLastKnownPositionAction
      positionTargetKey: enemy
      effects:
        EnemyVisible: true
      preconditions:
        HasEnemyLastPos: true
      cost: 0.5

    sensors:
    - !type:CEGOAPNearestHostileSensor
      conditionKey: EnemyVisible
      outputTargetKey: enemy
      visionRadius: 8
    - !type:CEGOAPRangeToTargetSensor
      conditionKey: EnemyInMeleeRange
      targetKey: enemy
      range: 1.5
    - !type:CEGOAPHasLastKnownPositionSensor
      conditionKey: HasEnemyLastPos
      positionTargetKey: enemy
    - !type:CEGOAPAlarmSensor
      outputTargetKey: enemy

  - type: NpcFactionMember
    factions:
    - SimpleHostile
  - type: Sprite
    drawdepth: Mobs
    scale: 2, 2
    sprite: _CE/Mobs/slime.rsi
    layers:
    - map: [ "base", "movement" ]
      state: base
      color: "#37beef"
  - type: SpriteMovement
    movementLayers:
      movement:
        state: jump
    noMovementLayers:
      movement:
        state: base
  - type: MovementSpeedModifier
    baseSprintSpeed: 0.75
  - type: CEWeapon
    spriteRotation: -90
    effectSlots:
      OnHit:
      - !type:WetArea
        effectTarget: User
        radius: 2
        maxStacks: 5
      - !type:WeaponArcAttack
        range: 0.9
        arcWidth: 360
        effects:
        - !type:Damage
          attackType: Melee
          damage:
            types:
              Physical: 15
        - !type:ThrowFromUser
          distance: 1
    animations:
      Primary:
      - anim: BigSlimeWaterAttack

- type: entityEffectAnimation
  id: BigSlimeWaterAttack
  movementSpeed: 0.8
  duration: 0.8
  events:
    0:
    - !type:PlaySound
      sound:
        path: /Audio/Effects/Fluids/watersplash.ogg
        params:
          variation: 0.1
          pitch: 0.6
    - !type:SpawnEntity
      spawns:
      - CEEffectWaterBurstTelegraphy
    0.6:
    - !type:WeaponEffectSlot
      slot: OnHit


- type: entity
  id: CEActionBigSlimeWaterShoot
  parent: CEActionSpellBase
  name: Big slime shoot
  description: Ranged push attack
  components:
  - type: Action
    useDelay: 5
    icon:
      sprite: _CE/Skills/Mage/firebolt.rsi
      state: icon
  - type: TargetAction
    range: 20
  - type: WorldTargetAction
    event: !type:CEWorldTargetActionAnimationEvent
      animation: BigSlimeWaterShoot

- type: entityEffectAnimation
  id: BigSlimeWaterShoot
  movementSpeed: 0.3
  duration: 0.7
  lockRotation: true
  events:
    0.4:
    - !type:PlaySound
      sound:
        path: /Audio/Effects/Fluids/watersplash.ogg
        params:
          variation: 0.1
          pitch: 0.6
    - !type:ShootProjectile
      projectileSpeed: 6
      projectileMaxSpeed: 10
      prototype: CEProjectileBigSlimeWaterShoot
      projectileCount: 1
      spread: 0.4

- type: entity
  id: CEProjectileBigSlimeWaterShoot
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _CE/Effects/firebolt.rsi
    layers:
    - state: effect
      color: blue
  - type: CEProjectile
    hitEffects:
    - !type:Damage
      attackType: Ranged
      damage:
        types:
          Physical: 8
    - !type:WetArea
      radius: 2
      maxStacks: 5
    - !type:AreaEffect
      affectCaster: false
      range: 2
      effects:
      - !type:ThrowFromUser
        distance: 2
      - !type:Damage
        attackType: Ranged
        damage:
          types:
            Physical: 4