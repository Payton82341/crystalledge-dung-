- type: entity
  parent: 
  - BaseMob
  - MobFlammable
  - CEMobDamageable
  - CEMobCombat
  id: CEMobPredatoryVine
  name: predatory vine
  description: TODO
  categories: [ ForkFiltered ]
  components:
  - type: CEGOAPAlarm
  - type: CEDestructible
    destroyThreshold: 50
  - type: CEGOAP
    goals:
    - desiredState:
        EnemyDead: true
      priority: 3

    actions:
    # Attacks
    - !type:CEGOAPUseAction
      targetKey: enemy
      preconditions:
        EnemyVisible: true
      effects:
        EnemyDead: true
      cost: 1
      actionPrototype: CEActionPredatoryVineShot
    - !type:CEGOAPUseAction
      targetKey: enemy
      preconditions:
        EnemyVisible: true
      effects:
        EnemyDead: true
      cost: 1
      actionPrototype: CEActionPredatoryVineShot2

    # TODO: melee attack

    sensors:
    - !type:CEGOAPNearestHostileSensor
      conditionKey: EnemyVisible
      outputTargetKey: enemy
      visionRadius: 8
    - !type:CEGOAPRangeToTargetSensor
      conditionKey: EnemyInMeleeRange
      targetKey: enemy
      range: 1.5

  - type: NpcFactionMember
    factions:
    - SimpleHostile
  - type: Sprite
    drawdepth: Mobs
    offset: 0, 0.7
    sprite: _CE/Mobs/predatory_vine.rsi
    layers:
    - state: base
  - type: MovementSpeedModifier
    baseSprintSpeed: 0



- type: entity
  id: CEActionPredatoryVineShot
  parent: CEActionSpellBase
  name: Predatory vine Shoot
  description: Ranged poison attack
  components:
  - type: CEVisualizeConeAction
    width: 25
    range: 5
  - type: Action
    useDelay: 3
    icon:
      sprite: _CE/Skills/Mage/firebolt.rsi
      state: icon
  - type: TargetAction
    range: 20
  - type: WorldTargetAction
    event: !type:CEWorldTargetActionAnimationEvent
      animation: PredatoryVineShoot


- type: entity
  id: CEActionPredatoryVineShot2
  parent: CEActionSpellBase
  name: Predatorry vine Shoot
  description: Ranged poison attack
  components:
  - type: CEVisualizeConeAction
    width: 25
    range: 5
  - type: Action
    useDelay: 8
    icon:
      sprite: _CE/Skills/Mage/firebolt.rsi
      state: icon
  - type: TargetAction
    range: 20
  - type: WorldTargetAction
    event: !type:CEWorldTargetActionAnimationEvent
      animation: PredatoryVineShoot

- type: entityEffectAnimation
  id: PredatoryVineShoot
  movementSpeed: 0.3
  duration: 0.7
  lockRotation: true
  events:
    0:
    #- !type:PlaySound
    #  sound:
    #    path: /Audio/_CE/Effects/firebolt.ogg
    - !type:UsedEntityAnimation
      dummyEntity: CEEffectFireboltCharge
      offsetAnimation:
      - time: 0.0
        offset: 0, 0.5
      - time: 0.8
        offset: 0, -1
    0.4:
    #- !type:PlaySound
    #  sound:
    #    path: /Audio/_CE/Effects/firebolt.ogg
    - !type:ShootProjectile
      projectileSpeed: 3
      projectileMaxSpeed: 7
      prototype: CEProjectilePredatoryVine
      projectileCount: 5
      spread: 0.4

- type: entity
  id: CEProjectilePredatoryVine
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _CE/Effects/firebolt.rsi
    layers:
    - state: effect
      color: green
  - type: CEProjectile
    hitEffects:
    - !type:Damage
      attackType: Ranged
      damage:
        types:
          Physical: 4
    - !type:ApplyStatusEffectStack
      statusEffect: CEStatusEffectPoison
      stack: 1
      maxStacks: 5