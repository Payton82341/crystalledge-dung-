- type: entity
  parent:
  - BaseMob
  - MobFlammable
  - CEMobDamageable
  - CEMobCombat
  id: CEFlem
  name: flem
  description: TODO
  categories: [ ForkFiltered ]
  components:
  - type: CEMagicEnergyContainer
    maxEnergy: 100
  - type: CEGOAP
    planCooldown: 0.5

    targetProviders:
      enemy: !type:CEGOAPNearestHostileTargetProvider
        visionRadius: 10
      self: !type:CEGOAPSelfTargetProvider

    goals:
    # Buff self
    - desiredState:
        HasDivineShield: true
      activationConditions:
        HasDivineShield: false
      priority: 4
    # First - attack
    - desiredState:
        EnemyDead: true
      activationConditions:
        LowHealth: false
        EnemyVisible: true
      priority: 3
    # Second - run away
    - desiredState:
        EnemyVisible: false
      activationConditions:
        LowHealth: true
        EnemyVisible: true
      priority: 2
    # Last - healing
    - desiredState:
        LowHealth: false
      activationConditions:
        LowHealth: true
        EnemyVisible: false
      priority: 1

    actions:
    # Move to target
    - !type:CEGOAPMoveToTargetAction
      targetProviderKey: enemy
      preconditions:
        EnemyVisible: true
      effects:
        EnemyInMeleeRange: true
      cost: 2
      range: 1.5
    # Attack target
    - !type:CEGOAPMeleeAttackAction
      targetProviderKey: enemy
      preconditions:
        EnemyInMeleeRange: true
      effects:
        EnemyDead: true
      cost: 1
      useType: Primary
      angleVariation: 5
    # Run away from target
    - !type:CEGOAPFleeAction
      targetProviderKey: enemy
      effects:
        EnemyVisible: false
      cost: 1
      fleeDistance: 15
      visionRadius: 10
      occlusionBonus: 2
    # Divine Shield - self-target action, use when no shield active
    - !type:CEGOAPUseAction
      targetProviderKey: self
      effects:
        HasDivineShield: true
      cost: 1
      actionPrototype: CEActionSpellDivineShield
    # Area Healing - world target under self, use when low health
    - !type:CEGOAPUseAction
      targetProviderKey: self
      effects:
        LowHealth: false
      cost: 2
      actionPrototype: CEActionSpellAreaHealing

    sensors:
    - !type:CEGOAPTargetExistsSensor
      conditionKey: EnemyVisible
      targetProviderKey: enemy
    - !type:CEGOAPCheckHealthLevelSensor
      conditionKey: LowHealth
      threshold: 0.5
    - !type:CEGOAPRangeToTargetSensor
      conditionKey: EnemyInMeleeRange
      targetProviderKey: enemy
      range: 1.5
    - !type:CEGOAPTargetIsDeadSensor
      conditionKey: EnemyDead
      targetProviderKey: enemy
    - !type:CEGOAPHasStatusEffectSensor
      conditionKey: HasDivineShield
      statusEffect: CEStatusEffectDivineShield

  - type: NpcFactionMember
    factions:
    - SimpleHostile
  - type: Sprite
    drawdepth: Mobs
    sprite: _CE/Mobs/flem.rsi
    layers:
    - map: [ "livingState" ]
      state: alive
  - type: GenericVisualizer
    visuals:
      enum.CEMobStateVisuals.State:
        livingState:
          Alive: { state: alive }
          Critical: { state: dead }
          Dead: { state: dead }
  - type: MovementAlwaysTouching
  - type: MovementSpeedModifier
    baseWalkSpeed: 3
    baseSprintSpeed: 3.5
  - type: CEWeapon
    spriteRotation: -90
    damage:
      types:
        Physical: 2
    animations:
      Primary:
      - anim: FlemAttack1
      - anim: FlemAttack2

- type: animationAction
  id: FlemAttack1
  movementSpeed: 0.5
  duration: 0.8
  events:
    0:
    - !type:PlaySound
      sound:
        path: /Audio/_CE/Effects/Weapon/slash_sword2.ogg
    - !type:EntityAnimation
      spriteOverride:
        sprite: _CE/Objects/Weapons/Skimitar/iron.rsi
        state: icon
      offsetAnimation:
      - time: 0.0
        offset: -0.1, -0.2
        easing: QuadIn
      - time: 0.05
        offset: -0.2, -0.0
      - time: 0.1
        offset: -0.3, -0.2
      - time: 0.2
        offset: -0.2, -1.2
        easing: QuadIn
      - time: 0.3
        offset: 0.1, -0.5
        easing: QuadOut

      rotationAnimation:
      - time: 0.0
        rotation: 20
      - time: 0.02
        rotation: 90
      - time: 0.07
        rotation: 180
      - time: 0.1
        rotation: 270
      - time: 0.2
        rotation: 360
      - time: 0.2
        rotation: 400

      colorAnimation:
      - time: 0.3
        color: "#ffffff"
      - time: 0.4
        color: "#ffffff00"  # Fade out
        easing: QuadOut

      scaleAnimation:
      - time: 0.0
        scale: 1, -1
    0.25:
    - !type:WeaponArcAttack
      range: 0.7
      arcWidth: 40
    - !type:Dash
      distance: 0.1

- type: animationAction
  id: FlemAttack2
  movementSpeed: 0.5
  duration: 0.8
  events:
    0:
    - !type:PlaySound
      sound:
        path: /Audio/_CE/Effects/Weapon/slash_sword2.ogg
    - !type:EntityAnimation
      spriteOverride:
        sprite: _CE/Objects/Weapons/Skimitar/iron.rsi
        state: icon
      offsetAnimation:
      - time: 0.0
        offset: 0.1, -0.2
        easing: QuadIn
      - time: 0.05
        offset: 0.2, -0.0
      - time: 0.1
        offset: 0.3, -0.2
      - time: 0.2
        offset: 0.2, -1.2
        easing: QuadIn
      - time: 0.3
        offset: -0.1, -0.5
        easing: QuadOut

      rotationAnimation:
      - time: 0.0
        rotation: -20
      - time: 0.02
        rotation: -90
      - time: 0.07
        rotation: -180
      - time: 0.1
        rotation: -270
      - time: 0.2
        rotation: -360
      - time: 0.2
        rotation: -400

      colorAnimation:
      - time: 0.3
        color: "#ffffff"
      - time: 0.4
        color: "#ffffff00"  # Fade out
        easing: QuadOut

      scaleAnimation:
      - time: 0.0
        scale: 1, 1
    0.25:
    - !type:WeaponArcAttack
      range: 0.7
      arcWidth: 40
    - !type:Dash
      distance: 0.1
