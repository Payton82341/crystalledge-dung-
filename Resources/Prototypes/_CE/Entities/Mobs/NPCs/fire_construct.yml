- type: entity
  parent:
  - BaseMob
  - MobFlammable
  - CEMobDamageable
  - CEMobCombat
  id: CEMobFireConstruct
  name: fire construct
  description: TODO
  categories: [ ForkFiltered ]
  components:
  - type: CEGOAPAlarm
  - type: CEDestructible
    destroyThreshold: 30
  - type: CEMagicEnergyContainer
    energy: 100
    baseMaxEnergy: 100
  - type: CEGOAP
    goals:
    - desiredState:
        EnemyDead: true
      priority: 3

    actions:
    - !type:CEGOAPMoveToTargetAction
      targetKey: enemy
      preconditions:
        EnemyVisible: true
      effects:
        EnemyInMeleeRange: true
      cost: 2
      range: 1.5
    - !type:CEGOAPExploreAction
      effects:
        EnemyVisible: true
      cost: 1
      exploreRadius: 8
    - !type:CEGOAPFleeAction
      effects:
        EnemyInMeleeRange: false
    # Move to enemy's last known position
    - !type:CEGOAPMoveToLastKnownPositionAction
      positionTargetKey: enemy
      effects:
        EnemyVisible: true
      preconditions:
        HasEnemyLastPos: true
      cost: 0.5

    # Attacks
    - !type:CEGOAPUseAction
      targetKey: enemy
      preconditions:
        EnemyVisible: true
        EnemyInMeleeRange: false
      effects:
        EnemyDead: true
      cost: 1
      actionPrototype: CEActionFireConstructFirebolt
    - !type:CEGOAPUseAction
      targetKey: enemy
      preconditions:
        EnemyVisible: true
        EnemyInMeleeRange: true
      effects:
        EnemyDead: true
      cost: 1
      actionPrototype: CEActionFireConstructExplosion
    sensors:
    - !type:CEGOAPNearestHostileSensor
      conditionKey: EnemyVisible
      outputTargetKey: enemy
      visionRadius: 8
    - !type:CEGOAPRangeToTargetSensor
      conditionKey: EnemyInMeleeRange
      targetKey: enemy
      range: 1.5
    - !type:CEGOAPHasLastKnownPositionSensor
      conditionKey: HasEnemyLastPos
      positionTargetKey: enemy

  - type: NpcFactionMember
    factions:
    - SimpleHostile
  - type: Sprite
    drawdepth: Mobs
    sprite: _CE/Mobs/fire_construct.rsi
    layers:
    - state: mob
    - state: eye
      shader: unshaded
  - type: MovementAlwaysTouching
  - type: MovementSpeedModifier
    baseSprintSpeed: 1.5
  - type: CEArmor
    flat:
      Fire: 100
      Physical: 1
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepThud
  - type: Tag
    tags:
      - FootstepSound




- type: entity
  id: CEActionFireConstructExplosion
  name: Fire construct explosion
  description: TODO
  components:
  - type: CEActionManaCost
    manaCost: 1
  - type: Action
    useDelay: 15
  - type: InstantAction
    event: !type:CEInstantActionAnimationEvent
      animation: FireConstructExplosion

- type: entityEffectAnimation
  id: FireConstructExplosion
  movementSpeed: 0.2
  duration: 1.5
  events:
    0:
    - !type:PlaySound
      sound:
        path: /Audio/_CE/Effects/pyro_burst.ogg
    - !type:SpawnEntity
      spawns:
      - CEEffectPotionAlchemicalFire
    1.4:
    - !type:PlaySound
      sound:
        path: /Audio/_CE/Effects/firebolt.ogg
    - !type:SpawnEntity
      spawns:
      - CEEffectPotionAlchemicalFire
    - !type:IgniteArea
      radius: 3
      fallOffFactor: 0.5
      maxStacks: 5
    - !type:Dash
      distance: 3


- type: entity
  id: CEActionFireConstructFirebolt
  parent: CEActionSpellBase
  name: Firebolt
  description: You hurl a 3 fireballs that explodes on impact, setting the ground and creatures [color=#ff8a05]on fire[/color].
  components:
  - type: CEVisualizeWideLineAction
    width: 1.0
    projectileMode: true
  - type: CEActionManaCost
    manaCost: 3
  - type: Action
    useDelay: 8
    icon:
      sprite: _CE/Skills/Mage/firebolt.rsi
      state: icon
  - type: TargetAction
    range: 20
  - type: WorldTargetAction
    event: !type:CEWorldTargetActionAnimationEvent
      animation: FireConstructAnimationFirebolt

- type: entityEffectAnimation
  id: FireConstructAnimationFirebolt
  movementSpeed: 0.3
  duration: 1.0
  lockRotation: true
  events:
    0:
    - !type:PlaySound
      sound:
        path: /Audio/_CE/Effects/firebolt.ogg
    - !type:UsedEntityAnimation
      dummyEntity: CEEffectFireboltCharge
      offsetAnimation:
      - time: 0.0
        offset: 0, 0.5
      - time: 0.8
        offset: 0, -1
    0.8:
    - !type:PlaySound
      sound:
        path: /Audio/_CE/Effects/firebolt.ogg
    - !type:ShootProjectile
      projectileSpeed: 4
      projectileMaxSpeed: 8
      prototype: CEProjectileFireConstructFirebolt
      projectileCount: 3
      spread: 0.3



- type: entity
  id: CEProjectileFireConstructFirebolt
  name: firebolt projectile
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _CE/Effects/firebolt.rsi
    layers:
    - state: effect
      shader: unshaded
  - type: PointLight
    color: "#ff9603"
    radius: 2.0
    energy: 5.0
  - type: CEProjectile
    hitEffects:
    - !type:Damage
      damage:
        types:
          Fire: 1
    - !type:IgniteArea
      radius: 2
      maxStacks: 2
    - !type:SpawnEntity
      effectTarget: Target
      spawns:
      - CEEffectPotionAlchemicalFire
