- type: entity
  parent:
  - BaseMob
  - MobFlammable
  - CEMobDamageable
  - CEMobCombat
  id: CEMobTest
  name: test
  description: TODO
  categories: [ ForkFiltered ]
  components:
  - type: CEGOAPAlarm
    sound:
      path: /Audio/_CE/Mobs/rat2.ogg
      params:
        variation: 0.1
  - type: CEDestructible
    destroyThreshold: 30
  - type: CEGOAP
    goals:
    # Single stupid goal - kill enemies
    - desiredState:
        EnemyDead: true
      priority: 1

    actions:
    # Move to target
    - !type:CEGOAPMoveToTargetAction
      targetKey: enemy
      preconditions:
        EnemyVisible: true
      cost: 1
      range: 3.5
    # Attack target
    - !type:CEGOAPMeleeAttackAction
      targetKey: enemy
      preconditions:
        EnemyVisible: true
      effects:
        EnemyDead: true
      cost: 1
      useType: Primary
      angleVariation: 5
    # Explore
    - !type:CEGOAPExploreAction
      effects:
        EnemyVisible: true
      cost: 1
      exploreRadius: 8
    # Move to enemy's last known position
    - !type:CEGOAPMoveToLastKnownPositionAction
      positionTargetKey: enemy
      effects:
        EnemyVisible: true
      preconditions:
        HasEnemyLastPos: true
      cost: 0.5

    sensors:
    - !type:CEGOAPNearestHostileSensor
      conditionKey: EnemyVisible
      outputTargetKey: enemy
      visionRadius: 8
    - !type:CEGOAPRangeToTargetSensor
      conditionKey: EnemyInMeleeRange
      targetKey: enemy
      range: 3.5
    - !type:CEGOAPHasLastKnownPositionSensor
      conditionKey: HasEnemyLastPos
      positionTargetKey: enemy
    - !type:CEGOAPAlarmSensor
      outputTargetKey: enemy

  - type: NpcFactionMember
    factions:
    - SimpleHostile
  - type: Sprite
    drawdepth: Mobs
    sprite: _CE/Mobs/test.rsi
    layers:
    - state: base
  - type: MovementSpeedModifier
    baseSprintSpeed: 3
  - type: CEWeapon
    spriteRotation: -90
    effectSlots:
      OnHit:
      - !type:ShootProjectile
        projectileSpeed: 5
        prototype: CEProjectileTestMob
        projectileCount: 1
    animations:
      Primary:
      - anim: MobTestAttack


- type: entityEffectAnimation
  id: MobTestAttack
  movementSpeed: 0.7
  duration: 2
  events:
    0:
    - !type:UsedEntityAnimation
      dummyEntity: CERatBiteEffectTelegraphy
      offsetAnimation:
      - time: 0.0
        offset: 0, -0.3
        easing: QuadIn
      - time: 0.2
        offset: 0, -0.2
        easing: QuadIn

      rotationAnimation:
      - time: 0.0
        rotation: 90

      colorAnimation:
      - time: 0.1
        color: "#ffffff"
      - time: 0.3
        color: "#ffffff00"  # Fade out
        easing: QuadOut
    0.2:
    - !type:UsedEntityAnimation
      dummyEntity: CERatBiteEffect
      offsetAnimation:
      - time: 0.0
        offset: 0, -0.2
        easing: QuadIn
      - time: 0.3
        offset: 0, -0.7
        easing: QuadIn

      rotationAnimation:
      - time: 0.0
        rotation: 90

      colorAnimation:
      - time: 0.1
        color: "#ffffff"
      - time: 0.3
        color: "#ffffff00"  # Fade out
        easing: QuadOut
    0.25:
    - !type:WeaponEffectSlot
      slot: OnHit


- type: entity
  id: CEProjectileTestMob
  name: firebolt projectile
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _CE/Effects/firebolt.rsi
    layers:
    - state: effect
      color: red
  - type: CEProjectile
    hitEffects:
    - !type:Damage
      attackType: Ranged
      damage:
        types:
          Physical: 10
