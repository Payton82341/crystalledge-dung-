- type: entity
  parent:
  - BaseMob
  - MobFlammable
  - CEMobDamageable
  - CEMobCombat
  id: CEMobSlimeFire
  name: fire slime
  description: A wobbly blob of animated fire. Pops into a burst of flames when destroyed.
  categories: [ ForkFiltered ]
  components:
  - type: CEGOAPAlarm
    sound:
      path: /Audio/_CE/Mobs/slime_alert.ogg
      params:
        variation: 0.1
  - type: CEDestructible
    destroyThreshold: 50
  - type: CEDestructionEffect
    effects:
    - !type:IgniteArea
      radius: 3
      maxStacks: 4
      fallOffFactor: 0.5
  - type: CEGOAP
    goals:
    - desiredState:
        EnemyDead: true
      priority: 1
    actions:
    - !type:CEGOAPMoveToTargetAction
      targetKey: enemy
      preconditions:
        EnemyVisible: true
      effects:
        EnemyInMeleeRange: true
      cost: 1
      range: 1.5
    - !type:CEGOAPMeleeAttackAction
      targetKey: enemy
      preconditions:
        EnemyInMeleeRange: true
      effects:
        EnemyDead: true
      cost: 1
      useType: Primary
      angleVariation: 5
    - !type:CEGOAPUseAction
      targetKey: enemy
      preconditions:
        EnemyVisible: true
        EnemyInMeleeRange: false
      effects:
        EnemyInMeleeRange: true
      cost: 0.5
      actionPrototype: CEActionFireSlimeJump
    - !type:CEGOAPExploreAction
      effects:
        EnemyVisible: true
      cost: 1
      exploreRadius: 8
    - !type:CEGOAPMoveToLastKnownPositionAction
      positionTargetKey: enemy
      effects:
        EnemyVisible: true
      preconditions:
        HasEnemyLastPos: true
      cost: 0.5
    sensors:
    - !type:CEGOAPNearestHostileSensor
      conditionKey: EnemyVisible
      outputTargetKey: enemy
      visionRadius: 8
    - !type:CEGOAPRangeToTargetSensor
      conditionKey: EnemyInMeleeRange
      targetKey: enemy
      range: 1.5
    - !type:CEGOAPHasLastKnownPositionSensor
      conditionKey: HasEnemyLastPos
      positionTargetKey: enemy
    - !type:CEGOAPAlarmSensor
      outputTargetKey: enemy
  - type: NpcFactionMember
    factions:
    - SimpleHostile
  - type: Sprite
    drawdepth: Mobs
    sprite: _CE/Mobs/slime.rsi
    layers:
    - map: [ "base", "movement" ]
      state: base
      color: "#ff4a08"
      shader: unshaded
  - type: PointLight
    color: "#ff4a08"
    radius: 2
    energy: 2.0
  - type: SpriteMovement
    movementLayers:
      movement:
        state: jump
    noMovementLayers:
      movement:
        state: base
  - type: MovementSpeedModifier
    baseSprintSpeed: 1.5
  - type: CEWeapon
    spriteRotation: -90
    effectSlots:
      OnHit:
      - !type:WeaponArcAttack
        range: 0.5
        arcWidth: 40
        effects:
        - !type:Damage
          attackType: Melee
          damage:
            types:
              Fire: 5
        - !type:IgniteEntity
          stacks: 1
          maxStacks: 2
    animations:
      Primary:
      - anim: SlimeBite
  - type: CEArmor
    flat:
      Fire: 100

# -- Slime Jump (leap toward target) --

- type: entity
  id: CEActionFireSlimeJump
  name: fire slime jump
  description: The slime leaps toward a target.
  categories: [ ForkFiltered ]
  components:
  - type: CEVisualizeRadiusTargetAction
  - type: CEVisualizeAoEZoneAction
    radius: 1
  - type: Action
    useDelay: 5
  - type: TargetAction
    range: 8
    interactOnMiss: false
  - type: EntityTargetAction
    event: !type:CEEntityTargetActionAnimationEvent
      animation: FireSlimeJump
      cancelAnimation: true

- type: entityEffectAnimation
  id: FireSlimeJump
  movementSpeed: 0
  duration: 0.7
  events:
    0:
    - !type:PlaySound
      sound:
        path: /Audio/_CE/Effects/fire_whoosh.ogg
        params:
          variation: 0.1
    0.4:
    - !type:IgniteArea
      effectTarget: User
      radius: 1
      maxStacks: 3
      fallOffFactor: 1
    - !type:Dash
      distance: 4
      speed: 8
    0.65:
    - !type:PlaySound
      sound:
        path: /Audio/Effects/Fluids/splash.ogg
        params:
          variation: 0.1
    - !type:IgniteArea
      effectTarget: User
      radius: 1
      maxStacks: 3
      fallOffFactor: 1
