- type: entity
  parent: MarkerBase
  id: CEMobBossViatorSpawner
  name: Viator Spawner
  suffix: Boss
  categories: [ ForkFiltered ]
  components:
  - type: Sprite
    layers:
    - state: green
    - state: idle
      sprite: _CE/Mobs/Bosses/viator.rsi
      color: "#ffffff42"
      scale: 1, 1
  - type: ConditionalSpawner
    prototypes:
    - CEMobBossViator

- type: entity
  parent:
  - BaseMob
  - CEMobDamageable
  - CEMobCombat
  - CEMobBossBase
  id: CEMobBossViator
  name: Viator
  description: TODO
  components:
  - type: Sprite
    drawdepth: Mobs
    scale: 1, 1
    sprite: _CE/Mobs/Bosses/viator.rsi
    layers:
    - map: [ "base" ]
      state: idle
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.CEAnimationAppearanceVisuals.Key:
        base:
          default: { state: idle }
          attack: { state: attack }
          death: { state: death }
          prepare1: { state: prepare }
          prepare2: { state: prepare2 }
  - type: CEAnimationController
  - type: CEIdleAnimation
    animation:
      scaleAnimation:
      - time: 0.0
        scale: 1.05, 0.95
      - time: 0.5
        scale: 0.95, 1.05
      - time: 1.0
        scale: 1.05, 0.95
  - type: CEGOAPAlarmAnimation
    animation: ViatorAlarm
  - type: CEDestructibleAnimation
    animation: ViatorDeath
  - type: CEDestructible
    destroyThreshold: 250
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.6
        density: 50
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: CEMagicEnergyContainer
    maxEnergy: 100
  - type: CEGOAP

    goals:
    - desiredState:
        LowHealth: false
      priority: 2
    - desiredState:
        EnemyDead: true
      priority: 1

    actions:
    - !type:CEGOAPUseAction
      targetKey: self
      preconditions:
        LowMana: false
      effects:
        LowHealth: false
      actionPrototype: CEActionViatorSelfHeal
    - !type:CEGOAPUseAction
      targetKey: enemy
      preconditions:
        EnemyVisible: true
        LowMana: true
      effects:
        LowMana: false
      actionPrototype: CEActionViatorManaSteal
    - !type:CEGOAPUseAction
      targetKey: enemy
      preconditions:
        EnemyVisible: true
        LowMana: false
      effects:
        EnemyDead: true
      actionPrototype: CEActionViatorIcicles
    - !type:CEGOAPUseAction
      targetKey: enemy
      preconditions:
        EnemyInMeleeRange: true
      effects:
        EnemyDead: true
      actionPrototype: CEActionViatorMelee
    - !type:CEGOAPFleeAction
      targetKey: enemy
      preconditions:
        EnemyVisible: true
      effects:
        EnemyDead: true
      cost: 10
    # Explore
    - !type:CEGOAPExploreAction
      effects:
        EnemyVisible: true
      cost: 1
      exploreRadius: 8
    # Move to enemy's last known position
    - !type:CEGOAPMoveToLastKnownPositionAction
      positionTargetKey: enemy
      preconditions:
        HasEnemyLastPos: true
      effects:
        EnemyVisible: true
      cost: 0.5
    - !type:CEGOAPMoveToTargetAction
      targetKey: enemy
      effects:
        EnemyInMeleeRange: true

    sensors:
    - !type:CEGOAPNearestHostileSensor
      conditionKey: EnemyVisible
      outputTargetKey: enemy
      visionRadius: 8
    - !type:CEGOAPRangeToTargetSensor
      conditionKey: EnemyInMeleeRange
      targetKey: enemy
      range: 1.5
    - !type:CEGOAPHasLastKnownPositionSensor
      conditionKey: HasEnemyLastPos
      positionTargetKey: enemy
    - !type:CEGOAPAlarmSensor
      outputTargetKey: enemy
    - !type:CEGOAPCheckManaLevelSensor
      targetKey: self
      threshold: 0.3
      conditionKey: LowMana
    - !type:CEGOAPCheckHealthLevelSensor
      targetKey: self
      conditionKey: LowHealth
      threshold: 0.8

  - type: MovementSpeedModifier
    baseSprintSpeed: 4.5
  - type: CEPermanentStatusEffects
    effects:
    - CEStatusEffectViator


- type: entity
  id: CEStatusEffectViator
  components:
  - type: StatusEffect
  - type: CEArmor
    flat:
      Cold: 500
  - type: CEStatusEffectImmunity
    blockedEffects:
    - CEStatusEffectFrozen
    - CEStatusEffectColdSlowdown
    - CEStatusEffectCurse


- type: entityEffectAnimation
  id: ViatorAlarm
  movementSpeed: 0
  duration: 1.4
  lockRotation: true
  events:
    0.3:
    - !type:PlaySound
      sound:
        path: /Audio/_CE/Mobs/roar.ogg
    - !type:SetTimedAppearance
      key: prepare1
      duration: 0.2
    - !type:ShockWaveVFX
      effectTarget: User
      width: 0.5
    0.5:
    - !type:ShockWaveVFX
      effectTarget: User
      width: 0.5
    - !type:SetTimedAppearance
      key: prepare2
      duration: 0.2
    0.7:
    - !type:ShockWaveVFX
      effectTarget: User
      width: 0.5
    - !type:SetTimedAppearance
      key: prepare1
      duration: 0.2
    0.9:
    - !type:SetTimedAppearance
      key: prepare2
      duration: 0.2
    1.1:
    - !type:SetTimedAppearance
      key: prepare1
      duration: 0.2
    1.3:
    - !type:SetTimedAppearance
      key: prepare2
      duration: 0.2


- type: entityEffectAnimation
  id: ViatorDeath
  movementSpeed: 0
  duration: 1
  lockRotation: true
  events:
    0:
    - !type:SetTimedAppearance
      key: death
      duration: 10
    - !type:UserAnimation
      offsetAnimation:
      - time: 0.0
        offset: 0.1, 0
      - time: 0.1
        offset: -0.1, 0
      - time: 0.2
        offset: 0.1, 0
      - time: 0.3
        offset: -0.1, 0
      - time: 0.4
        offset: 0.1, 0
      - time: 0.5
        offset: -0.1, 0
      - time: 0.6
        offset: 0.1, 0
      - time: 0.7
        offset: -0.1, 0
      - time: 0.8
        offset: 0.1, 0
      - time: 0.9
        offset: -0.1, 0
      scaleAnimation:
      - time: 0.0
        scale: 1, 1
      - time: 0.9
        scale: 1.3, 0.7




# Cast 1 - Self Healing

- type: entity
  id: CEActionViatorSelfHeal
  parent: CEActionSpellBase
  name: Self Heal
  components:
  - type: Action
    useDelay: 5
    icon:
      sprite: _CE/Skills/Priest/cure_wounds.rsi
      state: icon
  - type: CEActionManaCost
    manaCost: 10
  - type: InstantAction
    event: !type:CEInstantActionAnimationEvent
      animation: ViatorSelfHeal

- type: entityEffectAnimation
  id: ViatorSelfHeal
  movementSpeed: 0.2
  duration: 0.9
  events:
    0:
    - !type:SpawnEntity
      spawns:
      - CEEffectAreaHealingEffect
    - !type:SetTimedAppearance
      key: prepare1
      duration: 0.6
    - !type:UserAnimation
      offsetAnimation:
      - time: 0.0
        offset: 0.1, 0
      - time: 0.2
        offset: -0.1, 0
      - time: 0.4
        offset: 0.1, 0
      - time: 0.6
        offset: -0.1, 0
    0.6:
    - !type:Heal
      amount: 25
    - !type:SpawnEntity
      spawns:
      - CEEffectAreaHealingEffect
    - !type:SetTimedAppearance
      key: prepare2
      duration: 0.3
    - !type:CETileAffectArea
      effectTarget: User
      tileEffect: CETileEffectFreeze
      radius: 2.5
      maxStacks: 6













# Steal mana


- type: entity
  id: CEActionViatorManaSteal
  parent: CEActionSpellBase
  name: Mana Steal
  components:
  - type: CEVisualizeWideLineAction
    width: 1
  - type: Action
    useDelay: 8
    icon:
      sprite: _CE/Skills/Mage/mana_steal.rsi
      state: icon
  - type: TargetAction
    range: 10
    interactOnMiss: false
  - type: EntityTargetAction
    event: !type:CEEntityTargetActionAnimationEvent
      animation: ViatorManaSteal


- type: entityEffectAnimation
  id: ViatorManaSteal
  movementSpeed: 0.2
  duration: 0.9
  events:
    0:
    - !type:ShockWaveVFX
      effectTarget: User
      width: 0.3
    - !type:SpawnEntity
      spawns:
      - CEEffectViatorStealMana
    - !type:SetTimedAppearance
      key: attack
      duration: 1
    - !type:CETileAffectArea
      effectTarget: Target
      tileEffect: CETileEffectCurse
      radius: 1.5
      maxStacks: 5
      fallOffFactor: 1
    - !type:AreaEffect
      effectTarget: Target
      affectCaster: false
      range: 1.2
      whitelist:
        components:
        - CEMagicEnergyContainer
      effects:
      - !type:StealMana
        amount: 25
      - !type:SpawnEntity
        effectTarget: Target
        spawns:
        - CEEffectManaDrain
      - !type:SpawnEntity
        effectTarget: User
        spawns:
        - CEEffectManaRestore

- type: entity
  parent: CEEffectAreaHealingTelegraphy
  id: CEEffectViatorStealMana
  components:
  - type: Sprite
    sprite: _CE/Effects/area_healing_effect.rsi
    layers:
    - state: effect
      shader: unshaded
      color: "#9f4fb7"
  - type: PointLight
    radius: 4
    color: "#9f4fb7"







# 3 - Icicles attack


- type: entity
  id: CEActionViatorIcicles
  parent: CEActionSpellBase
  name: Shoot
  components:
  - type: CEVisualizeWideLineAction
    projectileMode: true
    width: 0.5
  - type: CEActionManaCost
    manaCost: 10
  - type: Action
    useDelay: 9
    icon:
      sprite: _CE/Skills/Mage/triple_icicle.rsi
      state: icon
  - type: TargetAction
    checkCanAccess: false
    range: 20
  - type: WorldTargetAction
    event: !type:CEWorldTargetActionAnimationEvent
      animation: AnimationViatorIcicles


- type: entityEffectAnimation
  id: AnimationViatorIcicles
  movementSpeed: 0.3
  duration: 1.2
  lockRotation: true
  events:
    0:
    - !type:SetTimedAppearance
      key: attack
      duration: 1
    - !type:UsedEntityAnimation
      dummyEntity: CEProjectileTripleIcicle
      offsetAnimation:
      - time: 0.0
        offset: -0.5, 0
      - time: 0.2
        offset: -0.4, -0.2
      - time: 0.25
        offset: -0.3, -0.5
        easing: QuadIn
      - time: 0.3
        offset: 0, -0.7
        easing: QuadOut
      rotationAnimation:
      - time: 0.0
        rotation: -45
      - time: 0.3
        rotation: 0
    - !type:Dash
      distance: -2
    0.4:
    - !type:ShootProjectile
      projectileSpeed: 3
      projectileMaxSpeed: 5
      prototype: CEProjectileViatorIcicle
      projectileCount: 9
      spread: 0.5


- type: entity
  id: CEProjectileViatorIcicle
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _CE/Skills/Mage/triple_icicle.rsi
    layers:
    - state: projectile
      shader: unshaded
  - type: PointLight
    color: "#30caf5"
    radius: 1.8
    energy: 4.0
  - type: CEProjectile
    hitEffects:
    - !type:ShockWaveVFX
      width: 0.05
    - !type:CETileAffectArea
      effectTarget: Used
      tileEffect: CETileEffectFreeze
      radius: 1.5
      maxStacks: 6
    - !type:AreaEffect
      affectCaster: false
      range: 1.5
      effects:
      - !type:Damage
        attackType: Ranged
        damage:
          types:
            Cold: 10
      - !type:ApplyStatusEffectStack
        statusEffect: CEStatusEffectColdSlowdown
        amount: 2
        max: 5







# 4 - simple mana-free melee dash attack


- type: entity
  id: CEActionViatorMelee
  parent: CEActionSpellBase
  name: Melee dash attack
  components:
  - type: Action
    useDelay: 7
    icon:
      sprite: _CE/Skills/Mage/frost_flow.rsi
      state: icon
  - type: TargetAction
    checkCanAccess: false
    range: 20
  - type: WorldTargetAction
    event: !type:CEWorldTargetActionAnimationEvent
      animation: AnimationViatorMelee


- type: entityEffectAnimation
  id: AnimationViatorMelee
  movementSpeed: 0.3
  duration: 1.2
  lockRotation: true
  events:
    0:
    - !type:SetTimedAppearance
      key: attack
      duration: 1
    - !type:UsedEntityAnimation
      dummyEntity: CEWeaponMagicStaffIce
      offsetAnimation:
      - time: 0.0
        offset: -0.4, -0.1
        easing: QuadIn
      - time: 0.5
        offset: -1, -0
        easing: QuadIn
      - time: 0.55
        offset: -0.5, -0.5
      - time: 0.6
        offset: 0, -0.9
      - time: 0.7
        offset: 0.5, -0.5
      - time: 0.8
        offset: 0.9, -0.1
        easing: QuadOut
      rotationAnimation:
      - time: 0.0
        rotation: -135
        easing: QuadIn
      - time: 0.5
        rotation: -155
        easing: QuadIn
      - time: 0.75
        rotation: -45
      - time: 1.0
        rotation: 45

      colorAnimation:
      - time: 0.5
        color: "#ffffff"
        easing: QuadOut
      - time: 0.6
        color: "#ffffff00"  # Fade out

      scaleAnimation:
      - time: 0.0
        scale: 1, -1
    0.5:
    - !type:WeaponArcAttack
      range: 0.8
      arcWidth: 165
      effects:
      - !type:Damage
        attackType: Melee
        damage:
          types:
            Physical: 15
      - !type:ThrowFromUser
        distance: 3
        throwPower: 10
      - !type:ShockWaveVFX
        effectTarget: User
        width: 0.3


