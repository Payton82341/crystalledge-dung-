- type: entity
  id: CEMobDamageable
  save: false
  abstract: true
  components:
  - type: CEDamageable
  - type: CEDamagePopup
  - type: CEDestructible
    destroyThreshold: 100
    destroySound:
      collection: gib
  - type: Pullable
  - type: CEFlammable
    stackDelta: -1
  - type: CEFreezable
  - type: CEWettable
  - type: FloorOcclusion

- type: entity
  id: CEMobMagical
  abstract: true
  categories: [ ForkFiltered ]
  components:
  - type: CEMagicEnergyContainer

- type: entity
  id: CEMobCombat
  abstract: true
  categories: [ ForkFiltered ]
  components:
  - type: CombatMode
  - type: StatusIcon #TODO not here!
  - type: ContentEye
    maxZoom: 0.8, 0.8
    targetZoom: 0.8, 0.8
  - type: CEWeapon
    spriteRotation: 0
    effectSlots:
      OnHit:
      - !type:WeaponArcAttack
        range: 0.4
        arcWidth: 40
        effects:
        - !type:Damage
          damage:
            types:
              Physical: 5
    animations:
      Primary:
      - anim: Punch1
        staminaCost: 1
      - anim: Punch2
        staminaCost: 1
