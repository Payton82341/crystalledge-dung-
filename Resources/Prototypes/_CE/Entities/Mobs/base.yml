- type: entity
  id: CEMobDamageable
  save: false
  abstract: true
  components:
  - type: Damageable
    damageContainer: Biological
  - type: Destructible
  - type: Stamina
  - type: StunVisuals
  - type: MobState
  - type: MobThresholds
    thresholds:
      0: Alive
      10: Critical
      20: Dead
  - type: MobStateActions
    actions:
      Critical:
      - ActionCritSuccumb
      - ActionCritFakeDeath
      - ActionCritLastWords
  - type: HealthExaminable
    examinableTypes:
    - Blunt
    - Slash
    - Piercing
    - Heat
    - Shock
    - Cold
    - Caustic
    - Asphyxiation
    - Radiation
  - type: DamageOnHighSpeedImpact
    damage:
      types:
        Blunt: 5
    soundHit:
      path: /Audio/Effects/hit_kick.ogg
  - type: Pullable

- type: entity
  id: CEMobMagical
  abstract: true
  categories: [ ForkFiltered ]
  components:
  - type: CEMagicEnergyContainer
    maxEnergy: 10

- type: entity
  id: CEMobStatBased
  abstract: true
  categories: [ ForkFiltered ]
  components:
  - type: CEStats
    baseStats:
      Vitality: 5
      Intelligence: 5
  - type: CEVitalityMaxHealth
  - type: CEIntelligenceMaxMana
  - type: CEBlessingReceiver
  - type: CESkillStorage

- type: entity
  id: CEMobCombat
  abstract: true
  categories: [ ForkFiltered ]
  components:
  - type: CombatMode
  - type: CEWeapon
    spriteRotation: -90
    animations:
      Primary:
      - anim: SwordAttackLight1
      - anim: SwordAttackLight2
      Secondary:
      - anim: SwordAttackHeavy1
        speed: 1
      - anim: SwordAttackHeavy2
        speed: 1
  - type: CEMeleeWeapon
    damageGroups:
      default:
        types:
          Slash: 2
      pierce:
        types:
          Piercing: 2
