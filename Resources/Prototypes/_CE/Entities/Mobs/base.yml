- type: entity
  id: CEMobDamageable
  save: false
  abstract: true
  components:
  - type: CEDamageable
  - type: CEMobState
  - type: Pullable
  - type: CEFlammable
    stackDelta: -1

- type: entity
  id: CEMobMagical
  abstract: true
  categories: [ ForkFiltered ]
  components:
  - type: CEMagicEnergyContainer
    maxEnergy: 10

- type: entity
  id: CEMobStatBased
  abstract: true
  categories: [ ForkFiltered ]
  components:
  - type: CEStats
    baseStats:
      Vitality: 5
      Intelligence: 5
  - type: CEVitalityMaxHealth
  - type: CEIntelligenceMaxMana
  - type: CEBlessingReceiver
  - type: CESkillStorage

- type: entity
  id: CEMobCombat
  abstract: true
  categories: [ ForkFiltered ]
  components:
  - type: CombatMode
  - type: CEWeapon
    spriteRotation: -90
    damage:
      types:
        Physical: 1
    animations:
      Primary:
      - anim: SwordAttackLight1
      - anim: SwordAttackLight2
      Secondary:
      - anim: SwordAttackHeavy1
        speed: 1
      - anim: SwordAttackHeavy2
        speed: 1
