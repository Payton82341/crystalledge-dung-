- type: entity
  id: CEConsumableSlimeCoreWater
  parent: BaseItem
  categories: [ ForkFiltered ]
  name: Water slime core
  description: A pulsating core from a water slime. It humidifies the surrounding air. It seems fragile.
  components:
  - type: Item
    size: Tiny
  - type: CEDamageable
  - type: CEDamageOnLand
    damage:
      types:
        Physical: 1
  - type: CEDestructible
    destroyThreshold: 1
  - type: Sprite
    sprite: _CE/Objects/Consumable/slimecore.rsi
    layers:
    - state: base2
      color: "#009ce4"
  - type: CEConsumable
    useDelay: 1.5
    useSound:
      path: /Audio/Effects/Fluids/watersplash.ogg
    effects:
    - !type:WetEntity
      stacks: 6
  - type: CEDestructionEffect
    effects:
    - !type:WetArea
      radius: 1
      maxStacks: 3
