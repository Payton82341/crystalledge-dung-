- type: entity
  id: CEConsumableSlimeCoreFire
  parent:
  - CESlimeCoreBase
  name: Fire slime core
  description: A pulsating core from a fire slime. It heats the surrounding air but is cool to the touch. It seems fragile.
  components:
  - type: Sprite
    layers:
    - state: base1
      color: "#dfad57"
  - type: CEConsumable
    effects:
    - !type:ApplyStatusEffectStack
      statusEffect: CEStatusEffectTempShieldFire
      stack: 10
    - !type:RestoreMana #TODO remove later once more mana scources are added
      amount: 3
  - type: CEDestructionEffect
    effects:
    - !type:AreaEffect
      range: 1
      whitelist:
        components:
        - CEMobState
      effects:
      - !type:ApplyStatusEffectStack
        statusEffect: CEstatusEffectTempShieldFire
        stack: 10
    - !type:SpawnEntity
      effectTarget: User
      spawns:
      - CEEffectAreaHealingEffect
  - type: CEDestructible


