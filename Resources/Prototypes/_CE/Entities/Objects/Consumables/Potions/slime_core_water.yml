- type: entity
  id: CEConsumableSlimeCoreWater
  parent:
  - CEConsumableFoodBase
  - CESlimeCore
  name: Water slime core
  description: A pulsating core from a slime. It cools the surrounding air yet it's warm to the touch. It seems fragile.
  components:
  - type: Sprite
    layers:
    - state: base1
      color: "#00ccff"
  - type: CEConsumable
    effects:
    - !type:AddTempShield
      amount: 10
      damageType: Cold
    - !type:RestoreMana
      amount: 3
  - type: CEDestructionEffect
    effects:
    - !type:AreaEffect
      range: 1
      whitelist:
        components:
        - CEMobState
      effects:
      - !type:AddTempShield
        amount: 10
        damageType: Cold
    - !type:SpawnEntity
      effectTarget: User
      spawns:
      - CEEffectAreaHealingEffect
  - type: CEDestructible
