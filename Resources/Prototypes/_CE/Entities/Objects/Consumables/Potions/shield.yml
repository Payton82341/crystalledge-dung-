- type: entity
  id: CEConsumablePotionPhysicalShield
  parent:
  - CEConsumablePotionBase
  - CEPotionCube
  name: potion of physical protection
  description: A thick, metallic brew that coats the body in a shimmering barrier. Grants temporary shields against physical damage.
  components:
  - type: Sprite
    layers:
    - state: icon
    - state: fill
      color: "#b2e3eb"
  - type: CEConsumable
    effects:
    - !type:AddTempShield
      amount: 30
      damageType: Physical
  - type: CEDestructionEffect
    effects:
    - !type:AreaEffect
      range: 1
      whitelist:
        components:
        - CEMobState
      effects:
      - !type:AddTempShield
        amount: 15
        damageType: Physical
    - !type:SpawnEntity
      effectTarget: User
      spawns:
      - CEEffectAreaHealingEffect
  - type: CEDestructible

