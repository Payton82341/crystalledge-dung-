- type: entity
  parent:
  - CEConsumablePotionBase
  - CEPotionSmall
  id: CEConsumablePotionManaSmallCondensated
  suffix: Condensated, mana restoring modifiers doesnt work.
  name: condensated small mana potion
  description: Another entity's mana concentrate. Restores mana just like mana potions, but mana restoration modifiers do not apply.
  components:
  - type: Sprite
    layers:
    - state: icon
    - state: fill
      color: "#1f36b6"
  - type: CEConsumable
    effects:
    - !type:RestoreMana
      amount: 5
      applyModifiers: false
    - !type:SpawnEntity
      spawns:
      - CEEffectManaRestore
  - type: CEDestructionEffect
    effects:
    - !type:AreaEffect
      range: 1
      whitelist:
        components:
        - CEMobState
      effects:
      - !type:RestoreMana
        amount: 2
        applyModifiers: false
      - !type:SpawnEntity
        spawns:
        - CEEffectManaRestore
    - !type:SpawnEntity
      effectTarget: User
      spawns:
      - CEEffectPotionManaRestore

