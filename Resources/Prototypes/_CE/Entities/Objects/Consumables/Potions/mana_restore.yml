- type: entity
  id: CEEffectPotionManaRestore
  parent: CEBaseMagicImpact
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    drawdepth: BelowMobs
    sprite: _CE/Effects/area_healing_effect.rsi #TODO custom sprite
    layers:
    - state: effect
      color: "#61a7e1"
      shader: unshaded
  - type: PointLight
    color: "#61a7e1"
    radius: 2
  - type: TimedDespawn
    lifetime: 2
  - type: LightBehaviour
    behaviours:
      - !type:PulseBehaviour
        interpolate: Linear
        maxDuration: 2
        startValue: 0
        endValue: 5.0
        property: Energy
        isLooped: false
        enabled: true
