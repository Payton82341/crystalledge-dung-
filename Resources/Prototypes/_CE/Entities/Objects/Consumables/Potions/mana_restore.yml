- type: entity
  id: CEConsumablePotionManaSmall
  parent:
  - CEConsumablePotionBase
  - CEPotionSmall
  name: small mana potion
  description: TODO
  components:
  - type: Sprite
    layers:
    - state: icon
    - state: fill
      color: "#1f36b6"
  - type: CEConsumable
    effects:
    - !type:RestoreMana
      amount: 5
    - !type:SpawnEntity
      spawns:
      - CEEffectManaRestore
  - type: CEDestructionEffect
    effects:
    - !type:AreaEffect
      range: 1
      whitelist:
        components:
        - CEMobState
      effects:
      - !type:RestoreMana
        amount: 2
      - !type:SpawnEntity
        spawns:
        - CEEffectManaRestore
    - !type:SpawnEntity
      effectTarget: User
      spawns:
      - CEEffectAreaHealingEffect

