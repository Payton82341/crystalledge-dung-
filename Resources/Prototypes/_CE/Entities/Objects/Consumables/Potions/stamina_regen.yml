- type: entity
  id: CEStatusEffectStaminaRegenBuff
  name: Stamina Regen
  description: Your stamina regeneration is increased by [color=#2bef1d]5[/color] per second.
  components:
  - type: StatusEffect
  - type: StatusEffectAlert
    alert: CEStaminaRegenBuff
  - type: CEStaminaRegenBuff
    flatRegenBonus: 5

- type: alert
  id: CEStaminaRegenBuff
  icons:
  - sprite: _CE/Skills/General/stamina_upgrade.rsi
    state: icon
