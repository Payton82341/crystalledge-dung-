- type: entity
  id: CEConsumablePotionStaminaSmall
  parent:
  - CEConsumablePotionBase
  - CEPotionSmall
  name: small stamina potion
  description: A fizzing brew that quickens the body's recovery. Restores stamina faster for a short time.
  components:
  - type: Sprite
    layers:
    - state: icon
    - state: fill
      color: "#3db63d"
  - type: CEConsumable
    effects:
    - !type:ApplyStatusEffect
      statusEffect: CEStatusEffectStaminaRegenBuff
      duration: 30
    - !type:SpawnEntity
      spawns:
      - CEEffectHealingGeneric
  - type: CEDestructionEffect
    effects:
    - !type:AreaEffect
      range: 1
      whitelist:
        components:
        - CEMobState
      effects:
      - !type:ApplyStatusEffect
        statusEffect: CEStatusEffectStaminaRegenBuff
        duration: 15
      - !type:SpawnEntity
        spawns:
        - CEEffectHealingGeneric
    - !type:SpawnEntity
      effectTarget: User
      spawns:
      - CEEffectAreaHealingEffect
  - type: CEDestructible

