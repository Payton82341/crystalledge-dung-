
- type: entity
  id: CEConsumablePotionAlchemicalFire
  parent:
  - CEConsumablePotionBase
  - CEPotionMedium
  name: alchemical fire
  description: TODO
  components:
  - type: Sprite
    layers:
    - state: icon
    - state: fill
      color: "#ffae00"
    - sprite: _CE/Effects/fire_status.rsi
      state: effect
      shader: unshaded
  - type: CEConsumable
    effects:
    - !type:IgniteEntity
      stacks: 6
    - !type:SpawnEntity
      spawns:
      - CEEffectHealingGeneric
  - type: CEDestructionEffect
    effects:
    - !type:IgniteArea
      radius: 2
      maxStacks: 6
    - !type:SpawnEntity
      effectTarget: User
      spawns:
      - CEEffectPotionAlchemicalFire
  - type: CEDestructible
  - type: PointLight
    color: "#ffae00"
    radius: 1.3
    energy: 10

- type: entity
  id: CEEffectPotionAlchemicalFire
  parent: CEBaseMagicImpact
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Sprite
    drawdepth: BelowMobs
    sprite: _CE/Effects/firewall_telegraphy.rsi
    layers:
    - state: effect
      shader: unshaded
  - type: PointLight
    color: "#ffae00"
    radius: 2
  - type: TimedDespawn
    lifetime: 2
  - type: LightBehaviour
    behaviours:
      - !type:PulseBehaviour
        interpolate: Linear
        maxDuration: 2
        startValue: 0
        endValue: 5.0
        property: Energy
        isLooped: false
        enabled: true
