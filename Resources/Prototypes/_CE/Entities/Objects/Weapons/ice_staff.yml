- type: entity
  parent: CEBaseWeapon
  id: CEWeaponMagicStaffIce
  name: ice staff
  description: A staff imbued with ice magic. Launches freezing projectiles at enemies.
  components:
  - type: Sprite
    sprite: _CE/Objects/Weapons/Staff/ice_staff.rsi
    layers:
    - state: icon
    - state: orb
      shader: unshaded
  - type: CEWeapon
    effectSlots:
      OnHit:
      - !type:ShootProjectile
        prototype: CEProjectileMagicIce
        projectileSpeed: 10
      - !type:Damage
        effectTarget: Used
        damage:
          types:
            Physical: 1
      OnHeavyHit:
      - !type:WeaponArcAttack
        range: 0.78
        arcWidth: 45
        effects:
        - !type:Damage
          damage:
            types:
              Physical: 5
        - !type:Damage
          effectTarget: Used
          damage:
            types:
              Physical: 1
    animations:
      Primary:
      - anim: StaffAttackLight1
        staminaCost: 1
      - anim: StaffAttackLight2
        staminaCost: 1
      Secondary:
      - anim: StaffAttackHeavy
        staminaCost: 1
  - type: Clothing
    slots:
    - neck
  - type: Wieldable

- type: entity
  id: CEProjectileMagicIce
  name: ice bolt
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _CE/Effects/cold_slowdown_status.rsi
    layers:
    - state: effect
      shader: unshaded
  - type: PointLight
    color: "#30caf5"
    radius: 1.5
    energy: 3.0
  - type: CEProjectile
    hitEffects:
    - !type:Damage
      damage:
        types:
          Cold: 5
