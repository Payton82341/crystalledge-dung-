- type: entity
  id: CEWeaponSkimitarMolten
  parent: CEBaseWeapon
  name: molten skimitar
  description: TODO
  components:
  - type: Sprite
    sprite: _CE/Objects/Weapons/Skimitar/molten.rsi
    layers:
    - state: icon
    - state: fire
      shader: unshaded
  - type: CEWeapon
    effectSlots:
      OnHit:
      - !type:WeaponArcAttack
        range: 0.6
        arcWidth: 60
        effects:
        - !type:Damage
          attackType: Melee
          damage:
            types:
              Physical: 5
              Fire: 5
        - !type:ApplyStatusEffectStack
          statusEffect: CEStatusEffectFire
          amount: 2
          max: 10
      OnHeavyHit:
      - !type:WeaponArcAttack
        range: 0.6
        arcWidth: 360
        effects:
        - !type:Damage
          attackType: Melee
          damage:
            types:
              Physical: 2
              Fire: 3
        - !type:ApplyStatusEffectStack
          statusEffect: CEStatusEffectFire
          amount: 2
          max: 10

    animations:
      Primary:
      - anim: SkimitarAttackLight1
      - anim: SkimitarAttackLight2
      Secondary:
      - anim: SkimitarAttackHeavy1
  - type: CEWeaponStaminaCost
    costs:
      Primary: 1
      Secondary: 2
  - type: Clothing
    slots:
    - neck
