- type: entity
  id: CEWeaponSpearSoulCatcher
  parent: CEBaseWeapon
  name: soul catcher
  description: A rare magical weapon that does not deal physical damage but wounds the soul, draining mana from it and transferring it to the wielder
  components:
  - type: Sprite
    sprite: _CE/Objects/Weapons/Spear/soul_catcher.rsi
    layers:
    - state: icon
    - state: blade
      shader: unshaded
  - type: CEWeapon
    effectSlots:
      OnHit:
      - !type:WeaponArcAttack
        range: 1.26
        arcWidth: 15
        effects:
        - !type:Damage
          attackType: Melee
          damage:
            types:
              Cold: 5
        - !type:StealMana
          amount: 1
        - !type:SpawnEntity
          effectTarget: Target
          spawns:
          - CEEffectManaDrain
      OnHeavyHit:
      - !type:WeaponArcAttack
        range: 1.4
        arcWidth: 25
        effects:
        - !type:Damage
          attackType: Melee
          damage:
            types:
              Cold: 10
        - !type:StealMana
          amount: 2
        - !type:SpawnEntity
          effectTarget: Target
          spawns:
          - CEEffectManaDrain
    animations:
      Primary:
      - anim: SpearAttackLight
      Secondary:
      - anim: SpearAttackHeavy
      - anim: SpearAttackHeavy2
  #- type: CEWieldedWeapon #TODO: Custom wielded animations
  #  animations:
  #    Primary:
  #    - anim: SpearAttackLight
  #    Secondary:
  #    - anim: SpearAttackHeavy
  - type: CEWeaponStaminaCost
    costs:
      Primary: 2
      Secondary: 3
  - type: Wieldable
  - type: Clothing
    slots:
    - neck
