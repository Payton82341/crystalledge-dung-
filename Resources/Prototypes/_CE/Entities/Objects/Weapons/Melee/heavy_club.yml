- type: entity
  parent: [CEBaseWeapon, CEBaseWeaponDestructible]
  id: CEWeaponHeavyClub
  name: heavy club
  description: TODO
  components:
  - type: Sprite
    sprite: _CE/Objects/Weapons/heavy_club.rsi
    state: icon
  - type: CEDestructible
    destroyThreshold: 50
  - type: CEWeapon
    effectSlots:
      OnHit:
      - !type:WeaponArcAttack
        range: 0.6
        arcWidth: 60
        effects:
        - !type:Damage
          damage:
            types:
              Physical: 15
        - !type:Damage
          effectTarget: Used
          damage:
            types:
              Physical: 1
      OnHeavyHit:
      - !type:WeaponArcAttack
        range: 0.6
        arcWidth: 180
        effects:
        - !type:Damage
          damage:
            types:
              Physical: 15
        - !type:Damage
          effectTarget: Used
          damage:
            types:
              Physical: 1
    animations:
      Primary:
      - anim: StaffAttackLight1
        speed: 0.7
      - anim: StaffAttackLight2
        speed: 0.7
      Secondary:
      - anim: SwordAttackHeavy1
        speed: 0.7
      - anim: SwordAttackHeavy2
        speed: 0.7
  - type: CEWeaponStaminaCost
    costs:
      Primary: 2
      Secondary: 3
  - type: Clothing
    slots:
    - neck
