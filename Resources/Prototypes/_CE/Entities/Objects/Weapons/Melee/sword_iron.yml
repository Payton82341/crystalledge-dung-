- type: entity
  id: CEWeaponSwordIron
  parent: CEBaseWeapon
  name: iron sword
  description: A finely crafted sword favored by imperial officers. Its blade gleams with authority and tradition.
  components:
  - type: Sprite
    sprite: _CE/Objects/Weapons/Sword/iron.rsi
    state: icon
  - type: CEWeapon
    effectSlots:
      OnHit:
      - !type:WeaponArcAttack
        range: 0.7
        arcWidth: 40
        effects:
        - !type:Damage
          damage:
            types:
              Physical: 10
      OnHeavyHit:
      - !type:WeaponArcAttack
        range: 0.6
        arcWidth: 180
        effects:
        - !type:Damage
          damage:
            types:
              Physical: 10
    animations:
      Primary:
      - anim: SwordAttackLight1
      - anim: SwordAttackLight2
      Secondary:
      - anim: SwordAttackHeavy1
        speed: 1.2
      - anim: SwordAttackHeavy2
        speed: 1.2
  - type: CEWeaponStaminaCost
    costs:
      Primary: 1
      Secondary: 1
  - type: Clothing
    slots:
    - neck
