- type: entity
  id: CEWeaponSwordBone
  parent: [CEBaseWeapon, CEBaseWeaponDestructible]
  name: bone sword
  description: Nicks on the blade leave bruise wounds, increasing the damage dealt to the target
  components:
  - type: Sprite
    sprite: _CE/Objects/Weapons/Sword/bone.rsi
    state: icon
  - type: CEDestructible
    destroyThreshold: 50
  - type: CEWeapon
    effectSlots:
      OnHit:
      - !type:WeaponArcAttack
        range: 0.7
        arcWidth: 20
        effects:
        - !type:Damage
          damage:
            types:
              Physical: 5
        - !type:ApplyStatusEffectStack
          statusEffect: CEStatusEffectBruise
          stack: 1
          maxStacks: 10
        - !type:Damage
          effectTarget: Used
          damage:
            types:
              Physical: 1
      OnHeavyHit:
      - !type:WeaponArcAttack
        range: 1.1
        arcWidth: 15
        effects:
        - !type:Damage
          damage:
            types:
              Physical: 8
        - !type:ApplyStatusEffectStack
          statusEffect: CEStatusEffectBruise
          stack: 2
          maxStacks: 10
        - !type:Damage
          effectTarget: Used
          damage:
            types:
              Physical: 2
    animations:
      Primary:
      - anim: SwordAttackLight1
      - anim: SwordAttackLight2
      Secondary:
      - anim: SpearAttackHeavy2
        speed: 1.2
  - type: CEWeaponStaminaCost
    costs:
      Primary: 1
      Secondary: 2
  - type: Clothing
    slots:
    - neck
