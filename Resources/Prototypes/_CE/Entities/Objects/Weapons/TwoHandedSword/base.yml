- type: entity
  abstract: true
  id: CEBaseWeaponTwoHandedSword
  categories: [ ForkFiltered ]
  parent:
  - BaseItem
  components:
  - type: Item
    size: Ginormous
  - type: CEItemAnimation
    spriteRotation: -90
    animations:
      Primary:
      - anim: SwordAttackLight1
        speed: 0.5
      - anim: SwordAttackLight2
        speed: 0.5
      Secondary:
      - anim: SwordAttackLight1
        speed: 0.5
      - anim: SwordAttackLight2
        speed: 0.5
  - type: CEWieldedItemAnimation
    animations:
      Primary:
      - anim: SwordAttackHeavy1
      - anim: SwordAttackHeavy2
      Secondary:
      - anim: SwordAttackHeavy1
      - anim: SwordAttackHeavy2
  - type: Clothing
    slots:
    - neck
    equipWhileMoving: true
    equipDelay: 1
    unequipDelay: 1
  - type: Wieldable
  - type: CEMeleeWeapon
    rangeMultiplier: 1.2 #Longer reach
    damageGroups:
      default:
        types:
          Slash: 4
      pierce:
        types:
          Piercing: 4