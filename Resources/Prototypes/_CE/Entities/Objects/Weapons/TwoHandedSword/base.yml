- type: entity
  abstract: true
  id: CEBaseWeaponTwoHandedSword
  categories: [ ForkFiltered ]
  parent:
  - BaseItem
  components:
  - type: Item
    size: Large
  - type: CEWeapon
    spriteRotation: -90
    effectSlots:
      OnHit:
      - !type:WeaponArcAttack
        range: 0.84
        arcWidth: 40
        effects:
        - !type:Damage
          damage:
            types:
              Physical: 4
      OnHeavyHit:
      - !type:WeaponArcAttack
        range: 0.72
        arcWidth: 180
        effects:
        - !type:Damage
          damage:
            types:
              Physical: 4
    animations:
      Primary:
      - anim: SwordAttackLight1
        speed: 0.5
        staminaCost: 2.5
      - anim: SwordAttackLight2
        speed: 0.5
        staminaCost: 2.5
      Secondary:
      - anim: SwordAttackLight1
        speed: 0.5
        staminaCost: 2.5
      - anim: SwordAttackLight2
        speed: 0.5
        staminaCost: 2.5
  - type: CEWieldedWeapon
    animations:
      Primary:
      - anim: SwordAttackHeavy1
        speed: 0.5
        staminaCost: 2.5
      - anim: SwordAttackHeavy2
        speed: 0.5
        staminaCost: 2.5
      Secondary:
      - anim: SwordAttackHeavy1
        speed: 0.5
        staminaCost: 2.5
      - anim: SwordAttackHeavy2
        speed: 0.5
        staminaCost: 2.5
  - type: Clothing
    slots:
    - neck
    equipWhileMoving: true
    equipDelay: 1
    unequipDelay: 1
  - type: Wieldable
