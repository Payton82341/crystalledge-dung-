- type: entityEffectAnimation
  id: SelfCut
  movementSpeed: 0.6
  duration: 0.4
  events:
    0:
    - !type:PlaySound
      sound:
        path: /Audio/_CE/Effects/Weapon/slash_sword2.ogg
    - !type:UsedEntityAnimation
      offsetAnimation:
      - time: 0.0
        offset: 0, -0.5
        easing: QuadOut
      - time: 0.2
        offset: 0, -0.7
        easing: QuadIn
      - time: 0.5
        offset: 0, -0
      - time: 0.6
        offset: 0, -0.3

      rotationAnimation:
      - time: 0.0
        rotation: -180

      colorAnimation:
      - time: 0.5
        color: "#ffffff"
      - time: 0.6
        color: "#ffffff00"  # Fade out
        easing: QuadOut
    0.39:
    - !type:WeaponEffectSlot
      slot: OnHeavyHit
