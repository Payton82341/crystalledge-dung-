- type: entity
  parent: CEBaseWeapon
  id: CEWeaponDaggerSacrificial
  name: sacrificial dagger
  description: An enchanted dagger that restores mana to whoever it cuts.
  components:
  - type: Item
    shape:
    - 0, 0, 1, 1
  - type: Sprite
    sprite: _CE/Objects/Weapons/Dagger/sacrifice_dagger.rsi
    state: icon
  - type: CEWeapon
    effectSlots:
      OnHit:
      - !type:WeaponArcAttack
        range: 0.4
        arcWidth: 40
        effects:
        - !type:Damage
          ignoreArmor: true
          damage:
            types:
              Physical: 2
      OnHeavyHit: # Apply this effect of self
      - !type:Damage
        effectTarget: User
        ignoreArmor: true
        damage:
          types:
            Physical: 2
      - !type:RestoreMana
        effectTarget: User
        amount: 3
      - !type:SpawnEntity
        effectTarget: User
        spawns:
        - CEEffectManaRestore
    animations:
      Primary:
      - anim: DaggerAttackLight1
        speed: 2
      - anim: DaggerAttackLight2
        speed: 2
      Secondary:
      - anim: SelfCut
  - type: CEWeaponStaminaCost
    costs:
      Primary: 1
      Secondary: 1
  - type: CEWeaponChargesCost
    costs:
      Secondary: 1
  - type: CECharges
    maxCharges: 10
    currentCharges: 10
  - type: Clothing
    slots:
    - belt
