- type: entity
  id: CEWeaponSwordBone
  parent:
  - CEBaseWeapon
  name: bone sword
  description: Nicks on the blade leave bruise wounds, increasing the damage dealt to the target
  components:
  - type: Sprite
    sprite: _CE/Objects/Weapons/Sword/bone.rsi
    state: icon
  - type: CEDestructible
    destroyThreshold: 40
  - type: CEWeapon
    effectSlots:
      OnHit:
      - !type:WeaponArcAttack
        range: 0.7
        arcWidth: 20
        effects:
        - !type:Damage
          damage:
            types:
              Physical: 3
        - !type:AddDamageVulnerability
          damageType: Physical
          amount: 1
          maxStacks: 10
        - !type:Damage
          effectTarget: Used
          damage:
            types:
              Physical: 1
      OnHeavyHit:
      - !type:WeaponArcAttack
        range: 1.1
        arcWidth: 15
        effects:
        - !type:Damage
          damage:
            types:
              Physical: 6
        - !type:AddDamageVulnerability
          damageType: Physical
          amount: 2
          maxStacks: 10
        - !type:Damage
          effectTarget: Used
          damage:
            types:
              Physical: 2
    animations:
      Primary:
      - anim: SwordAttackLight1
        staminaCost: 1
      - anim: SwordAttackLight2
        staminaCost: 1
      Secondary:
      - anim: SpearAttackHeavy2
        speed: 1.2
        staminaCost: 2
  - type: Clothing
    slots:
    - neck
