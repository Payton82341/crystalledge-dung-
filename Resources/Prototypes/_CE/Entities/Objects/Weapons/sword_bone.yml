- type: entity
  id: CEWeaponSwordBone
  parent:
  - CEBaseWeapon
  name: bone sword
  description: A serrated sword forged from the spine of a reckless adventurer
  components:
  - type: Sprite
    sprite: _CE/Objects/Weapons/Sword/bone.rsi
    state: icon
  - type: CEWeapon
    effectSlots:
      OnHit:
      - !type:WeaponArcAttack
        range: 0.7
        arcWidth: 20
        effects:
        - !type:Damage
          damage:
            types:
              Physical: 3
      OnHeavyHit:
      - !type:WeaponArcAttack
        range: 1.1
        arcWidth: 15
        effects:
        - !type:Damage
          damage:
            types:
              Physical: 4
    animations:
      Primary:
      - anim: SwordAttackLight1
      - anim: SwordAttackLight2
      Secondary:
      - anim: SpearAttackHeavy2
        speed: 1.2
  - type: CEWeaponStaminaCost
    costs:
      Primary: 1
      Secondary: 2
  - type: Clothing
    slots:
    - neck
