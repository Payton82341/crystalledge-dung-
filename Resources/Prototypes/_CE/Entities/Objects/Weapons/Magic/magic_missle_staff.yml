- type: entity
  parent: CEBaseWeapon
  id: CEWeaponMagicStaffMagicMissile
  name: magic missile staff
  description: "A mage's standard weapon that fires compressed beams of energy."
  components:
  - type: Sprite
    sprite: _CE/Objects/Weapons/Staff/magic_missile_staff.rsi
    layers:
    - state: icon
    - state: orb
      shader: unshaded
  - type: CEWeapon
    effectSlots:
      OnHit:
      - !type:ShootProjectile
        prototype: CEProjectileMagicMissile
        projectileSpeed: 10
      OnHeavyHit:
      - !type:ShootProjectile
        prototype: CEProjectileMagicMissile
        projectileSpeed: 10
        projectileMaxSpeed: 5
        projectileCount: 3
        spread: 0.2
    animations:
      Primary:
      - anim: StaffAttackLight1
      - anim: StaffAttackLight2
      Secondary:
      - anim: StaffAttackHeavy
  - type: CEWeaponStaminaCost
    costs:
      Primary: 1
      Secondary: 3
  - type: CEWeaponManaCost
    costs:
      Secondary: 3
  - type: CEMagicEnergyContainer
    maxEnergy: 50
  - type: CEMagicEnergyExaminable
  - type: Clothing
    slots:
    - neck

- type: entity
  id: CEProjectileMagicMissile
  name: magic missile
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _CE/Effects/magic_missile.rsi
    layers:
    - state: effect
      shader: unshaded
  - type: PointLight
    color: "#ffffff"
    radius: 1.5
    energy: 3.0
  - type: CEProjectile
    hitEffects:
    - !type:Damage
      attackType: Ranged
      damage:
        types:
          Physical: 5
