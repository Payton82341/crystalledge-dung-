- type: entity
  parent: CEBaseWeapon
  id: CEWeaponMagicStaffSparkle
  name: fire sparkle staff
  description: The simplest magical weapon that shoots hot sparks
  components:
  - type: Sprite
    sprite: _CE/Objects/Weapons/Staff/sparkle_staff.rsi
    layers:
    - state: icon
    - state: orb
      shader: unshaded
  - type: CEWeapon
    effectSlots:
      OnHit:
      - !type:ShootProjectile
        prototype: CEProjectileMagicSparkle
        projectileSpeed: 10
      OnHeavyHit:
      - !type:ShootProjectile
        prototype: CEProjectileMagicSparkle
        projectileSpeed: 10
        projectileMaxSpeed: 5
        projectileCount: 3
        spread: 0.2
    animations:
      Primary:
      - anim: StaffAttackLight1
      - anim: StaffAttackLight2
      Secondary:
      - anim: StaffAttackHeavy
  - type: CEWeaponStaminaCost
    costs:
      Primary: 1
      Secondary: 3
  - type: CEWeaponManaCost
    costs:
      Secondary: 5
  - type: CEMagicEnergyContainer
    maxEnergy: 50
  - type: CEMagicEnergyExaminable
  - type: Clothing
    slots:
    - neck

- type: entity
  id: CEProjectileMagicSparkle
  name: fire bolt
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _CE/Effects/StatusEffects/fire_status.rsi
    layers:
    - state: effect
      shader: unshaded
  - type: PointLight
    color: "#ff9603"
    radius: 1.5
    energy: 3.0
  - type: CEProjectile
    hitEffects:
    - !type:Damage
      attackType: Ranged
      damage:
        types:
          Fire: 5
