- type: entity
  parent: CEBaseWeapon
  id: CEWeaponMagicStaffFire
  name: fire staff
  description: A staff imbued with fire magic. Launches fiery projectiles at enemies.
  components:
  - type: Sprite
    sprite: _CE/Objects/Weapons/Staff/fire_staff.rsi
    layers:
    - state: icon
    - state: orb
      shader: unshaded
  - type: CEWeapon
    effectSlots:
      OnHit:
      - !type:ShootProjectile
        prototype: CEProjectileMagicFire
        projectileSpeed: 10
      OnHeavyHit:
      - !type:WeaponArcAttack
        range: 0.78
        arcWidth: 45
        effects:
        - !type:Damage
          damage:
            types:
              Physical: 5
    animations:
      Primary:
      - anim: StaffAttackLight1
      - anim: StaffAttackLight2
      Secondary:
      - anim: StaffAttackHeavy
  - type: CEWeaponStaminaCost
    costs:
      Primary: 1
      Secondary: 1
  - type: Clothing
    slots:
    - neck
  - type: Wieldable

- type: entity
  id: CEProjectileMagicFire
  name: fire bolt
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _CE/Effects/fire_status.rsi
    layers:
    - state: effect
      shader: unshaded
  - type: PointLight
    color: "#ff9603"
    radius: 1.5
    energy: 3.0
  - type: CEProjectile
    hitEffects:
    - !type:Damage
      damage:
        types:
          Fire: 5
