- type: entity
  parent: CEBaseWeapon
  id: CEWeaponMagicStaffIce
  name: ice staff
  description: A staff imbued with ice magic. Launches freezing projectiles at enemies.
  components:
  - type: Sprite
    sprite: _CE/Objects/Weapons/Staff/ice_staff.rsi
    layers:
    - state: icon
    - state: orb
      shader: unshaded
  - type: CEWeapon
    effectSlots:
      OnHit:
      - !type:ShootProjectile
        prototype: CEProjectileMagicIce
        projectileSpeed: 10
      OnHeavyHit:
      - !type:ShootProjectile
        prototype: CEProjectileMagicIce
        projectileSpeed: 10
        projectileMaxSpeed: 5
        projectileCount: 5
        spread: 150
    animations:
      Primary:
      - anim: StaffAttackLight1
      - anim: StaffAttackLight2
      Secondary:
      - anim: StaffAttackHeavy
  - type: CEWeaponStaminaCost
    costs:
      Primary: 1
      Secondary: 3
  - type: CEWeaponChargesCost
    costs:
      Primary: 1
  - type: CECharges
    maxCharges: 40
    currentCharges: 40
  - type: Clothing
    slots:
    - neck

- type: entity
  id: CEProjectileMagicIce
  name: ice bolt
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _CE/Effects/StatusEffects/cold_slowdown_status.rsi
    layers:
    - state: effect
      shader: unshaded
  - type: PointLight
    color: "#30caf5"
    radius: 1.5
    energy: 3.0
  - type: CEProjectile
    hitEffects:
    - !type:Damage
      attackType: Ranged
      damage:
        types:
          Cold: 5
