- type: entity
  parent: [CEBaseWeapon, CEBaseWeaponDestructible]
  id: CEWeaponMagicStaffHealing
  name: healing staff
  description: A staff imbued with healing magic. Restores health to anything it hit.
  components:
  - type: Sprite
    sprite: _CE/Objects/Weapons/Staff/healing_staff.rsi
    layers:
    - state: icon
    - state: orb
      shader: unshaded
  - type: CEWeapon
    effectSlots:
      OnHit:
      - !type:ShootProjectile
        prototype: CEProjectileMagicHealing
        projectileCount: 3
        projectileSpeed: 3
        projectileMaxSpeed: 7
        spread: 0.2
      - !type:Damage
        effectTarget: Used
        damage:
          types:
            Physical: 1
      OnHeavyHit:
      - !type:WeaponArcAttack
        range: 0.78
        arcWidth: 45
        effects:
        - !type:Damage
          damage:
            types:
              Physical: 5
        - !type:Damage
          effectTarget: Used
          damage:
            types:
              Physical: 1
    animations:
      Primary:
      - anim: StaffAttackLight1
      - anim: StaffAttackLight2
      Secondary:
      - anim: StaffAttackHeavy
  - type: CEWeaponStaminaCost
    costs:
      Primary: 1
      Secondary: 1
  - type: CEWeaponChargesCost
    costs:
      Primary: 1
  - type: CECharges
    maxCharges: 10
    currentCharges: 10
  - type: Clothing
    slots:
    - neck
  - type: Wieldable

- type: entity
  id: CEProjectileMagicHealing
  name: healing energy bolt
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _CE/Effects/cold_slowdown_status.rsi
    layers:
    - state: effect
      shader: unshaded
      color: "#30f5b7"
  - type: PointLight
    color: "#30f5b7"
    radius: 1.5
    energy: 3.0
  - type: CEProjectile
    hitEffects:
    - !type:Heal
      amount: 5
    - !type:SpawnEntity
      spawns:
      - CEEffectHealingGeneric
