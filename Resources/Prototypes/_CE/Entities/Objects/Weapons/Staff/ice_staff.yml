- type: entity
  parent: CEBaseWeaponStaff
  id: CEWeaponMagicStaffIce
  name: ice staff
  description: A staff imbued with ice magic. Launches freezing projectiles at enemies.
  components:
  - type: Sprite
    sprite: _CE/Objects/Weapons/Staff/ice_staff.rsi
    layers:
    - state: icon
    - state: orb
      shader: unshaded
  - type: CEWeapon
    effectSlots:
      OnHit:
      - !type:ShootProjectile
        prototype: CEProjectileMagicIce
        projectileSpeed: 10
      - !type:Damage
        effectTarget: Used
        damage:
          types:
            Physical: 1

- type: entity
  id: CEProjectileMagicIce
  name: ice bolt
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _CE/Effects/cold_slowdown_status.rsi
    layers:
    - state: effect
      shader: unshaded
  - type: PointLight
    color: "#30caf5"
    radius: 1.5
    energy: 3.0
  - type: CEProjectile
    hitEffects:
    - !type:Damage
      damage:
        types:
          Cold: 1
