    sprite: _CE/Objects/Weapons/Staff/wooden.rsi
    state: icon
  - type: CEWeapon
    effectSlots:
      OnHit:
      - !type:WeaponArcAttack
        range: 0.6
        arcWidth: 100
        effects:
