          damage:
            types:
              Physical: 2
        - !type:Damage
          effectTarget: Used
          damage:
            types:
              Physical: 1
      OnHeavyHit:
      - !type:WeaponArcAttack
        range: 0.78
        arcWidth: 45
        effects:
        - !type:Damage
          damage:
            types:
              Physical: 2
        - !type:Damage
          effectTarget: Used
          damage:
            types:
              Physical: 1
