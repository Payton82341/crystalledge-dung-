- type: entity
  abstract: true
  id: CEBaseWeaponStaff
  parent:
  - CEBaseWeapon
  components:
  - type: CEWeapon
    effectSlots:
      OnHit:
      - !type:WeaponArcAttack
        range: 0.6
        arcWidth: 100
        effects:
        - !type:Damage
          damage:
            types:
              Physical: 2
        - !type:Damage
          effectTarget: Used
          damage:
            types:
              Physical: 1
      OnHeavyHit:
      - !type:WeaponArcAttack
        range: 0.78
        arcWidth: 45
        effects:
        - !type:Damage
          damage:
            types:
              Physical: 2
        - !type:Damage
          effectTarget: Used
          damage:
            types:
              Physical: 1
    animations:
      Primary:
      - anim: StaffAttackLight1
        staminaCost: 1
      - anim: StaffAttackLight2
        staminaCost: 1
      Secondary:
      - anim: StaffAttackHeavy
        staminaCost: 1
  - type: Clothing
    slots:
    - neck
  - type: Wieldable
