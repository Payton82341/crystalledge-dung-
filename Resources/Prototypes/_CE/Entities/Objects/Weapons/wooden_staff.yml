- type: entity
  parent: CEBaseWeapon
  id: CEWeaponStaffWooden
  name: wooden staff
  description: A long wooden stick with an iron tip.
  components:
  - type: Sprite
    sprite: _CE/Objects/Weapons/Staff/wooden.rsi
    state: icon
  - type: CEWeapon
    effectSlots:
      OnHit:
      - !type:WeaponArcAttack
        range: 0.6
        arcWidth: 100
        effects:
        - !type:Damage
          damage:
            types:
              Physical: 2
      OnHeavyHit:
      - !type:WeaponArcAttack
        range: 0.78
        arcWidth: 45
        effects:
        - !type:Damage
          damage:
            types:
              Physical: 2
    animations:
      Primary:
      - anim: StaffAttackLight1
      - anim: StaffAttackLight2
      Secondary:
      - anim: StaffAttackHeavy
  - type: CEWeaponStaminaCost
    costs:
      Primary: 1
      Secondary: 1
  - type: Clothing
    slots:
    - neck
  - type: Wieldable
