# Magic Staff Animations (copied from Sword, with unique IDs)

- type: entityEffectAnimation
  id: MagicStaffAttackLight1
  movementSpeed: 0.3
  duration: 0.4
  events:
    0:
    - !type:PlaySound
      sound:
        path: /Audio/_CE/Effects/firebolt.ogg
    - !type:UsedEntityAnimation
      offsetAnimation:
      - time: 0.0
        offset: -0.4, -0.1
      - time: 0.1
        offset: -0.1, -0.7
      - time: 0.2
        offset: 0.1, -0.65
      - time: 0.3
        offset: 0.1, -0.35

      rotationAnimation:
      - time: 0.0
        rotation: -150
      - time: 0.1
        rotation: -30
      - time: 0.2
        rotation: 30
      - time: 0.3
        rotation: -40

      colorAnimation:
      - time: 0.0
        color: "#ffffff"
      - time: 0.2
        color: "#ffffff"
        easing: QuadOut
      - time: 0.35
        color: "#ffffff00"
    - !type:WeaponEffectSlot
      slot: OnHit

- type: entityEffectAnimation
  id: MagicStaffAttackLight2
  movementSpeed: 0.3
  duration: 0.4
  events:
    0:
    - !type:PlaySound
      sound:
        path: /Audio/_CE/Effects/firebolt.ogg
    - !type:UsedEntityAnimation
      offsetAnimation:
      - time: 0.0
        offset: 0.4, -0.1
      - time: 0.1
        offset: 0.1, -0.7
      - time: 0.2
        offset: -0.1, -0.65
      - time: 0.3
        offset: -0.1, -0.35

      rotationAnimation:
      - time: 0.0
        rotation: 150
      - time: 0.1
        rotation: 30
      - time: 0.2
        rotation: -30
      - time: 0.3
        rotation: 40

      colorAnimation:
      - time: 0.0
        color: "#ffffff"
      - time: 0.2
        color: "#ffffff"
        easing: QuadOut
      - time: 0.35
        color: "#ffffff00"
    - !type:WeaponEffectSlot
      slot: OnHit

- type: entityEffectAnimation
  id: MagicStaffAttackHeavy
  movementSpeed: 0.4
  duration: 0.55
  events:
    0:
    - !type:PlaySound
      sound:
        path: /Audio/_CE/Effects/Weapon/slash_wooden4.ogg
    - !type:Dash
      distance: -0.5
    - !type:WeaponEffectSlot
      slot: OnHeavyHit
    - !type:UsedEntityAnimation
      offsetAnimation:
      - time: 0.0
        offset: -0.3, -0.1
        easing: QuadIn
      - time: 0.05
        offset: -0.1, -0.5
      - time: 0.1
        offset: 0, -0.9
      - time: 0.15
        offset: 0.1, -0.5
      - time: 0.2
        offset: 0.3, -0.1
        easing: QuadOut

      rotationAnimation:
      - time: 0.0
        rotation: -30
        easing: QuadIn
      - time: 0.1
        rotation: 0
      - time: 0.2
        rotation: 30
#
      colorAnimation:
      - time: 0.3
        color: "#ffffff"
        easing: QuadOut
      - time: 0.4
        color: "#ffffff00"  # Fade out
