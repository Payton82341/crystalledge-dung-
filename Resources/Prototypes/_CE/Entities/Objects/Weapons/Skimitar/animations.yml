- type: animationAction
  id: SkimitarAttackHeavy1
  movementSpeed: 0.8
  duration: 0.8
  events:
    0:
    - !type:PlaySound
      sound:
        path: /Audio/_CE/Effects/Weapon/slash_sword4.ogg
    - !type:EntityAnimation
      offsetAnimation:
      - time: 0.0
        offset: 0, -0.7
      - time: 0.02
        offset: 0.5, -0.5
      - time: 0.04
        offset: 0.7, 0
      - time: 0.06
        offset: 0.5, 0.5
      - time: 0.08
        offset: 0, 0.7
      - time: 0.1
        offset: -0.5, 0.5
      - time: 0.12
        offset: -0.7, 0
      - time: 0.14
        offset: -0.5, -0.5
      - time: 0.16
        offset: 0, -0.7
      - time: 0.18
        offset: 0.5, -0.5
      - time: 0.2
        offset: 0.7, 0

      rotationAnimation:
      - time: 0.0
        rotation: 0
      - time: 0.08
        rotation: 90
      - time: 0.13
        rotation: 180
      - time: 0.18
        rotation: 270
      - time: 0.23
        rotation: 360

      colorAnimation:
      - time: 0.6
        color: "#ffffff"
      - time: 0.7
        color: "#ffffff00"  # Fade out
        easing: QuadOut

      scaleAnimation:
      - time: 0.0
        scale: 1, -1
    0.05:
    - !type:WeaponArcAttack
      range: 0.6
      arcWidth: 360
      power: 0.5
