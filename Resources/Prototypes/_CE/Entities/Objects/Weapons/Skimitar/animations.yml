- type: animationAction
  id: SkimitarAttackLight1
  movementSpeed: 0.8
  duration: 0.4
  events:
    0:
    - !type:PlaySound
      sound:
        path: /Audio/_CE/Effects/Weapon/slash_sword2.ogg
    - !type:EntityAnimation
      offsetAnimation:
      - time: 0.0
        offset: -0.1, -0.2
        easing: QuadIn
      - time: 0.15
        offset: -0.2, -0.0
      - time: 0.2
        offset: -0.3, -0.2
      - time: 0.25
        offset: -0.2, -1.2
        easing: QuadIn
      - time: 0.35
        offset: 0.1, -0.5
        easing: QuadOut

      rotationAnimation:
      - time: 0.0
        rotation: 20
      - time: 0.025
        rotation: 90
      - time: 0.075
        rotation: 180
      - time: 0.15
        rotation: 270
      - time: 0.25
        rotation: 360
      - time: 0.35
        rotation: 400

      colorAnimation:
      - time: 0.3
        color: "#ffffff"
      - time: 0.4
        color: "#ffffff00"  # Fade out
        easing: QuadOut

      scaleAnimation:
      - time: 0.0
        scale: 1, -1
    0.15:
    - !type:WeaponArcAttack
      range: 0.6
      arcWidth: 60

- type: animationAction
  id: SkimitarAttackLight2
  movementSpeed: 0.8
  duration: 0.4
  events:
    0:
    - !type:PlaySound
      sound:
        path: /Audio/_CE/Effects/Weapon/slash_sword2.ogg
    - !type:EntityAnimation
      offsetAnimation:
      - time: 0.0
        offset: 0.1, -0.2
        easing: QuadIn
      - time: 0.15
        offset: 0.2, -0.0
      - time: 0.2
        offset: 0.3, -0.2
      - time: 0.25
        offset: 0.2, -1.2
        easing: QuadIn
      - time: 0.35
        offset: 0.1, -0.5
        easing: QuadOut

      rotationAnimation:
      - time: 0.0
        rotation: -20
      - time: 0.025
        rotation: -90
      - time: 0.075
        rotation: -180
      - time: 0.15
        rotation: -270
      - time: 0.25
        rotation: -360
      - time: 0.35
        rotation: -400

      colorAnimation:
      - time: 0.3
        color: "#ffffff"
      - time: 0.4
        color: "#ffffff00"  # Fade out
        easing: QuadOut

      scaleAnimation:
      - time: 0.0
        scale: 1, 1
    0.25:
    - !type:WeaponArcAttack
      range: 0.7
      arcWidth: 40

- type: animationAction
  id: SkimitarAttackHeavy1
  movementSpeed: 0.4
  duration: 1
  events:
    0:
    - !type:PlaySound
      sound:
        path: /Audio/_CE/Effects/Weapon/slash_sword4.ogg
    - !type:EntityAnimation
      offsetAnimation:
      - time: 0.0
        offset: 0, -0.7
      - time: 0.08
        offset: 0.5, -0.5
      - time: 0.16
        offset: 0.7, 0
      - time: 0.24
        offset: 0.5, 0.5
      - time: 0.32
        offset: 0, 0.7
      - time: 0.4
        offset: -0.5, 0.5
      - time: 0.48
        offset: -0.7, 0
      - time: 0.56
        offset: -0.5, -0.5
      - time: 0.64
        offset: 0, -0.7
      - time: 0.72
        offset: 0.5, -0.5
      - time: 0.8
        offset: 0.7, 0

      rotationAnimation:
      - time: 0.0
        rotation: 0
      - time: 0.2
        rotation: 90
      - time: 0.4
        rotation: 180
      - time: 0.6
        rotation: 270
      - time: 0.8
        rotation: 360

      colorAnimation:
      - time: 0.6
        color: "#ffffff"
      - time: 0.7
        color: "#ffffff00"  # Fade out
        easing: QuadOut

      scaleAnimation:
      - time: 0.0
        scale: 1, -1
    - !type:Dash
      distance: 1
    0.05:
    - !type:WeaponArcAttack
      range: 0.6
      arcWidth: 360
      power: 0.5
