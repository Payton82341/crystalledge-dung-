- type: entity
  abstract: true
  id: CEBaseWeaponSword
  categories: [ ForkFiltered ]
  parent:
  - BaseItem
  components:
  - type: Item
    size: Ginormous
  - type: CEItemAnimation
    spriteRotation: -90
    animations:
      Primary:
      - anim: SwordAttackLight1
      - anim: SwordAttackLight2
      Secondary:
      - anim: SwordAttackHeavy1
        speed: 2
      - anim: SwordAttackHeavy2
        speed: 2
  - type: Clothing
    slots:
    - neck
    equipWhileMoving: true
    equipDelay: 1
    unequipDelay: 1
  - type: CEMeleeWeapon
    damageGroups:
      default:
        types:
          Slash: 2
      pierce:
        types:
          Piercing: 2