- type: entity
  abstract: true
  id: CEBaseWeaponSword
  parent:
  - CEBaseWeapon
  components:
  - type: CEWeapon
    effectSlots:
      OnHit:
      - !type:WeaponArcAttack
        range: 0.7
        arcWidth: 40
        effects:
        - !type:Damage
          damage:
            types:
              Physical: 2
        - !type:Damage
          effectTarget: Used
          damage:
            types:
              Physical: 1
      OnHeavyHit:
      - !type:WeaponArcAttack
        range: 0.6
        arcWidth: 180
        effects:
        - !type:Damage
          damage:
            types:
              Physical: 2
        - !type:Damage
          effectTarget: Used
          damage:
            types:
              Physical: 1
    animations:
      Primary:
      - anim: SwordAttackLight1
        staminaCost: 1
      - anim: SwordAttackLight2
        staminaCost: 1
      Secondary:
      - anim: SwordAttackHeavy1
        speed: 1.2
        staminaCost: 1
      - anim: SwordAttackHeavy2
        speed: 1.2
        staminaCost: 1
  - type: Clothing
    slots:
    - neck
