# ========================
# Base
# ========================

- type: entity
  abstract: true
  parent: Clothing
  id: CEClothingBackBackpackBase
  categories: [ ForkFiltered ]
  components:
  - type: Item
    size: Huge
  - type: Sprite
    sprite: _CE/Clothing/Back/Backpacks/leather.rsi
    state: icon
  - type: Clothing
    equipDelay: 0.4
    unequipDelay: 0.2
    slots:
    - back
    quickEquip: false
    breakOnMove: false
  - type: Storage
    grid:
    - 0,0,6,3
    maxItemSize: Huge
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
  - type: UseDelay
    delay: 0.5
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface

- type: entity
  abstract: true
  parent: CEClothingBackBackpackBase
  id: CEClothingBackSatchelBase
  categories: [ ForkFiltered ]
  components:
  - type: Foldable
    canFoldInsideContainer: true
    unfoldVerbText: fold-flip-verb
    foldVerbText: fold-flip-verb
  - type: FoldableClothing
    foldedEquippedPrefix: flipped
    foldedHeldPrefix: flipped

# ========================
# Bags
# ========================

- type: entity
  parent: CEClothingBackBackpackBase
  id: CEClothingBackBackpack
  name: backpack
  description: A standard backpack with decent storage space. Perfect for everyday use. It covers your back from blows!
  components:
  - type: Clothing
    slots:
    - back
    equipDelay: 1.5
    unequipDelay: 2
  - type: Sprite
    sprite: _CE/Clothing/Back/Backpacks/leather.rsi
  - type: Storage
    grid:
    - 0,0,5,3

- type: entity
  parent: CEClothingBackSatchelBase
  id: CEClothingBackSatchel
  name: rustic satchel
  description: A handcrafted leather satchel with rustic charm. Provides modest storage with traditional styling. Can be worn on the over the shoulder.
  components:
  - type: Clothing
    slots:
    - back
    equipDelay: 1.5
    unequipDelay: 2
  - type: Sprite
    sprite: _CE/Clothing/Back/Satchel/leather.rsi
  - type: Storage
    grid:
    - 0,0,1,3
    - 3,0,5,3
    - 7,0,8,3
