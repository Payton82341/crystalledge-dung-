- type: entity
  parent: CEClothingAccessoryBase
  id: CEClothingAccessoryCrownOfThorns
  name: crown of thorns
  description: When you take damage in melee combat, you deal 6 physical damage to the attacker.
  components:
  - type: Item
    size: Tiny
  - type: Sprite
    sprite: _CE/Clothing/Accessory/crown_of_thorns.rsi
  - type: CEEquipStatusEffect
    statusEffect: CEStatusEffectCrownOfThorns

- type: entity
  id: CEStatusEffectCrownOfThorns
  categories: [ HideSpawnMenu ]
  components:
  - type: StatusEffect
  - type: CEStatusEffectStack
  - type: CEEffectOnAttackedStatusEffect
    effects:
    - !type:Damage
      effectTarget: Target
      attackType: Melee
      damage:
        types:
          Physical: 6
