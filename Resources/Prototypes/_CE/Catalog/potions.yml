- type: entityTable
  id: CEHealingPotion
  table: !type:GroupSelector
    children:
    - id: CEConsumablePotionHealingMedium
      weight: 0.5
    - id: CEConsumablePotionRegeneration
      weight: 0.75
    - id: CEConsumablePotionHealingSmall

- type: entityTable
  id: CEManaPotion
  table: !type:GroupSelector
    children:
    - id: CEConsumablePotionManaMedium
      weight: 0.5
    - id: CEConsumablePotionManaSmall

- type: entityTable
  id: CEShieldPotion
  table: !type:GroupSelector
    children:
    - id: CEConsumablePotionPhysicalShield
      weight: 0.5
    - id: CEConsumablePotionFireShield
      weight: 0.5
    - id: CEConsumablePotionColdShield
      weight: 0.5

- type: entityTable
  id: CERandomPotion
  table: !type:GroupSelector
    children:
    - !type:NestedSelector
      tableId: CEHealingPotion
    - !type:NestedSelector
      tableId: CEManaPotion
      weight: 1.5
    - !type:NestedSelector
      tableId: CEShieldPotion
      weight: 0.5
    - id: CEConsumablePotionFrost
      weight: 0.5
    - id: CEConsumablePotionAlchemicalFire
      weight: 0.5

- type: entity
  id: CESpawnerRandomPotion
  name: random potion spawner
  parent: MarkerBase
  categories: [ ForkFiltered ]
  components:
  - type: Sprite
    layers:
    - state: green
    - sprite: _CE/Objects/Consumable/Potions/medium_bottle.rsi
      state: icon
  - type: EntityTableSpawner
    table: !type:NestedSelector
      tableId: CERandomPotion
      prob: 0.15
