- type: entityTable
  id: CERandomLoot
  table: !type:GroupSelector
    children:
    - !type:NestedSelector
      tableId: CERandomPotion
      weight: 1
    - !type:NestedSelector
      tableId: CERandomWeapon
      weight: 0.5

- type: entity
  id: CESpawnerRandomLoot
  name: random loot spawner
  parent: MarkerBase
  categories: [ ForkFiltered ]
  components:
  - type: Sprite
    layers:
    - state: green
    - sprite: /Textures/_CE/Objects/Materials/Currency/coin_cp.rsi
      state: coin10
  - type: EntityTableSpawner
    table: !type:NestedSelector
      tableId: CERandomLoot
      prob: 0.3
