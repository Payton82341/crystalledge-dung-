- type: entity
  abstract: true
  parent:
  - BaseMob
  - MobFlammable
  - CEMobCombat
  - CEMobDamageable
  - CEMobMagical
  - StripableInventoryBase
  - BaseSpeciesAppearance
  id: CEBaseSpeciesMob
  save: false
  components:
  - type: CEDamageVisuals
    thresholds: [ 0.1, 0.2, 0.3, 0.5, 0.7, 1.0 ]
    targetLayers:
    - "enum.HumanoidVisualLayers.Chest"
    - "enum.HumanoidVisualLayers.Head"
    - "enum.HumanoidVisualLayers.LArm"
    - "enum.HumanoidVisualLayers.LLeg"
    - "enum.HumanoidVisualLayers.RArm"
    - "enum.HumanoidVisualLayers.RLeg"
    sprite: _CE/Mobs/Effects/brute_damage.rsi
    color: "#FF0000"
    statePrefix: Brute
  - type: CEDungeonPlayer
  - type: StatusIcon
    bounds: -0.5,-0.5,0.5,0.5
  - type: RotationVisuals
    defaultRotation: 90
    horizontalRotation: 90
  - type: HumanoidProfile
  - type: TypingIndicator
  - type: Fixtures
    fixtures: # TODO: This needs a second fixture just for mob collisions.
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 185
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: FloorOcclusion
  - type: Identity
  - type: Climbing
  - type: Cuffable
  - type: AnimationPlayer
  - type: Buckle
  - type: SleepEmitSound
  - type: SSDIndicator
  - type: StandingState
  - type: Crawler
  - type: MindContainer
  - type: MindExaminable
  - type: InteractionPopup
    successChance: 1
    interactSuccessString: hugging-success-generic
    interactSuccessSound: /Audio/Effects/thudswoosh.ogg
    messagePerceivedByOthers: hugging-success-generic-others
  - type: NpcFactionMember
    factions:
    - NanoTrasen #TODO
  - type: UserInterface
    interfaces:
      enum.HumanoidMarkingModifierKey.Key:
        type: HumanoidMarkingModifierBoundUserInterface
      enum.StrippingUiKey.Key:
        type: StrippableBoundUserInterface
  - type: Stripping
  - type: Puller
  - type: Speech
    speechSounds: Alto
  - type: DamageForceSay
  - type: Vocal
    sounds:
      Male: MaleHuman
      Female: FemaleHuman
      Unsexed: MaleHuman
  - type: Emoting
  - type: BodyEmotes
    soundsId: GeneralBodyEmotes
  - type: Grammar
    attributes:
      proper: true
  - type: Tag
    tags:
    - FootstepSound
  - type: CEBlinker
  - type: CEBlessingReceiver
  - type: CESkillStorage
  - type: CEStamina
