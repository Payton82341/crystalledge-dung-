- type: entity
  parent: BaseSpeciesAppearance
  id: CEAppearanceHuman
  categories: [ ForkFiltered, HideSpawnMenu ]
  components:
  - type: Inventory
    templateId: CEHuman
    displacements:
      neck:
        sizeMaps:
          32:
            sprite: _CE/Mobs/Species/Human/displacement.rsi
            state: male_neck
          48:
            sprite: _CE/Mobs/Species/Human/displacement48.rsi
            state: male_neck
    femaleDisplacements:
      outerClothing:
        sizeMaps:
          32:
            sprite: _CE/Mobs/Species/Human/displacement.rsi
            state: female_cloak
      cloak:
        sizeMaps:
          32:
            sprite: _CE/Mobs/Species/Human/displacement.rsi
            state: female_cloak
      pants:
        sizeMaps:
          32:
            sprite: _CE/Mobs/Species/Human/displacement.rsi
            state: female_pants
      shirt:
        sizeMaps:
          32:
            sprite: _CE/Mobs/Species/Human/displacement.rsi
            state: female_shirt
      neck:
        sizeMaps:
          32:
            sprite: _CE/Mobs/Species/Human/displacement.rsi
            state: female_neck
          48:
            sprite: _CE/Mobs/Species/Human/displacement48.rsi
            state: female_neck
  - type: InitialBody
    organs:
      Torso: CEOrganHumanTorso
      Head: CEOrganHumanHead
      ArmLeft: CEOrganHumanArmLeft
      ArmRight: CEOrganHumanArmRight
      HandRight: CEOrganHumanHandRight
      HandLeft: CEOrganHumanHandLeft
      LegLeft: CEOrganHumanLegLeft
      LegRight: CEOrganHumanLegRight
      FootLeft: CEOrganHumanFootLeft
      FootRight: CEOrganHumanFootRight
      Eyes: CEOrganHumanEyes
  - type: HumanoidProfile
    species: CEHuman

- type: entity
