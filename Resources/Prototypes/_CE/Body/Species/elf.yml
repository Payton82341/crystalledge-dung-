- type: markingsGroup
  id: CEElf
  limits:
    enum.HumanoidVisualLayers.Hair:
      limit: 1
      required: false
      default: [ CEHumanHair_part ]
    enum.HumanoidVisualLayers.FacialHair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.Chest:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.Snout:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LArm:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RArm:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LHand:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RHand:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LLeg:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RLeg:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LFoot:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RFoot:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.HeadTop:
      limit: 1
      required: true
      onlyGroupWhitelisted: true
      default: [ CEElfEars ]
    enum.HumanoidVisualLayers.Special:
      limit: 0
      required: false

- type: entity
  parent: BaseSpeciesAppearance
  id: CEAppearanceElf
  categories: [ ForkFiltered, HideSpawnMenu ]
  components:
  - type: Inventory
    templateId: CEHuman
    displacements:
      shirt:
        sizeMaps:
          32:
            sprite: _CE/Mobs/Species/Elf/displacement.rsi
            state: male_shirt
      neck:
        sizeMaps:
          32:
            sprite: _CE/Mobs/Species/Human/displacement.rsi
            state: male_neck
          48:
            sprite: _CE/Mobs/Species/Human/displacement48.rsi
            state: male_neck
    femaleDisplacements:
      outerClothing:
        sizeMaps:
          32:
            sprite: _CE/Mobs/Species/Human/displacement.rsi
            state: female_cloak
      cloak:
        sizeMaps:
          32:
            sprite: _CE/Mobs/Species/Human/displacement.rsi
            state: female_cloak
      pants:
        sizeMaps:
          32:
            sprite: _CE/Mobs/Species/Human/displacement.rsi
            state: female_pants
      shirt:
        sizeMaps:
          32:
            sprite: _CE/Mobs/Species/Elf/displacement.rsi
            state: female_shirt
      neck:
        sizeMaps:
          32:
            sprite: _CE/Mobs/Species/Human/displacement.rsi
            state: female_neck
          48:
            sprite: _CE/Mobs/Species/Human/displacement48.rsi
            state: female_neck
  - type: InitialBody
    organs:
      Torso: CEOrganElfTorso
      Head: CEOrganElfHead
      ArmLeft: CEOrganElfArmLeft
      ArmRight: CEOrganElfArmRight
      HandRight: CEOrganElfHandRight
      HandLeft: CEOrganElfHandLeft
      LegLeft: CEOrganElfLegLeft
      LegRight: CEOrganElfLegRight
      FootLeft: CEOrganElfFootLeft
      FootRight: CEOrganElfFootRight
      Eyes: CEOrganElfEyes
  - type: HumanoidProfile
    species: CEElf

- type: entity
  parent:
  - CEAppearanceElf
  - CEBaseSpeciesMob
  id: CEMobElf
  name: Mr. Elf

# Base elf organ
- type: entity
  parent: OrganBase
  id: CEOrganElf
  categories: [ ForkFiltered ]
  abstract: true
  suffix: elf

- type: entity
  parent: CEOrganElf
  id: CEOrganElfExternal
  abstract: true
  components:
  - type: Sprite
    sprite: _CE/Mobs/Species/Elf/parts.rsi
  - type: VisualOrgan
    data:
      sprite: _CE/Mobs/Species/Elf/parts.rsi
  - type: VisualOrganMarkings
    markingData:
      group: CEElf

- type: entity
  parent: [ CEOrganBaseTorsoSexed, OrganBaseTorso, CEOrganElfExternal ]
  id: CEOrganElfTorso

- type: entity
  parent: [ CEOrganBaseHeadSexed, OrganBaseHead, CEOrganElfExternal ]
  id: CEOrganElfHead
  components:
  - type: VisualOrganMarkings
    hideableLayers:
    - enum.HumanoidVisualLayers.Hair
    - enum.HumanoidVisualLayers.Snout

- type: entity
  parent: [ CEOrganBaseArmLeftSexed, OrganBaseArmLeft, CEOrganElfExternal ]
  id: CEOrganElfArmLeft

- type: entity
  parent: [ CEOrganBaseArmRightSexed, OrganBaseArmRight, CEOrganElfExternal ]
  id: CEOrganElfArmRight

- type: entity
  parent: [ CEOrganBaseHandLeftSexed, OrganBaseHandLeft, CEOrganElfExternal ]
  id: CEOrganElfHandLeft

- type: entity
  parent: [ CEOrganBaseHandRightSexed, OrganBaseHandRight, CEOrganElfExternal ]
  id: CEOrganElfHandRight

- type: entity
  parent: [ CEOrganBaseLegLeftSexed, OrganBaseLegLeft, CEOrganElfExternal ]
  id: CEOrganElfLegLeft

- type: entity
  parent: [ CEOrganBaseLegRightSexed, OrganBaseLegRight, CEOrganElfExternal ]
  id: CEOrganElfLegRight

- type: entity
  parent: [ CEOrganBaseFootLeftSexed, OrganBaseFootLeft, CEOrganElfExternal ]
  id: CEOrganElfFootLeft

- type: entity
  parent: [ CEOrganBaseFootRightSexed, OrganBaseFootRight, CEOrganElfExternal ]
  id: CEOrganElfFootRight

- type: entity
  parent: [ OrganBaseEyes, OrganHumanInternal, CEOrganElfExternal ]
  id: CEOrganElfEyes
  components:
  - type: VisualOrgan
    data:
      sprite: _CE/Mobs/Customization/eyes.rsi
