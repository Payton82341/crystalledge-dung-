- type: markingsGroup
  id: CETiefling
  limits:
    enum.HumanoidVisualLayers.Hair:
      limit: 1
      required: false
      default: [ CEHumanHair_part ]
    enum.HumanoidVisualLayers.FacialHair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.Chest:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.Snout:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LArm:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RArm:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LHand:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RHand:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LLeg:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RLeg:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LFoot:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RFoot:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.Tail:
      limit: 1
      required: true
      onlyGroupWhitelisted: true
      default: [ CETieflingTail ]
    enum.HumanoidVisualLayers.HeadTop:
      limit: 1
      required: true
      onlyGroupWhitelisted: true
      default: [ CETieflingHorns ]
    enum.HumanoidVisualLayers.Special:
      limit: 0
      required: false

- type: entity
  parent: BaseSpeciesAppearance
  id: CEAppearanceTiefling
  categories: [ ForkFiltered, HideSpawnMenu ]
  components:
  - type: Inventory
    templateId: CEHuman
    displacements:
      neck:
        sizeMaps:
          32:
            sprite: _CE/Mobs/Species/Human/displacement.rsi
            state: male_neck
          48:
            sprite: _CE/Mobs/Species/Human/displacement48.rsi
            state: male_neck
    femaleDisplacements:
      outerClothing:
        sizeMaps:
          32:
            sprite: _CE/Mobs/Species/Human/displacement.rsi
            state: female_cloak
      cloak:
        sizeMaps:
          32:
            sprite: _CE/Mobs/Species/Human/displacement.rsi
            state: female_cloak
      pants:
        sizeMaps:
          32:
            sprite: _CE/Mobs/Species/Human/displacement.rsi
            state: female_pants
      shirt:
        sizeMaps:
          32:
            sprite: _CE/Mobs/Species/Human/displacement.rsi
            state: female_shirt
      neck:
        sizeMaps:
          32:
            sprite: _CE/Mobs/Species/Human/displacement.rsi
            state: female_neck
          48:
            sprite: _CE/Mobs/Species/Human/displacement48.rsi
            state: female_neck
  - type: InitialBody
    organs:
      Torso: CEOrganTieflingTorso
      Head: CEOrganTieflingHead
      ArmLeft: CEOrganTieflingArmLeft
      ArmRight: CEOrganTieflingArmRight
      HandRight: CEOrganTieflingHandRight
      HandLeft: CEOrganTieflingHandLeft
      LegLeft: CEOrganTieflingLegLeft
      LegRight: CEOrganTieflingLegRight
      FootLeft: CEOrganTieflingFootLeft
      FootRight: CEOrganTieflingFootRight
      Eyes: CEOrganTieflingEyes
  - type: HumanoidProfile
    species: CETiefling

- type: entity
  parent:
  - CEBaseSpeciesMob
  - CEAppearanceTiefling
  id: CEMobTiefling
  name: Mr. Tiefling
  components:
  - type: Wagging

# Base tiefling organ
- type: entity
  parent: OrganBase
  id: CEOrganTiefling
  categories: [ ForkFiltered ]
  abstract: true
  suffix: tiefling

- type: entity
  parent: CEOrganTiefling
  id: CEOrganTieflingExternal
  abstract: true
  components:
  - type: Sprite
    sprite: _CE/Mobs/Species/Tiefling/parts.rsi
  - type: VisualOrgan
    data:
      sprite: _CE/Mobs/Species/Tiefling/parts.rsi
  - type: VisualOrganMarkings
    markingData:
      group: CETiefling

- type: entity
  parent: [ CEOrganBaseTorsoSexed, OrganBaseTorso, CEOrganTieflingExternal ]
  id: CEOrganTieflingTorso

- type: entity
  parent: [ CEOrganBaseHeadSexed, OrganBaseHead, CEOrganTieflingExternal ]
  id: CEOrganTieflingHead
  components:
  - type: VisualOrganMarkings
    hideableLayers:
    - enum.HumanoidVisualLayers.Hair
    - enum.HumanoidVisualLayers.Snout

- type: entity
  parent: [ CEOrganBaseArmLeftSexed, OrganBaseArmLeft, CEOrganTieflingExternal ]
  id: CEOrganTieflingArmLeft

- type: entity
  parent: [ CEOrganBaseArmRightSexed, OrganBaseArmRight, CEOrganTieflingExternal ]
  id: CEOrganTieflingArmRight

- type: entity
  parent: [ CEOrganBaseHandLeftSexed, OrganBaseHandLeft, CEOrganTieflingExternal ]
  id: CEOrganTieflingHandLeft

- type: entity
  parent: [ CEOrganBaseHandRightSexed, OrganBaseHandRight, CEOrganTieflingExternal ]
  id: CEOrganTieflingHandRight

- type: entity
  parent: [ CEOrganBaseLegLeftSexed, OrganBaseLegLeft, CEOrganTieflingExternal ]
  id: CEOrganTieflingLegLeft

- type: entity
  parent: [ CEOrganBaseLegRightSexed, OrganBaseLegRight, CEOrganTieflingExternal ]
  id: CEOrganTieflingLegRight

- type: entity
  parent: [ CEOrganBaseFootLeftSexed, OrganBaseFootLeft, CEOrganTieflingExternal ]
  id: CEOrganTieflingFootLeft

- type: entity
  parent: [ CEOrganBaseFootRightSexed, OrganBaseFootRight, CEOrganTieflingExternal ]
  id: CEOrganTieflingFootRight

- type: entity
  parent: [ OrganBaseEyes, OrganHumanInternal, CEOrganTieflingExternal ]
  id: CEOrganTieflingEyes
  components:
  - type: VisualOrgan
    data:
      sprite: _CE/Mobs/Customization/eyes.rsi
