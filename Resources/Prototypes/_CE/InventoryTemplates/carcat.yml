- type: inventoryTemplate
  id: CECarcat #Copy of CEHuman, but without shoes
  slots:
    # Left hotbar
    # 0, y
    #- name: shoes
    #  slotTexture: shoes
    #  fullTextureName: SlotBackgroundVanity
    #  slotFlags: FEET
    #  uiWindowPos: 0,1
    #  strippingWindowPos: 0,4
    #  displayName: Shoes
    - name: pants
      slotTexture: pants
      fullTextureName: SlotBackgroundVanity
      slotFlags: PANTS
      uiWindowPos: 0,2
      strippingWindowPos: 0,3
      displayName: Pants
    - name: shirt
      slotTexture: shirt
      fullTextureName: SlotBackgroundVanity
      slotFlags: SHIRT
      uiWindowPos: 0,3
      strippingWindowPos: 0,2
      displayName: Shirt
    - name: cloak
      slotTexture: cloak
      fullTextureName: SlotBackgroundVanity
      slotFlags: CLOAK
      uiWindowPos: 0,4
      strippingWindowPos: 0,1
      displayName: Cloak
    # 1, y
    - name: accessory1
      slotTexture: acsessory
      slotFlags: EYES
      uiWindowPos: 1,0
      strippingWindowPos: 1,4
      displayName: Eyes
    - name: accessory2
      slotTexture: acsessory
      slotFlags: EYES
      uiWindowPos: 1,1
      strippingWindowPos: 1,3
      displayName: Eyes
    - name: accessory3
      slotTexture: acsessory
      slotFlags: EYES
      uiWindowPos: 1,2
      strippingWindowPos: 1,2
      displayName: Eyes
    - name: outerClothing
      slotTexture: suit
      slotFlags: OUTERCLOTHING
      stripTime: 6
      uiWindowPos: 1,3
      strippingWindowPos: 1,1
      displayName: Suit
    - name: head
      slotTexture: head
      slotFlags: HEAD
      uiWindowPos: 1,4
      strippingWindowPos: 1,0
      displayName: Head
    # 2, y
    # Main hotbar
    - name: belt
      slotTexture: belt
      slotFlags: BELT
      slotGroup: SecondHotbar
      uiWindowPos: 0,0
      strippingWindowPos: 2,0
      dependsOn: pants
      displayName: Belt
    - name: back
      slotTexture: back
      slotFlags: BACK
      slotGroup: SecondHotbar
      uiWindowPos: 0,0
      strippingWindowPos: 0,0
      displayName: Back
    - name: neck
      slotTexture: neck
      slotFlags: NECK
      slotGroup: SecondHotbar
      uiWindowPos: 0,0
      strippingWindowPos: 3,0
      displayName: Neck
      dependsOn: shirt
    # Right hand
    # Left hand
    - name: pocket1
      slotTexture: pocket
      slotFlags: POCKET
      slotGroup: MainHotbar
      uiWindowPos: 0,0
      strippingWindowPos: 2,1
      dependsOn: pants
      displayName: Pocket
      stripHidden: true
    - name: pocket2
      slotTexture: pocket
      slotFlags: POCKET
      slotGroup: MainHotbar
      uiWindowPos: 1,0
      strippingWindowPos: 4,1
      dependsOn: pants
      displayName: Pocket
      stripHidden: true
    - name: belt2
      slotTexture: belt
      slotFlags: BELT
      slotGroup: MainHotbar
      uiWindowPos: 2,0
      strippingWindowPos: 4,0
      dependsOn: pants
      displayName: Belt
