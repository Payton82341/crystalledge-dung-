- type: dungeonLevel
  id: MossyTempleSafe
  stable: true
  parent:
  - BaseMossyTemplePostProcess
  name: Mossy Temple — Safe Zone
  #exits:
  #  default: MossyTemple1 # Loops back for now
  config:
    !type:CEStaticZNetworkConfig
    zMapProto: MossyTempleSafe

- type: zMap
  id: MossyTempleSafe
  maps:
  - /Maps/_CE/Dungeon/MossyTempleSafe/MossyTempleSafe0.yml
  - /Maps/_CE/Dungeon/MossyTempleSafe/MossyTempleSafe1.yml
