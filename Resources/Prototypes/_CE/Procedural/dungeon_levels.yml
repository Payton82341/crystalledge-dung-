    blessingCount:
      min: 0
      max: 0
    cycleCount:
      min: 10
      max: 10
    entranceCount:
      min: 2
      max: 3
  postProcess:
  # Mobs
  - !type:CEBudgetSpawnPostProcess
    budget: 150
    wakeOnSpawn: true
    excludedRoomTypes:
    - Entrance
    entries:
    - proto: CEMobSlimeFire
      cost: 3
      weight: 1
    - proto: CEMobFireConstruct
      cost: 10
      weight: 1
    - proto: CEMobFlem
      cost: 3
    - proto: CEMobFlem2
      cost: 3
    - proto: CEMobFlem3
      cost: 5
