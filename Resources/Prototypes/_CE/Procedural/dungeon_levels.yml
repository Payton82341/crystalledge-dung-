# Example dungeon level prototypes using the CEDungeonSystem generator configs.

# A static dungeon level that loads a pre-made map file as-is.
- type: dungeonLevel
  id: CEDungeonTestStatic
  name: Test Static Dungeon
  stable: true
  config:
    !type:CEStaticMapConfig
    mapPath: /Maps/_CE/Dev/Dev0.yml

# Base abstract prototype for all Mossy Temple dungeon levels.
# Children override generalCount, blessingCount, cycleCount, maxRoomSize, and exits.
- type: dungeonLevel
  id: BaseMossyTemple
  abstract: true
  stable: false
  config:
    !type:CEProceduralConfig
    corridorTile: CEStonebricks
    corridorWander: 0
    maxRoomSize: 16
    components:
    - type: MapLight
      ambientLightColor: "#3d4444"
    - type: Gravity
      enabled: true
      inherent: true
    generalRooms:
      whitelist:
        requireAll: true
        tags:
        - CEDunGenMossyTemple
        - CEDunGenRoomGeneral
    exitRoom:
      whitelist:
        requireAll: true
        tags:
        - CEDunGenMossyTemple
        - CEDunGenRoomExit
    entranceRooms:
      whitelist:
        requireAll: true
        tags:
        - CEDunGenMossyTemple
        - CEDunGenRoomEntrance
    blessingRooms:
      whitelist:
        requireAll: true
        tags:
        - CEDunGenMossyTemple
        - CEDunGenRoomBlessing
    deadEndRooms:
      whitelist:
        requireAll: true
        tags:
        - CEDunGenMossyTemple
        - CEDunGenRoomDeadEnd
  postProcess:
  - !type:CETileVariantizePostProcess
  - !type:CEEntitySwapPostProcess
    source: CEWallStoneBrick
    target: CEWallStone
    chance: 0.05
  - !type:CEEntitySwapPostProcess
    source: CEWallStoneBrick
    target: CEWallDirt
    chance: 0.05
  - !type:CEBiomeApplyPostProcess
    seed: 42
    layers:
    - !type:BiomeTileLayer
      tile: CEDirt
      threshold: 0.15
      noise:
        seed: 0
        noiseType: OpenSimplex2
        fractalType: Ridged
        frequency: 0.05
        octaves: 3
        lacunarity: 1.8
        gain: 0.7
        domainWarpType: OpenSimplex2
        domainWarpAmp: 120
    - !type:BiomeTileLayer
      tile: CEGrass
      threshold: 0.5
      noise:
        seed: 0
        noiseType: OpenSimplex2
        fractalType: Ridged
        frequency: 0.05
        octaves: 3
        lacunarity: 1.8
        gain: 0.7
        domainWarpType: OpenSimplex2
        domainWarpAmp: 120
    - !type:BiomeDecalLayer #Grass decal
      threshold: 0.3
      divisions: 1
      noise:
        seed: 12
        noiseType: OpenSimplex2
        fractalType: Ridged
        frequency: 0.05
        octaves: 3
        lacunarity: 1.8
        gain: 0.7
        domainWarpType: OpenSimplex2
        domainWarpAmp: 120
      decals:
        - CEFloraGrass1
        - CEFloraGrass2
        - CEFloraGrass3
        - CEFloraGrass4
        - CEFloraGrass5
        - CEFloraGrass6
        - CEFloraGrass7
        - CEFloraGrass8
        - CEFloraGrass9
        - CEFloraGrass10
        - CEFloraGrass11
        - CEFloraGrass12
        - CEFloraGrass13
        - CEFloraGrass14
    - !type:BiomeDecalLayer #Rock decal
      threshold: 0.7
      divisions: 1
      noise:
        seed: 18
        noiseType: OpenSimplex2
        fractalType: Ridged
        frequency: 0.11
        octaves: 3
        lacunarity: 1.7
        gain: 0.8
        domainWarpType: OpenSimplex2
        domainWarpAmp: 120
      decals:
        - CEFloraRock01
        - CEFloraRock02
        - CEFloraRock03
        - CEFloraRock04
        - CEFloraRock05
    - !type:BiomeDecalLayer #Bush decal
      threshold: 0.5
      divisions: 1
      noise:
        seed: 12
        noiseType: OpenSimplex2
        fractalType: Ridged
        frequency: 0.05
        octaves: 3
        lacunarity: 1.8
        gain: 0.7
        domainWarpType: OpenSimplex2
        domainWarpAmp: 120
      decals:
        - CEGrassBushes1
        - CEGrassBushes2
        - CEGrassBushes3
        - CEGrassBushes4
        - CEGrassBushes5
        - CEGrassBushes6
        - CEGrassBushes7
        - CEGrassBushes8
        - CEGrassBushes9

# Floor 1: Small introductory level.
- type: dungeonLevel
  id: MossyTemple1
  parent: BaseMossyTemple
  name: Mossy Temple — Floor 1
  exits:
    default: MossyTemple2
  config:
    !type:CEProceduralConfig
    generalCount:
      min: 5
      max: 7
    blessingCount:
      min: 1
      max: 1
    cycleCount:
      min: 1
      max: 2

# Floor 2: Medium-sized level with more rooms.
- type: dungeonLevel
  id: MossyTemple2
  parent: BaseMossyTemple
  name: Mossy Temple — Floor 2
  exits:
    default: MossyTemple3
  config:
    !type:CEProceduralConfig
    generalCount:
      min: 7
      max: 10
    blessingCount:
      min: 1
      max: 1
    cycleCount:
      min: 2
      max: 3

# Floor 3: Large final level with many rooms and cycles.
- type: dungeonLevel
  id: MossyTemple3
  parent: BaseMossyTemple
  name: Mossy Temple — Floor 3
  exits:
    default: MossyTemple1 # Loops back for now
  config:
    !type:CEProceduralConfig
    generalCount:
      min: 10
      max: 15
    blessingCount:
      min: 1
      max: 2
    cycleCount:
      min: 2
      max: 4
