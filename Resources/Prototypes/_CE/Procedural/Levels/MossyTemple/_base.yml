- type: dungeonLevel
  id: BaseMossyTemplePostProcess
  abstract: true
  postProcess:
  - !type:CETileVariantizePostProcess
  - !type:CEEntitySwapPostProcess
    source: CEWallStoneBrick
    target: CEWallStone
    chance: 0.05
  - !type:CEEntitySwapPostProcess
    source: CEWallStoneBrick
    target: CEWallDirt
    chance: 0.05
  - !type:CEBiomeApplyPostProcess
    layers:
    - !type:BiomeTileLayer
      tile: CEDirt
      threshold: 0.15
      noise:
        seed: 0
        noiseType: OpenSimplex2
        fractalType: Ridged
        frequency: 0.05
        octaves: 3
        lacunarity: 1.8
        gain: 0.7
        domainWarpType: OpenSimplex2
        domainWarpAmp: 120
    - !type:BiomeTileLayer
      tile: CEGrass
      threshold: 0.5
      noise:
        seed: 0
        noiseType: OpenSimplex2
        fractalType: Ridged
        frequency: 0.05
        octaves: 3
        lacunarity: 1.8
        gain: 0.7
        domainWarpType: OpenSimplex2
        domainWarpAmp: 120
    - !type:BiomeDecalLayer #Grass decal
      threshold: 0.3
      divisions: 1
      noise:
        seed: 12
        noiseType: OpenSimplex2
        fractalType: Ridged
        frequency: 0.05
        octaves: 3
        lacunarity: 1.8
        gain: 0.7
        domainWarpType: OpenSimplex2
        domainWarpAmp: 120
      decals:
        - CEFloraGrass1
        - CEFloraGrass2
        - CEFloraGrass3
        - CEFloraGrass4
        - CEFloraGrass5
        - CEFloraGrass6
        - CEFloraGrass7
        - CEFloraGrass8
        - CEFloraGrass9
        - CEFloraGrass10
        - CEFloraGrass11
        - CEFloraGrass12
        - CEFloraGrass13
        - CEFloraGrass14
    - !type:BiomeDecalLayer #Rock decal
      threshold: 0.7
      divisions: 1
      noise:
        seed: 18
        noiseType: OpenSimplex2
        fractalType: Ridged
        frequency: 0.11
        octaves: 3
        lacunarity: 1.7
        gain: 0.8
        domainWarpType: OpenSimplex2
        domainWarpAmp: 120
      decals:
        - CEFloraRock01
        - CEFloraRock02
        - CEFloraRock03
        - CEFloraRock04
        - CEFloraRock05
    - !type:BiomeDecalLayer #Bush decal
      threshold: 0.5
      divisions: 1
      noise:
        seed: 12
        noiseType: OpenSimplex2
        fractalType: Ridged
        frequency: 0.05
        octaves: 3
        lacunarity: 1.8
        gain: 0.7
        domainWarpType: OpenSimplex2
        domainWarpAmp: 120
      decals:
        - CEGrassBushes1
        - CEGrassBushes2
        - CEGrassBushes3
        - CEGrassBushes4
        - CEGrassBushes5
        - CEGrassBushes6
        - CEGrassBushes7
        - CEGrassBushes8
        - CEGrassBushes9
    - !type:BiomeEntityLayer # Tall grass!
      threshold: 0.6
      noise:
        seed: 23
        noiseType: OpenSimplex2
        fractalType: Ridged
        frequency: 0.05
        octaves: 3
        lacunarity: 1.8
        gain: 0.7
        domainWarpType: OpenSimplex2
        domainWarpAmp: 120
      entities:
        - CERandomBushOffsetSpawner
    - !type:BiomeEntityLayer # God rays!
      threshold: 0.3
      noise:
        seed: 877
        noiseType: OpenSimplex2
        fractalType: Ridged
        frequency: 0.03
        octaves: 3
        lacunarity: 1.8
        gain: 0.7
        domainWarpType: OpenSimplex2
        domainWarpAmp: 120
      entities:
        - CEGodRaysMoon

- type: dungeonLevel
  parent: BaseMossyTemplePostProcess
  id: BaseMossyTemplePostProcessPeaceful
  abstract: true
  icon:
    sprite: _CE/Interface/NodeTree/demiplane_map_locations.rsi
    state: grassland_island
  config:
    !type:CEProceduralConfig
    corridorTile: CEStonebricks
    corridorWander: 0
    maxRoomSize: 16
    components:
    - type: MapLight
      ambientLightColor: "#eae3a4"
    - type: Gravity
      enabled: true
      inherent: true
    - type: CEZLevelMapRoof
    - type: SunShadow
      alpha: 0.8
      direction: 2, -0.75
    - type: CEMapStatusEffects
      effects:
      - CEStatusEffectPacifism
    - type: CEMapAmbientMusicTheme
      theme: MossyTemple


