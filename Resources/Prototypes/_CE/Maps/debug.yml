- type: gameMap
  id: Empty
  mapName: Empty
  mapPath: /Maps/Test/empty.yml
  minPlayers: 0
  stations:
    Empty:
      stationProto: StandardNanotrasenStation
      components:
        - type: StationNameSetup
          mapNameTemplate: "Empty"
        - type: StationJobs
          availableJobs:
            CEKnight: [ -1, -1 ]

- type: gameMap
  id: Dev
  mapName: Dev
  mapPath: /Maps/_CE/Dev/Dev0.yml
  minPlayers: 0
  stations:
    Dev:
      stationProto: StandardNanotrasenStation
      components:
        - type: StationNameSetup
          mapNameTemplate: "Dev"
        - type: StationJobs
          availableJobs:
            CEKnight: [ -1, -1 ]
            CEMage: [ -1, -1 ]
            CEPriest: [ -1, -1 ]
            CEWanderer: [ -1, -1 ]
        - type: CEStationZLevels
          mapsAbove:
          - /Maps/_CE/Empty.yml
          zLevelsComponentOverrides:
            - type: MapAtmosphere
              space: False
              mixture:
                volume: 2500
                immutable: True
                temperature: 293.15
                moles:
                  Oxygen: 21.824879
                  Nitrogen: 82.10312
            - type: Parallax
              parallax: CESky
            - type: SunShadowCycle
              offset: 150
              duration: 300
            - type: LightCycle
              offset: 150
              duration: 300
              originalColor: "#75e3ff"
            - type: CEZLevelMapRoof
            - type: SunShadow
            - type: MapLight
              ambientLightColor: "#75e3ff"

- type: zMap
  id: Empty
  maps:
  - /Maps/_CE/Empty.yml
  - /Maps/_CE/Empty.yml
  - /Maps/_CE/Empty.yml
  components:
    - type: MapAtmosphere
      space: False
      mixture:
        volume: 2500
        immutable: True
        temperature: 293.15
        moles:
          Oxygen: 21.824879
          Nitrogen: 82.10312
    - type: Parallax
      parallax: CESky
    - type: SunShadowCycle
      offset: 490
    - type: LightCycle
      offset: 490
      originalColor: "#c8fdff"
    - type: CEZLevelMapRoof
    - type: SunShadow
    - type: MapLight
      ambientLightColor: "#c8fdff"
